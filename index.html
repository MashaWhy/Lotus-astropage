в Ашлеше означает, что стабильность будет достигаться не через прямые действия, а через наблюдение, расчёт и скрытое управление.\n· Ключевые слова: защита через контроль, скрытая стабильность, мудрое бездействие.", "s2": "Сфера жизни: КШЕМА\n· Сфера: благополучие, стабильность, защита, недвижимость.\n· Что происходит: это хорошее время для обустройства дома, укрепления семейных уз, но в Ашлеше — ещё и для урегулирования тайных вопросов.\nНапример, вы можете решить вопрос с наследством, о котором никто не знал, или укрепить отношения, которые держатся на общей тайне.\n· Пример: если в этот день вы подписываете договор о недвижимости — он будет надёжным. Если решаете семейный конфликт — он сгладится, но обе стороны унесут с собой осадок недоговорённости.", "s3": "Специальная накшатра: ДЖАТИ\n· Значение: «Община, социальная принадлежность, люди сходной природы, профессии или класса».\n· Нюанс: эта накшатра определяет ваше место в социальной иерархии. В транзите через Ашлешу активируется вопрос «кто я в этом коллективе?». Если планета слаба — может быть изгнание из группы, или ощущение, что вы «чужой среди своих». Если сильна — вы становитесь невидимым центром, вокруг которого собираются люди.\n4.", "tier": "free" }, "5": { "s1": "Тара-бала: ПРАТЬЯК-ТАРА (5-я позиция)\n· Благоприятность: неблагоприятная.\n· Смысл: «противный поток», препятствия целям, незавершённость, разочарование, активизация врагов.\n· Влияние: в Магхе это означает, что ваши попытки утвердить свою власть встретят сопротивление. Вы можете столкнуться с тем, что ваше слово не весит, или что кто-то из старших (или из предков) блокирует ваши инициативы. Это не фатально, но требует терпения.\n· Ключевые слова: власть через сопротивление, родовые кармические хвосты, проверка эго.", "s2": "Сфера жизни: ПРАТЬЯК (скрытые враги, конфликты)\n· Сфера: тайные недоброжелатели, сплетни, саботаж.\n· Что происходит: вы можете не видеть врагов, но они есть. Это время, когда кто-то за спиной распространяет слухи или мешает вашему продвижению. В Магхе это часто связано с темой «места на троне» — кто-то из окружения хочет занять ваше положение.\n· Пример: коллега, который хочет вашу должность, или родственник, который оспаривает ваше право распоряжаться наследством.", "s3": "Специальная накшатра: нет (Магха не входит в перечень специальных).\n4.", "tier": "free" }, "6": { "s1": "Тара-бала: САДХАНА-ТАРА (6-я позиция)\n· Благоприятность: очень благоприятная.\n· Смысл: открытие дверей успеха, продуктивность, концентрация, выполнение задач.\n· Влияние: это время, когда начатое приносит результат, особенно если человек действует с дисциплиной. В Пурва-Фалгуни это означает, что творчество и удовольствие могут стать инструментом достижения целей. Вы можете «играючи» добиться успеха.\n· Ключевые слова: успех через радость, творчество как работа.", "s2": "Сфера жизни: САДХАНА (духовный рост, медитация, внутренний прогресс)\n· Сфера: духовные практики, медитация, изучение, саморазвитие.\n· Что происходит: несмотря на внешнюю «праздничность», Садхана-тара в этой накшатре требует не просто веселья, а осознанного подхода к удовольствию. Это день, когда можно найти глубокий смысл в игре, увидеть священное в танце, понять свою карму через творчество.\n· Пример: вы идёте на вечеринку, но вместо пустого общения встречаете человека, который даёт вам важный совет; или вы создаёте искусство, которое позже становится вашей визиткой.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "7": { "s1": "Тара-бала: НАЙДХАНА-ТАРА (7-я позиция)\n· Благоприятность: неблагоприятная (самая тяжёлая).\n· Смысл: разрушение, завершение, кармическая разрядка, потери.\n· Влияние: это не просто «конец», а необходимый конец. В Уттара-Фалгуни это означает, что ваши обязательства (долги, контракты, отношения) могут завершиться, и это будет болезненно, но правильно.\n· Ключевые слова: завершение долгов, кармическая расплата, уход старого.", "s2": "Сфера жизни: НАИДРАБХА (сон, подсознание, интуиция)\n· Сфера: сон, подсознание, интуиция, вещие сны.\n· Что происходит: несмотря на то что Уттара-Фалгуни — социальная накшатра, Наидхрабха переводит её во внутренний план. Это значит, что всё завершение будет происходить через подсознание: вы можете увидеть сон о разрыве, или интуитивно почувствовать, что отношения изжили себя.\n· Пример: вы можете не принимать решения, а просто проснуться с чётким пониманием, что пора уйти. Или получить информацию через сон о том, как решить долговой вопрос.", "s3": "Специальная накшатра: НАЙДХАНА\n· Значение: «страдания, смерть, завершение циклов».\n· Нюанс: эта накшатра связана с окончаниями. Когда планеты проходят через неё, могут происходить реальные потери: смерть родственников, развод, банкротство. Но это не «проклятие», а кармическая хирургия — отсечение того, что уже не нужно. Если накшатра слаба (поражена Сатурном, Солнцем, Марсом, Раху, Кету), потери могут быть тяжёлыми. Если сильна — они приведут к освобождению.\n4.", "tier": "free" }, "8": { "s1": "Тара-бала: МИТРА-ТАРА (8-я позиция)\n· Благоприятность: благоприятная.\n· Смысл: дружба, благость, любовь, гармония, сотрудничество.\n· Влияние: Хаста здесь включает режим «делания вместе». Это время, когда люди объединяются для решения практических задач. Вместо того чтобы обсуждать чувства, они просто берут и делают – ремонт, уборка, работа над проектом. Это укрепляет связи лучше любых слов.\n· Ключевые слова: ручная помощь, совместная работа, устранение неполадок.", "s2": "Сфера жизни: МИТРА (друзья, союзники, поддержка окружения)\n· Сфера: укрепление старых связей, новые полезные знакомства, сотрудничество.\n· Что происходит: вы можете встретить человека, который предложит практическую помощь. Или вы сами станете чьим-то «ангелом-хранителем» в бытовом вопросе. В Хасте не будет пафоса — всё через реальные действия: кто-то починит кран, кто-то поможет с документами, кто-то даст денег без лишних вопросов.\n· Пример: в этот день коллега без просьбы делится инструментом, или друг приходит с готовым решением вашей технической проблемы.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "9": { "s1": "Тара-бала: ПАРАМА-МИТРА-ТАРА (9-я позиция)\n· Благоприятность: абсолютная, лучшая из всех.\n· Смысл: высшая дружба, удача без усилий, поддержка благодетелей, раскрытие кармических даров.\n· Влияние: в Читре это означает, что ваш творческий потенциал встречает полную поддержку мира. Всё, что вы создаёте, получает признание. Другие люди тянутся к вам, видя в вас «ювелира» судеб. Это время, когда можно начать важный проект – он будет не только успешным, но и красивым.\n· Ключевые слова: творческая удача, поддержка судьбы, создание красоты.", "s2": "Сфера жизни: ПАРАМА-МИТРА (глубокие связи, доверенные лица, партнёрство)\n· Сфера: высшие отношения, брак, деловое партнёрство на уровне доверия.\n· Что происходит: вы можете встретить человека, с которым у вас будет не просто дружба, а творческий союз. Это может быть партнёр по бизнесу, который разделяет вашу эстетику, или романтический партнёр, с которым вы создаёте общий мир.\n· Пример: в этот день происходит знакомство с человеком, который вдохновляет вас на создание совместного проекта, или вы принимаете предложение о партнёрстве, которое изменит вашу жизнь.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "10": { "s1": "Тара-бала: ДЖАНМА-ТАРА (1-я позиция)\n· Благоприятность: нейтральная (смешанная).\n· Смысл: активация личности, тела, идентичности.\n· Влияние: в Свати это означает, что вы будете особенно остро ощущать свою отдельность. Вам захочется быть собой, даже если это значит быть одному.\nЭто может дать уверенность, но также и уязвимость — ветер легко сбивает с ног.\n· Ключевые слова: личность через свободу, самоощущение как ветер.", "s2": "Сфера жизни: АТМА (душа, кармические цели, самореализация)\n· Сфера: поиск предназначения, озарения, встреча с учителями.\n· Что происходит: Свати здесь — накшатра духовного ветра, который приносит ответы на вопросы «кто я и куда иду?». Вы можете получить внезапное озарение, изменить своё представление о жизни, встретить человека, который станет катализатором перемен.\n· Пример: вы гуляете по городу, встречаете старого знакомого, и его слова заставляют вас пересмотреть свои цели. Или читаете книгу, которая становится для вас откровением.", "s3": "Специальная накшатра: КАРМА (10-я от Джанма)\n· Значение: профессиональные достижения, карьерный рост, общественное признание.\n· Нюанс: эта накшатра связана с вашим призванием. Если она ослаблена в транзите (планеты-вредители), возможны проблемы в бизнесе или потеря репутации. Если сильна — вы получаете карьерный прорыв. В Свати это означает, что ваш успех зависит от вашей способности быть гибким. Если вы попытаетесь контролировать ветер, он ускользнёт. Если доверитесь движению, попадёте в нужное место.\n4.", "tier": "free" }, "11": { "s1": "Тара-бала: САМПАТ-ТАРА (2-я позиция)\n· Благоприятность: очень благоприятная.\n· Смысл: финансовое благополучие, материальные ресурсы, приток денег.\n· Влияние: в Вишакхе это означает, что ваши амбиции могут принести конкретные деньги. Если вы боретесь за ресурсы — вы их получите, но через конкурентную борьбу. Сампат здесь не даётся просто так — он требует усилий, похожих на войну.\n· Ключевые слова: деньги через целеустремлённость, ресурсы как трофей.", "s2": "Сфера жизни: ШАТА-РУДХИРА (семья, кровные узы, наследство)\n· Сфера: отношения с родителями, детьми, дальними родственниками, вопросы наследства.\n· Что происходит: Вишакха здесь активирует семейные темы, но не мирные, а конкурентные. Это может быть борьба за наследство, спор с родителями о жизненном пути, или отстаивание своих интересов перед родственниками.\n· Пример: в этот день вы можете получить известие о наследстве, но оно будет связано с конфликтом. Или вы решите разорвать отношения с семьёй ради своей цели.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "12": { "s1": "Тара-бала: ВИПАТ-ТАРА (3-я позиция)\n· Благоприятность: неблагоприятная.\n· Смысл: препятствия, кармические блоки, несчастья, конфликты.\n· Влияние: в Анурадхе это означает, что ваши связи с группой могут стать источником проблем. Кто-то из вашего окружения подведёт вас, или вы столкнётесь с непониманием в коллективе. Випат здесь проявляется как испытание на преданность: вы можете почувствовать, что ваши друзья не ценят вас, или что вы находитесь не в той группе.\n· Ключевые слова: препятствия через отношения, проверка на верность.", "s2": "Сфера жизни: НАЙДХАНИ (финансовые потери, долги, нестабильность)\n· Сфера: траты, кредиты, убытки.\n· Что происходит: несмотря на то что Анурадха — накшатра дружбы, Найдхани переводит её в финансовую плоскость. Это означает, что вы можете потерять деньги из-за друзей или коллективных решений. Например, вам предложат «вложиться в общее дело», и это обернётся убытком. Или вы одолжите деньги товарищу, и он не вернёт.\n· Пример: в этот день вы подписываете договор с партнёром, но потом обнаруживаете скрытые условия. Или вам сообщают, что ваш вклад в общий проект не окупится.", "s3": "Специальная накшатра: ДЕША\n· Значение: «страна, родина, связь с отечеством».\n· Нюанс: Деша-накшатра показывает вашу связь с землёй, на которой вы живёте. Если она ослаблена транзитом злотворных планет (Сатурн, Солнце, Марс, Раху, Кету), это может привести к отчуждению от страны — например, к вынужденной эмиграции, проблемам с гражданством, или к чувству, что вы «чужой» на своей земле. В Анурадхе это может проявиться как конфликт с культурной средой или с коллективом, основанным на национальных признаках.\n4.", "tier": "free" }, "13": { "s1": "Тара-бала: КШЕМА-ТАРА (4-я позиция)\n· Благоприятность: благоприятная.\n· Смысл: безопасность, стабильность, долгосрочные проекты.\n· Влияние: в Джьештхе это означает, что ваша власть может быть узаконена и укреплена. Вы можете получить признание, повышение, или защиту от тех, кто выше вас. Кшема-тара здесь — это время, когда вы «садитесь на трон»\nофициально.\n· Ключевые слова: стабильность через авторитет, защита статуса.", "s2": "Сфера жизни: ВЬЯЯ (расходы, траты, экономия)\n· Сфера: крупные вынужденные траты, ремонт, лечение, обучение.\n· Что происходит: несмотря на Кшема-тару, Вьяя указывает на то, что для укрепления статуса вам придётся тратить. Это может быть ремонт в офисе, покупка машины для статуса, или вложение в свой имидж. Но также это могут быть внезапные расходы на подчинённых или на семью.\n· Пример: в этот день вы получаете повышение, но тут же приходится тратить на новый костюм и представительские расходы.", "s3": "Специальная накшатра: АБХИШЕКА\n· Значение: «коронация, власть, авторитет». Также называется Раджья Накшатра (Накшатра царства).\n· Нюанс: эта накшатра связана с официальным признанием вашей власти.\nЕсли она сильна, вы можете получить титул, звание, пост. Если слаба (поражена вредителями), ваше правление может быть оспорено. В Джьештхе это означает, что ваш статус может быть подтверждён, но только если вы прошли через испытания.\n4.", "tier": "free" }, "14": { "s1": "Тара-бала: ПРАТЬЯК-ТАРА (5-я позиция)\n· Благоприятность: неблагоприятная.\n· Смысл: противодействие, обратный поток, застревание, активизация врагов.\n· Влияние: в Муле это означает, что ваше желание разрушить старые структуры встретит сильное сопротивление. Вместо того чтобы легко освободиться, вы будете сталкиваться с «корнями», которые не хотят отпускать. Это может быть утомительно, но необходимо.\n· Ключевые слова: сопротивление разрушению, кармические корни, борьба с прошлым.", "s2": "Сфера жизни: ЛАБХА (прибыль, выгода, успех в начинаниях)\n· Сфера: доход, прибыль, материальная выгода.\n· Что происходит: это один из немногих случаев, когда разрушение приносит деньги. Лабха в Муле означает, что вы можете получить прибыль от ликвидации старого — например, продажа наследства, снос здания, расчистка земли, закрытие убыточного бизнеса. Или вы получаете доход от работы с «корнями» — журналистские расследования, психотерапия, археология.\n· Пример: вы закрываете невыгодный проект, но находите покупателя на его активы. Или вы отказываетесь от старых привычек, и экономия превращается в доход.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "15": { "s1": "Тара-бала: САДХАНА-ТАРА (6-я позиция)\n· Благоприятность: очень благоприятная.\n· Смысл: продуктивность, достижение целей, дисциплина.\n· Влияние: в Пурва-Ашадхе это означает, что ваши усилия по очищению будут вознаграждены. Вы получите результат за свои прошлые труды — особенно если вы «смыли» с себя чужое влияние. Садхана здесь как водный поток, который несёт вас к успеху.\n· Ключевые слова: успех через очищение, непобедимость.", "s2": "Сфера жизни: ВИЛАКШАНА (необычные события, экстраординарные ситуации)\n· Сфера: нестандартные события, неожиданные встречи, переезды, изменения.\n· Что происходит: Пурва-Ашадха здесь активирует зону сюрпризов. Это не просто «удача» — это ситуация, которая выводит вас из рутины. Вы можете внезапно уехать, сменить сферу деятельности, получить приглашение на неожиданный проект.\n· Пример: в этот день вы получаете неожиданное приглашение на международную конференцию, или случайно встречаете человека, который предлагает вам кардинально иной путь.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "16": { "s1": "Тара-бала: НАЙДХАНА-ТАРА (7-я позиция)\n· Благоприятность: неблагоприятная (самая тяжёлая).\n· Смысл: разрушение, завершение, кармическая разрядка, потери.\n· Влияние: в Уттара-Ашадхе это означает, что нечто подходит к концу, и это неизбежно. Это может быть завершение карьеры, отношений, этапа жизни.\nОднако, в отличие от других Найдхана-тар, здесь это не трагедия, а скорее «закрытие гештальта» — вы завершаете то, что уже не может быть продолжено.\n· Ключевые слова: завершение как победа, конец как исторический факт.", "s2": "Сфера жизни: ШУБХА (благоприятные возможности, удача, радость)\n· Сфера: удача, везение, лёгкий успех.\n· Что происходит: несмотря на Найдхана-тару, Шубха говорит, что завершение приносит радость. Вы можете потерять должность, но получить предложение лучше. Вы можете завершить отношения, но освободиться для новых. Это не «удача», а «правильность» — мир подтверждает, что вы всё сделали верно.\n· Пример: вы увольняетесь, и на следующий день вам звонят с более выгодным предложением. Или вы выигрываете в суде дело, которое давно вас тяготило.", "s3": "Специальная накшатра: САНГХАТИК\n· Значение: репутация в обществе, социальный статус.\n· Нюанс: эта накшатра показывает вашу репутацию среди людей. Если через неё проходят злотворные планеты (Марс, Сатурн, Раху, Кету), это может привести к потере репутации, скандалам, клевете. Если благие — к укреплению авторитета. В Уттара-Ашадхе ваш итоговый результат будет оценён обществом, и эта оценка станет частью вашей легенды.\n4.", "tier": "free" }, "17": { "s1": "Тара-бала: НЕ УЧИТЫВАЕТСЯ (в системе 27 накшатр её нет)", "s2": "Сфера жизни: НЕ УЧИТЫВАЕТСЯ (в системе 27 накшатр её нет)", "s3": "Специальная накшатра: НЕ ЯВЛЯЕТСЯ СПЕЦИАЛЬНОЙ (не входит в перечень: Джанма, Джати, Найдхана и т.д.) 4.", "tier": "free" }, "18": { "s1": "Тара-бала: МИТРА-ТАРА (8-я позиция)\n· Благоприятность: благоприятная.\n· Смысл: дружба, гармония, поддержка, доброжелательность окружения.\n· Влияние: в Шраване это означает, что вы будете услышаны и поняты. Люди будут открыты к диалогу, и ваши слова обретут нужную силу. Это благоприятный день для переговоров, консультаций, обучения. Вы можете получить важную информацию, которая изменит вашу ситуацию.\n· Ключевые слова: быть услышанным, общение, поддержка через слово.", "s2": "Сфера жизни: ШУБХА-КРИТА (помощь от других, благотворительность, социальное признание)\n· Сфера: добрые дела, помощь со стороны, признание общества.\n· Что происходит: Шравана здесь активирует тему «добрых поступков, которые возвращаются к вам». Вы можете получить помощь от неожиданного источника, или ваша репутация доброго человека принесёт вам дивиденды.\nТакже это день, когда можно заняться благотворительностью — это усилит вашу карму.\n· Пример: в этот день вы даёте совет другу, а потом он помогает вам в трудной ситуации; или вы жертвуете на благотворительность, и затем получаете неожиданную прибыль.", "s3": "Специальная накшатра: САМУДАЙК (связана с партнёрствами и союзами)\n· Значение: споры, конфликты с партнёрами по бизнесу или супругом.\n· Нюанс: эта накшатра показывает вашу способность поддерживать отношения. Её слабость (влияние Сатурна, Марса, Раху, Кету) может привести к разрывам и конфликтам. В Шраване это означает, что даже в дни гармоничного общения может всплыть старая обида или недопонимание с партнёром. Это не обязательно разрыв, но проверка на прочность.\n4.", "tier": "free" }, "19": { "s1": "Тара-бала: ПАРАМА-МИТРА-ТАРА (9-я позиция)\n· Благоприятность: лучшая из всех, абсолютно благоприятная.\n· Смысл: высшая удача, поддержка божественных сил, успех без усилий.\n· Влияние: в Дхаништхе это означает, что вы можете достичь успеха почти без усилий — через правильный ритм, правильную команду, правильное время.\nЕсли вы встроены в ритм мира, мир понесёт вас к богатству.\n· Ключевые слова: удача через ритм, признание в коллективе, скрытое богатство.", "s2": "Сфера жизни: СУКХА (удовольствия, комфорт, гармония в отношениях)\n· Сфера: счастье, наслаждение, творчество, романтика.\n· Что происходит: это время для радости, праздника, получения удовольствия от жизни. Дхаништха здесь дарит «барабанное» наслаждение — например, вы получаете удовольствие от музыки, танцев, физической активности, близости.\n· Пример: вы идёте на концерт, получаете хорошие новости, встречаете друга, с которым легко и весело.", "s3": "Специальная накшатра: АДХАН\n· Значение: нестабильность в жилье, частые переезды.\n· Нюанс: эта накшатра показывает связь с домом. Её слабость (влияние вредителей) может привести к переездам, ремонтам, проблемам с недвижимостью. В Дхаништхе это означает, что даже в день удачи и веселья может всплыть вопрос о доме — например, вам позвонят из риэлторской компании, или вы решите сменить квартиру.\n4.", "tier": "free" }, "20": { "s1": "Тара-бала: ДЖАНМА-ТАРА (1-я позиция)\n· Благоприятность: нейтральная (смешанная).\n· Смысл: активация личности, тела, идентичности.\n· Влияние: в Шатабхише это означает, что вы будете особенно остро ощущать свою отдельность от других. Это может дать ощущение силы, но также и одиночества. Вам захочется уединиться или, наоборот, ярко заявить о себе, но через тайный, неочевидный способ.\n· Ключевые слова: личность через изоляцию, целебная сила одиночества.", "s2": "Сфера жизни: МРИТЬЮ (трансформация, завершение циклов, кризисы)\n· Сфера: глубокие изменения, переходы, конец старого этапа.\n· Что происходит: Шатабхиша здесь активирует зону «малой смерти» — старые привычки, отношения, проекты могут уйти, освобождая место для нового. Это не физическая смерть, а «отмирание» того, что больше не работает.\n· Пример: вы решаете завершить курс лечения, уйти с работы, разорвать отношения, которые вас истощают. Или, наоборот, вы выходите из изоляции и начинаете новую жизнь.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "21": { "s1": "Тара-бала: САМПАТ-ТАРА (2-я позиция)\n· Благоприятность: очень благоприятная.\n· Смысл: богатство, ресурсы, финансовая интуиция.\n· Влияние: в Пурва-Бхадрападе это означает, что ваше бунтарское поведение может принести деньги. Вы можете получить прибыль от нестандартных проектов, от радикальных идей, от отказа от традиционных путей. Это «деньги за смелость».\n· Ключевые слова: деньги через радикализм, жертва как инвестиция.", "s2": "Сфера жизни: АРТХА (карьера, материальные цели, профессиональные достижения)\n· Сфера: работа, амбиции, социальный рост.\n· Что происходит: вы можете использовать свою «огненную» энергию для достижения карьерных высот. Это день для подачи инициатив, презентаций, публичных заявлений. Ваша уверенность будет подкупать.\n· Пример: вы выступаете с инновационным предложением, и оно принимается; вы заявляете о своей позиции, и она укрепляет ваш авторитет.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "22": { "s1": "Тара-бала: ВИПАТ-ТАРА (3-я позиция)\n· Благоприятность: неблагоприятная.\n· Смысл: препятствия, блоки, испытания.\n· Влияние: в Уттара-Бхадрападе это означает, что ваше желание уйти в тишину и созерцание может быть нарушено внешними обстоятельствами. Вас будут \"дёргать\" — работа, семья, долги. Это не наказание, а проверка: можете ли вы сохранить глубину, даже когда мир шумит?\n· Ключевые слова: препятствия через шум мира, испытание на глубину.", "s2": "Сфера жизни: ПАРА-АРТХА (высшие ценности, альтруизм, служение)\n· Сфера: благотворительность, помощь, безвозмездное служение.\n· Что происходит: несмотря на Випат-тару, вы можете найти выход через служение. Если мир создаёт вам препятствия — лучшее, что вы можете сделать, это переключиться на помощь другим. Это снимет блокировку.\n· Пример: вы чувствуете усталость от работы — помогаете коллеге, и проблемы решаются. У вас проблемы в семье — вы идете в волонтёры, и в семье становится легче.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "23": { "s1": "Тара-бала: КШЕМА-ТАРА (4-я позиция)\n· Благоприятность: благоприятная.\n· Смысл: безопасность, стабильность, долгосрочные проекты.\n· Влияние: в Ревати это означает, что вы можете получить стабильность через завершение старого. Например, вы заканчиваете один проект и тут же находите другой; вы увольняетесь с работы, но получаете выходное пособие.\nКшема здесь — это \"защита при переходе\".\n· Ключевые слова: стабильность через завершение, защита на границе.", "s2": "Сфера жизни: ДХАНА (накопления, инвестиции, недвижимость)\n· Сфера: деньги, сбережения, имущество.\n· Что происходит: Ревати здесь активирует зону накоплений. Это может быть завершение старого долга (вам возвращают деньги), получение наследства, или начало нового этапа в финансовых инвестициях.\n· Пример: вы закрываете старый банковский счёт и получаете остаток; вы заканчиваете кредит и чувствуете облегчение; вы покупаете первый дом.", "s3": "Специальная накшатра: ВАЙНАШИК\n· Значение: проблемы со здоровьем, конфликты с близкими.\n· Нюанс: эта накшатра связана с потерями и расставаниями. Если она слаба (поражена вредителями), могут быть проблемы со здоровьем и ссоры с родными. В Ревати это означает, что даже в день стабильности и накоплений могут быть конфликты из-за денег с близкими.\n4.", "tier": "free" }, "24": { "s1": "Тара-бала: ПРАТЬЯК-ТАРА (5-я позиция)\n· Благоприятность: неблагоприятная.\n· Смысл: противодействие, застревание, обратный поток, скрытые враги.\n· Влияние: в Ашвини это означает, что ваша инициатива встретит неожиданное сопротивление. Вы хотите быстро начать, а мир говорит: \"Стой, проверь документы\". Это может вызывать раздражение, особенно если вы привыкли действовать быстро.\n· Ключевые слова: инициатива блокируется, проверка на скорость.", "s2": "Сфера жизни: МАХА-ДХАНА (крупные финансы, наследство, бонусы)\n· Сфера: большие деньги, выигрыши, наследство, крупные инвестиции.\n· Что происходит: Ашвини здесь парадоксально связана с большими деньгами. Это может быть внезапное поступление, но Пратьяк-тара говорит, что оно будет задержано, или потребует дополнительной документации.\n· Пример: вы выигрываете в лотерею, но деньги приходят с опозданием; вам предлагают крупный грант, но бумаги теряются.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "25": { "s1": "Тара-бала: САДХАНА-ТАРА (6-я позиция)\n· Благоприятность: очень благоприятная.\n· Смысл: продуктивность, достижение целей, дисциплина.\n· Влияние: в Бхарани это означает, что вы можете достичь своей цели через усилия, которые могут быть тяжёлыми. Садхана здесь требует полной отдачи — вы будете пахать, но результат будет кармически значимым.\n· Ключевые слова: успех через страдание, дисциплина смерти.", "s2": "Сфера жизни: АНГАРАКША (аварии, травмы, необходимость осторожности)\n· Сфера: риск травм, ДТП, конфликты.\n· Что происходит: это напрямую связано с Бхарани — накшатрой Ямы. В период её транзита повышается риск несчастных случаев, особенно связанных с огнём, порезами, столкновениями. Это требует повышенной осознанности.\n· Пример: вы можете порезаться, обжечься, попасть в аварию — если не будете внимательны.", "s3": "Специальная накшатра: МАНАСА (умственное напряжение, горе)\n· Значение: психологическое давление, душевная боль, тревога.\n· Нюанс: эта накшатра показывает уязвимость психики. Если она слаба (поражена вредителями), человек может испытывать сильное умственное напряжение, чувство вины, депрессию. В Бхарани это означает, что даже в день успеха вы можете переживать внутренний кризис — \"Стоит ли оно того?\".\n4.", "tier": "free" }, "26": { "s1": "Тара-бала: НАЙДХАНА-ТАРА (7-я позиция)\n· Благоприятность: неблагоприятная, самая тяжёлая.\n· Смысл: разрушение, завершение, кармическая разрядка.\n· Влияние: в Криттике это означает, что старое будет сожжено дотла. Это может быть увольнение, разрыв, болезнь, финансовый крах. Но это не наказание — это необходимое очищение.\n· Ключевые слова: сжигание дотла, принудительная трансформация.", "s2": "Сфера жизни: РАНДХРА (тайны, скрытые знания, секреты)\n· Сфера: тайны, раскрытие скрытого, работа с подсознанием.\n· Что происходит: во время транзита Критики могут вскрыться тайны — ваши или чужие. Вы можете узнать правду, которая давно скрывалась. Это может быть шоком, но это также освобождение.\n· Пример: вы узнаёте о неверности партнёра, о семейной тайне, или о том, что скрывал ваш начальник.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "27": { "s1": "Тара-бала: МИТРА-ТАРА (8-я позиция)\n· Благоприятность: благоприятная.\n· Смысл: дружба, поддержка, гармония.\n· Влияние: в Рохини это означает, что через общение и сотрудничество вы сможете достичь изобилия. Друзья могут помочь вам с едой, деньгами, проектами.\n· Ключевые слова: поддержка через дружбу, совместный рост.", "s2": "Сфера жизни: ЙОГА-КШЕМА (баланс между усилиями и результатами, стабильность)\n· Сфера: поддержание стабильности, долгосрочные вложения.\n· Что происходит: Рохини здесь говорит: \"Ты уже достаточно сделал, теперь поддерживай урожай\". Это время не для борьбы, а для ухода за тем, что уже выросло. Это пассивный доход, поддержание порядка, рутинная забота.\n· Пример: вы пожинаете плоды своих прошлых инвестиций, поддерживаете отношения, укрепляете здоровье.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" }, "28": { "s1": "Тара-бала: ПАРАМА-МИТРА-ТАРА (9-я позиция)\n· Благоприятность: лучшая из всех, абсолютно благоприятная.\n· Смысл: высшая удача, поддержка божественных сил, успех без усилий.\n· Влияние: в Мригашире это означает, что любые ваши поиски будут успешными. Если вы ищете работу, партнёра, знания, ответы — они придут легко. Парама-Митра здесь даёт \"ветер в спину\".\n· Ключевые слова: удача в поиске, невероятное везение, лёгкость на пути.", "s2": "Сфера жизни: АГНИ (энергия, решительность, преодоление препятствий)\n· Сфера: внутренняя сила, способность действовать, преодолевать блоки.\n· Что происходит: Мригашира здесь активирует вашу внутреннюю энергию.\nЭто не агрессия, а именно решительность и горение. Вы чувствуете себя способным свернуть горы, чтобы достичь своей цели.\n· Пример: вы находите в себе силы завершить долгострой, начать новый проект, преодолеть страх.", "s3": "Специальная накшатра: нет.\n4.", "tier": "free" } };
const PACK2_NAK = { "5": { "name": "АРДРА", "base": "· Управитель: Раху\n· Божество: Рудра (Шива-разрушитель)\n· Символ: Слеза, алмаз, молния\n· Стихия: Вода\n· Природа: Тикшна (острая, резкая)\n· Каста: Млеччха (вне каст)\n· Качество: Кшаттра (воинское)\n· Звук: Ку, Кхи, Кху, Кхе", "key": "«Гроза, разрушение иллюзий, слезы трансформации». Ардра — это накшатра кризиса, который необходим для очищения. Как алмаз, она режет только алмазом — то есть встречает ложь и рассекает её безжалостно, но делает это не из жестокости, а из верности истине. Однако этот процесс почти всегда болезнен и связан с эмоциональным надрывом. Человек с Луной в Ардре воспринимает мир через призму реальности, которая «ранена», но именно эта рана делает его зрячим.", "prog": "Луна попадает в Ардру:\nЭмоциональный фон:\n· Обострённое восприятие — всё кажется «слишком». Слишком громко, слишком остро, слишком больно.\n· Возможны слёзы без явной причины, вспышки гнева, желание всё разрушить, либо, наоборот, апатия и отстранённость.\n· Люди с Ардрой в транзите могут быть резки в словах, безжалостно говорить правду в лицо — и потом жалеть об этом, но в момент не могут сдержаться.\n· Внимание к снам — они могут быть тяжёлыми, архетипическими, с образами воды, огня, разрушения.\nФизическое состояние:\n· Уязвимость к инфекциям, отравлениям, аллергическим реакциям (особенно если транзитный аспект от Раху).\n· Повышенная утомляемость.\n· Возможны головные боли, напряжение в шее и плечах (зона Рудры).\nВ сфере действий:\n· Благоприятно: любая работа с внутренним миром — медитация, дневник, расстановки, психотерапия, массажи, водные процедуры, аюрведа. Хорошо для завершения старых циклов (ритуально попрощаться с чем-то).\n· Неблагоприятно: начинать бизнес, брать кредиты, выяснять отношения с авторитетами (начальством, государством), рисковать в дороге, участвовать в конфликтах. Даже бытовые ссоры в этот день оставляют глубокий след.\nСвязь с другими слоями:\n· Поскольку это Джанма-тара, любые события в этот день резонируют с «базовой настройкой» человека. То, что случится — может показаться случайным, но это прямое эхо его кармического узла. Это день для принятия себя, но не для принятия решений.\nБ. Если через Ардру транзитирует планета (не Луна):\nСолнце: усиление эго, желание всё контролировать. Может дать творческий прорыв, но также — конфликт с отцом или начальством. Риск тепловых ударов, ожогов.\nМарс: агрессивная энергия, риск травм, порезов, ДТП. Человек становится резче, может спровоцировать драку или конфликт. Хорошо для соревнований, плохо для переговоров.", "trans": "Сатурн: депрессивный фон, чувство вины, подавленность. Может принести новости о болезнях или смертях. Требует уединения и молитвы.\nРаху: иллюзии усиливаются — может казаться, что мир рушится, хотя это не так. Возможны панические атаки, паранойя, сильная тревога. Опасность отравлений, мошенничества.\nКету: отстранённость, желание уйти в аскезу. Может быть разрыв отношений или потеря контакта с реальностью. Но также — глубокие инсайты, прозрения.\nЮпитер: смягчает остроту. Даёт защиту и мудрость. В этот день можно получить совет или защиту от наставника. Усиливается понимание кармы.\nВенера: добавляет чувственности, но в Ардре это скорее надломленная чувственность — любовь с трагическим оттенком. Хорошо для творчества, плохо для романтических начал (могут быть слёзными).\nМеркурий: рационализация эмоций. Человек может говорить колкости, но осознанно. Хорошо для аналитики и письма, плохо для переговоров — слова ранят.\nОСОБЫЙ НЮАНС (СПЕЦИФИКА ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ) Для человека, рождённого в Ардре, транзит Луны по Ардре — это «день рождения души». В этот день его внутренний компас обостряется до предела.\nОн может:\n· Чётко увидеть, кто ему друг, а кто враг.\n· Принять решение, которое давно откладывал, — именно в этот день оно будет «необратимым».\n· Физически ощутить свои кармические долги.\nОднако это также день, когда нельзя принимать быстрых решений, потому что эмоциональный фон искажён болью. Всё, что решено в Ардру, должно быть перепроверено на следующий день.", "mark": "🌩 Ардра | Джанма | Личность/тело | Очищение через кризис | Слёзы или прорыв | Не начинать — только рефлексия", "tier": "free" }, "6": { "name": "ПУНАРВАСУ", "base": "· Управитель: Юпитер (Гуру)\n· Божество: Адити (Мать богов, бесконечность, изобилие)\n· Символ: Лук, колчан со стрелами, хижина из бамбука (возвращение к корням)\n· Стихия: Воздух (легкая, подвижная)\n· Природа: Тикшна (острая, пронзительная)\n· Каста: Вайшья (торговцы, обмен)\n· Качество: Дхана (богатство, щедрость)\n· Звук: Ке, Ко, Ха, Хи", "key": "«Возвращение, обновление, восстановление после потери». Пунарвасу — накшатра «возвращения к жизни». Как бамбук, который гнется под ветром, но не ломается, она дает способность восстанавливаться после ударов судьбы. Это не просто выживание, а повторное рождение — часто через смену веры, возвращение к истокам, переосмысление пройденного пути. Адити — божество безграничного пространства — дарует человеку способность всё начинать заново, но не забывая прошлого, а интегрируя его.\nНа уровне личности: человек с акцентом на Пунарвасу умеет превращать поражения в паузу перед новым рывком. Это «возвращенцы»: те, кто меняет профессию, возвращается в родной город, восстанавливает разрушенные отношения или находит новый смысл в старых ритуалах.", "prog": "Влияние транзита: когда транзитная Луна проходит Пунарвасу, Гулика активируется как «закольцованное событие». Это день, когда повторяется какая-то старая финансовая история: возвращается должник, приходит предложение о кредите, всплывает спор о наследстве. Или — опять начинаете «новую жизнь» (диета, финансовая дисциплина), но внутри знаете, что это уже было.\n5. 4 Лагны: нет.\nДЕТАЛЬНОЕ ПРОГНОСТИЧЕСКОЕ ЗНАЧЕНИЕ А. Если транзитная Луна попадает в Пунарвасу:\nЭмоциональный фон:\n· Человек чувствует надежду, облегчение. Как будто после долгой зимы наступает весна.\n· Может вернуться интерес к старым увлечениям, желание возобновить отношения, поехать в родные места.\n· Это день ностальгии, но не грустной, а обновляющей. Хочется перечитать дневники, позвонить друзьям детства, пересмотреть старые фотографии.\n· Однако Гулика добавляет лёгкую тревогу: «А не повторится ли то же самое?\nА не обману ли я себя?» — это нормально, это часть цикла.\nФизическое состояние:\n· Улучшается самочувствие — особенно если человек находился в стрессе.\nПунарвасу даёт восстановление после болезней, улучшение аппетита, желание двигаться.\n· Возможны лёгкие аллергические реакции (символ «возврата» — организм может отторгать то, что уже было).\n· Хорошо для начала или смены курса лечения.\nВ сфере действий:\n· Благоприятно: возвращаться — к старым проектам, к переговорам, к отношениям (если есть недосказанность). Хорошо для завершения давних долгов (как денежных, так и эмоциональных). Отличный день для путешествий, особенно тех, которые откладывали. Также — для смены питания, начала курса витаминов, любых восстановительных практик.\n· Неблагоприятно: начинать что-то радикально новое (не связанное с прошлым). Давать в долг без расписки (Гулика закольцует). Принимать важные решения сгоряча — они скорее всего приведут в ту же точку.\n· Нюанс с Гуликой: если в этот день возникают денежные обязательства, они могут «залипнуть» надолго. Лучше отказываться от долгов и кредитов в этот день, если это не экстренно.\nБ. Если через Пунарвасу транзитирует планета (не Луна):\nЮпитер (управитель): усиливает щедрость, желание делиться. Может принести известия о наследстве, подарки, помощь от наставников. Это транзит восстановления справедливости — если был недоплачено, вернут; если было обижено, принесут извинения.", "trans": "Сатурн: замедляет возврат — деньги могут прийти, но с задержкой. Может принести чувство вины из-за прошлых трат. Это хорошее время для пересмотра бюджета, но не для крупных покупок.\nРаху: искажает ощущение «возвращения» — человек может ошибочно воспринимать новое как старое. Опасность: вернуться в токсичные отношения или инвестировать в старую аферу. Нужна ясность.\nКету: отсекает лишнее — можно легко расстаться с тем, что тянуло назад (долги, старые долги, даже моральные обязательства). Это освобождение через возврат.\nМеркурий: возврат к учёбе, переписке, переговорам. Хорошо для возобновления контрактов, которые были заморожены.\nВенера: возврат в отношения — звонок от бывшего партнёра, предложение о помириться. Это не страшно, если есть осознание, что цикл может повториться.\nМарс: возврат к активным действиям — можно снова начать спорт или проекты. Но Гулика предупреждает: если в прошлый раз вы срывались, есть риск снова.\nСолнце: возврат к эго — может быть желание доказать свою правоту, «вернуть себе имя». Хорошо для публичности ОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Для человека с Луной в Ардре — который привык к кризисам и разрушениям, — Пунарвасу может ощущаться как «незнакомое спокойствие». Но именно здесь включается Гулика: ему будет казаться, что «всё слишком хорошо, значит, обман». Он может подсознательно саботировать возврат, искать подвох.\nВажно: Пунарвасу — не накшатра иллюзии, а накшатра восстановления. Для Ардры это редкое окно, когда можно не разрушать, а ремонтировать. Когда не надо резать — можно зашить.\nВ транзите это: день, когда приходит старый друг, возвращается долг, приходит сообщение, что «вас вспомнили». Принимайте это без надрыва. Это не знак, что вы слабы — это знак, что цикл завершён.", "mark": "🌿 Пунарвасу | Сампат | Деньги/ресурсы | Возврат, восстановление, обновление | Гулика: цикл семейных денег |", "tier": "free" }, "7": { "name": "ПУШЬЯ", "base": "· Управитель: Сатурн (Шани)\n· Божество: Брихаспати (Юпитер как наставник богов)\n· Символ: Коровий вымя, лотос, круг (жертвенный алтарь)\n· Стихия: Вода (питательная, текучая)\n· Природа: Мриду (мягкая, нежная, но с глубоким корнем)\n· Каста: Брахман (жреческая, наставническая)\n· Качество: Дхана (богатство)\n· Звук: Ху, Хе, Хо, Да", "key": "«Питание, обучение, покровительство». Пушья — это накшатра кормящей силы. Она не громкая, не яркая, но без неё не вырастет ни одно зерно. Это забота, наставничество, передача знаний через личный пример. Брихаспати (планетарный Юпитер) здесь проявляется не как законодатель, а как заботливый учитель, который держит на коленях ученика и вкладывает знание в самую душу.\nПушья — «золотая накшатра»: считается одной из лучших для духовных практик, обучения, свадеб и начала важных дел (если не поражена). Но в нашем случае она попадает в Випат-тару и несёт Манди (неотвратимый урок).\nТо есть её питательная сила обернута в обязательство заботиться — часто через боль.\nНа уровне личности: человек с акцентом на Пушью часто вынужден учить или учиться, кормить или быть сытым, но всегда с чувством долга. Это «кормильцы», которые могут быть сыты, но не свободны, или наоборот — свободны, но чувствуют вину за то, что не накормили других.", "prog": "Влияние транзита: когда Луна в Пушье, Манди активируется. Это день, когда кто-то будет требовать от вас помощи, или вы сами почувствуете жгучую необходимость помочь. Возможно, проснутся старые обиды на родителей или наставников — или наоборот, вы остро ощутите, что должны им.\n5. 4 Лагны: нет.\nДЕТАЛЬНОЕ ПРОГНОСТИЧЕСКОЕ ЗНАЧЕНИЕ А. Если транзитная Луна попадает в Пушью:\nЭмоциональный фон:\n· Тревожный, но не панический. Вы чувствуете себя ответственным за кого-то или за что-то.\n· Может появиться желание «накормить» (буквально или метафорически) — создать уют, дать совет, утешить.\n· Но внутри сидит Манди: «А достоин ли я этого? А имею ли право? А не отберут ли потом?».\n· Это день, когда вы остро осознаёте свои обязательства — и они могут давить.\nФизическое состояние:\n· Уязвимость желудка, поджелудочной железы, обмена веществ. Пушья управляет пищей и питанием, поэтому возможны проблемы с перееданием, изжога, несварение.\n· Хорошо есть тёплую, мягкую пищу, но важно не переедать.\n· Может быть тяжесть в теле — как от груза чужих обязанностей.\nВ сфере действий:\n· Благоприятно: домашние ритуалы, уборка, приготовление пищи для себя и близких (но в меру). Обучение — если вы учитесь, это время для глубинного понимания; если учите — для терпеливого объяснения. Хорошо для традиционных дел: можно сделать ритуал для предков, помолиться.\n· Неблагоприятно: брать на себя новые обязательства (особенно финансовые).\nНачинать большие проекты — Випат-тара даст задержки. Давать деньги в долг — Манди вернёт урок. Критиковать наставников или родителей — в этот день их слова имеют вес.\n· Нюанс с Манди: если вы чувствуете, что кто-то давит на вашу доброту — это не ваша слабость, это ваш урок. Отказ — не предательство. Но сказать «нет»\nв этот день сложно именно из-за Манди, который внушает вину. Если отказываете — делайте это мягко, но твёрдо.\nБ. Если через Пушью транзитирует планета (не Луна):\nСатурн (управитель): усиливает чувство долга. Может принести известия о госпитализации или необходимости ухода за старшими. Это транзит зрелости — но он режет без ножа. В этот день хорошо брать ответственность, но не новую, а старую — завершить то, что должно быть завершено.\nЮпитер: помогает найти правильного наставника или дать мудрый совет.\nСмягчает Манди — показывает, что забота не должна быть жертвенной. Это время для обучения с радостью.\nРаху: искажает понятие «заботы» — вы можете накормить кого-то, а он укусит. Или дадите совет, который приведёт к беде. Нужна кристальная честность.\nКету: отказ от роли кормильца — может быть разрыв с теми, кто вас эксплуатировал. Освобождение от «долга» — но через боль.\nМеркурий: хорош для переговоров о питании, диете, учёбе. Но осторожно с советами — они могут быть восприняты как нотации.\nВенера: уют и удовольствие от еды, но Манди может заставить вас переедать от стресса.\nМарс: агрессивная забота — вы можете навязывать своё мнение. Это опасно, потому что Випат-тара превратит это в конфликт.\nСолнце: усиливает авторитет, но и ответственность. Может принести необходимость взять опекунство.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это разрушение иллюзий, а Пушья — это иллюзия «должен заботиться». Когда натив с Ардрой попадает в Пушью, он может с особой остротой увидеть, как он тратит себя на тех, кто этого не ценит. Это может быть больно, но это и прозрение.\nМанди в Пушье для Ардры — это момент, когда «кормилец» внутри него встречается с «разрушителем» и начинается внутренний диалог: «Я хочу всё разрушить и уйти» против «Я обязан остаться и накормить». Результат этого транзита зависит от осознанности: если Ардра использует свою способность видеть правду — она сможет отличить реальную заботу от ложного долга.\nВ транзите это день, когда ему предложат роль «спасителя» или «наставника».\nЕсли он согласится, Випат-тара может дать конфликт. Если откажется — Манди оставит чувство вины. Идеальный выход: помочь ровно настолько, чтобы не потерять себя — например, дать не деньги, а время; не совет, а присутствие.", "trans": "", "mark": "🥣 Пушья | Випат | Препятствия | Кормление/обучение как долг | Манди: урок заботы о себе | Осторожно с советами и кредитами", "tier": "free" }, "8": { "name": "АШЛЕША", "base": "· Управитель: Меркурий (Будха)\n· Божество: Сарпа (Змеи, Наги) — мудрость, скрытность, трансформация\n· Символ: Змея, свернувшаяся в кольцо, лотос, колесо\n· Стихия: Вода (глубокая, тёмная, текучая)\n· Природа: Тикшна (острая, пронзительная)\n· Каста: Млеччха (вне каст) — как и Ардра\n· Качество: Раджас (страстное, активное)\n· Звук: Ди, Ду, Де, До", "key": "«Объятия змеи, скрытая мудрость, манипуляция».\nАшлеша — это накшатра змеиной силы. Она не любит открытого конфликта, предпочитает обвиваться, ждать, наблюдать и наносить удар, когда жертва расслабилась. Её мудрость — не в знаниях, а в интуитивном понимании людских слабостей и тайных механизмов. Это накшатра исследователей, психологов, следователей, но также интриганов и манипуляторов.\nНа уровне личности: человек с акцентом на Ашлешу часто обладает гипнотическим взглядом, умеет слушать и хранить тайны, но сам редко раскрываетс ессонница от переизбытка творческих идей – не сопротивляйтесь, просто записывайте.\nВ сфере действий:\n· Благоприятно: всё! Начинать проекты, презентовать себя, вступать в партнёрства, делать инвестиции, создавать произведения искусства, менять внешность, путешествовать, заниматься любовью, заключать договоры.\n· Неблагоприятно: бездействовать. Тратить этот день впустую – почти преступление перед судьбой. Даже если вы просто сидите в кафе, вы будете притягивать удачные знакомства.\n--- Б. Если через Читру транзитирует планета (не Луна):\nМарс (управитель): двойная творческая сила – вы можете построить что-то грандиозное. Но Марс может добавить резкости в иллюзию – убедитесь, что ваш замысел не разрушит реальность.\nВенера: делает образ особенно привлекательным. Это день, когда вы можете влюбить в себя весь мир или создать шедевр.\nЮпитер: удача через знание – вы можете найти мудрого наставника, который направит ваш талант.", "trans": "Сатурн: замедляет, но придаёт весу. Ваша работа будет не только красивой, но и долговечной.\nРаху: иллюзия становится слишком реальной – вы можете увлечься видимостью и потерять суть. Не поддавайтесь самообману.\nКету: отсекает лишнее – вы можете увидеть, что скрывается за красивой формой, и изменить её ради истины.\nМеркурий: хорош для письма, дизайна, архитектурных проектов.\nСолнце: ваше творчество будет замечено на высшем уровне – признание от авторитетов.\n--- ОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра – это истина, Читра – это красота. Натив с Ардрой в Читре может переживать конфликт между правдой и формой. Он привык всё разрушать до голой сути, а здесь его просят создать обёртку, которой не было. Это может быть сложно.\nНо Парама-Митра говорит: эта иллюзия – не обман, а инструмент. Не всё надо показывать голым. Иногда красота – это та же истина, только упакованная так, чтобы её могли воспринять другие. В этот день он может принять, что форма имеет значение, и использовать это для своего блага.\n---", "mark": "💎 Читра | Парама-Митра | Высшая удача | Творчество, красота, иллюзия, архитектура | Идеальный день для начинаний и партнёрства", "tier": "free" }, "14": { "name": "СВАТИ", "base": "· Управитель: Раху (северный лунный узел)\n· Божество: Вайю (бог ветра)\n· Символ: Листок, колеблемый ветром, коралл, молодой побег\n· Стихия: Воздух (подвижная, переменчивая)\n· Природа: Лагху (лёгкая, быстрая) и Тикшна (острая) – быстрая и пронзительная\n· Каста: Вайшья (торговцы, путешественники)\n· Качество: Раджас (активное)\n· Звук: Ру, Ре, Ро, Та", "key": "«Капля росы, независимость, движимая ветром».\nСвати — это накшатра свободы и чистоты. Её символ — листок, который не привязан к дереву, он плывёт по ветру. Это энергия, которая не терпит ограничений, она всегда ищет новое, свежее, непредсказуемое. Вайю — бог ветра — дарует способность двигаться без оглядки, но и без защиты. Это накшатра одиночек, которые не привязываются, но и не держат.\nНа уровне личности: человек с акцентом на Свати часто бывает харизматичным, независимым, но может производить впечатление непостоянного. Он умеет исчезать так же внезапно, как появляться. Его стихия — движение, перемены, дипломатия. В торговле и переговорах он гибок, как ветер. Но его слабость — отсутствие корней.\nВ нашем случае Свати — это Джанма-тара (нейтральное зеркало личности) и Карма-накшатра (специальная). А также — Мритью (упаграха, риск для здоровья/жизни). То есть здесь чистая энергия ветра накладывается на кармические задачи и рискованные темы.\n---", "prog": "Влияние транзита: когда Луна в Свати, этот риск повышается. Вам будет казаться, что вы неуязвимы, и это может привести к опрометчивым решениям.\nМритью здесь не приговор, а предупреждение: ветер может быть ласковым, но он же может снести крышу.\n5. 4 Лагны: нет.\n--- ДЕТАЛЬНОЕ ПРОГНОСТИЧЕСКОЕ ЗНАЧЕНИЕ А. Если транзитная Луна попадает в Свати:\nЭмоциональный фон:\n· Лёгкость, почти эйфория. Хочется свободы, свежего воздуха, новых впечатлений.\n· Может возникнуть желание бросить всё и уехать, порвать отношения, сменить профессию.\n· Одновременно с этим — внутреннее одиночество: вы чувствуете себя «отдельной каплей», которая ни к чему не привязана.\n· Карма-накшатра будет подталкивать к вопросам о призвании. Вам может казаться, что ваше предназначение — именно в движении, в торговле, в посредничестве.\nФизическое состояние:\n· Лёгкость в теле, желание двигаться, дышать полной грудью.\n· Возможна бессонница из-за потока идей.\n· Может быть чувствительность к ветру, погодным изменениям.\nВ сфере действий:\n· Благоприятно: путешествовать, заключать сделки, начинать новые проекты, связанные с движением (логистика, торговля, переговоры). Это отличный день для того, чтобы заявить о себе, но не через силу, а через обаяние и гибкость.\n· Неблагоприятно: принимать решения под влиянием момента. Мритью предупреждает: рискованные любовные приключения и азартные игры могут иметь последствия. Также не стоит в этот день вступать в случайные интимные связи — последствия могут быть тяжёлыми.\n--- Б. Если через Свати транзитирует планета (не Луна):\nРаху (управитель): усиливает иллюзию свободы — вам кажется, что вы выше всех правил. Это может быть успешно, если вы занимаетесь инновациями, но опасно, если вы нарушаете закон.\nВенера: свобода в любви — вы можете встретить кого-то, кто разделяет вашу ветреность. Но Мритью может превратить роман в драму.", "trans": "Сатурн: ветер утихает. Может быть задержка в путешествиях или разочарование в партнёре. Но это хороший день для проверки документов.\nЮпитер: даёт крылья, но не сдувает. Хорошо для обучения через путешествия.\nМеркурий: быстрые переговоры, удачные контракты.\nМарс: ветер становится ураганом — возможны аварии, травмы на скорости.\nМритью здесь особенно актуален.\nСолнце: желание проявить себя как лидера. Карма-накшатра может дать признание.\nКету: отказ от свободы — вы можете выбрать оседлость. Это решение, которое приведёт к освобождению.\n--- ОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это буря, Свати — это ветер. Но Ардра — это вода, которая ищет глубину, а Свати — это воздух, который всегда наверху. Натив с Ардрой в Свати может чувствовать раздвоение: он привык к глубине и кризисам, а его увлекает вверх, в лёгкость и независимость. Это может быть освобождением, но может быть и отрывом от корней.\nКарма-накшатра здесь подсказывает: его призвание — быть посредником между водой и воздухом, между глубиной чувств и лёгкостью ума. Например, он может стать консультантом, дипломатом, психологом, который не берёт на себя чужую тяжесть, а помогает её отпустить.\n---", "mark": "🍃 Свати | Джанма | Личность/свобода | Ветер, независимость, капля росы | Карма: призвание через гибкость | Мритью: риск в любви и азарте", "tier": "free" }, "15": { "name": "ВИШАКХА", "base": "· Управитель: Юпитер (Гуру)\n· Божество: Индра-Агни (бог дождя и бог огня вместе) – союз силы и мощи\n· Символ: Триумфальная арка, ритуальный горшок (чаша)\n· Стихия: Огонь + Вода (противоречивое, но мощное сочетание)\n· Природа: Тикшна (острая) и Лагху (быстрая)\n· Каста: Брахман (жреческая) и Кшатрий (воинская)\n· Качество: Раджас (активное, направленное)\n· Звук: Та, Ти, Ту, Те", "key": "«Целеустремлённость, расщепление опоры, достижение пика». Вишакха — это накшатра амбициозного борца. Она создана для того, чтобы достигать вершины любой ценой. Индра (царь богов) и Агни (огонь) объединяются здесь, чтобы дать человеку огненную волю и способность трансформировать реальность. Но этот путь требует разрушения старой опоры: чтобы взойти на трон, надо разбить яйцо, из которого ты вылупился.\nНа уровне личности: человек с акцентом на Вишакху часто бывает одержим целью. Он может быть жёстким, даже беспощадным к себе и другим. Он не терпит посредственности, всегда идёт до конца. При этом внутри него живёт конфликт между жаждой власти и чувством вины за разрушенные связи. Это накшатра «завоевателей», которые не умеют останавливаться.\nВ нашем случае Вишакха — это Сампат-тара (богатство/ресурсы) и Шата- рудхира (семья/кровные узы). Также она несёт Индрачапу (ложное богатство) и Ардхапрахару (сбои коммуникаций). То есть её амбициозная энергия сталкивается с семейной кармой и риском ошибочных решений.", "prog": "Влияние транзита: когда Луна в Вишакхе, обе упаграхи активируются.\nЧеловек будет рваться к победе, но его могут подвести иллюзорные цели (Индрачапа) и технические сбои (Ардхапрахара).\n5. 4 Лагны: нет.\nДЕТАЛЬНОЕ ПРОГНОСТИЧЕСКОЕ ЗНАЧЕНИЕ А. Если транзитная Луна попадает в Вишакху:\nЭмоциональный фон:\n· Напряжение и азарт. Вы чувствуете, что близки к цели, но внутри — борьба.\n· Желание доказать свою правоту, особенно семье.\n· Может быть гнев, если что-то идёт не по плану.\n· Ощущение, что вы должны победить, иначе всё было зря.\nФизическое состояние:\n· Высокий тонус, но с тенденцией к переутомлению. Энергия расходуется быстро.\n· Может быть напряжение в плечах и челюсти.\n· Хорошо для физических тренировок, но не для риска травм.\nВ сфере действий:\n· Благоприятно: заниматься конкурентными проектами, подавать заявки, просить повышение, начинать борьбу за ресурсы. Это день для тех, кто не боится конфликтов.\n· Неблагоприятно: полагаться на удачу (Индрачапа). Проверять документы 10 раз (Ардхапрахара). Вступать в семейные конфликты без чёткого плана — они могут затянуться.\nБ. Если через Вишакху транзитирует планета (не Луна):\nЮпитер (управитель): усиливает амбиции, но даёт мудрость не разрушать всё вокруг. Хорош для юридических побед.", "trans": "Сатурн: замедляет движение к цели. Вам будет казаться, что вы не двигаетесь. Это проверка на прочность.\nРаху: иллюзия победы — вы можете легко обойти врагов, но потом обнаружить, что цель была не той. Индрачапа здесь особенно опасна.\nКету: отказ от победы — вы можете уйти от борьбы, и это будет мудрым решением.\nМеркурий: двойное внимание к документам — хорошо для контрактов, но проверяйте все цифры.\nМарс: агрессивная энергия — вы можете раздавить конкурентов, но и обжечься.\nСолнце: публичная победа, признание вашей силы.\nВенера: победа через дипломатию, а не через силу.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это разрушение иллюзий, Вишакха — это одержимость победой.\nДля натива с Ардрой в Вишакхе это может быть двойным вызовом: он видит, что цель — иллюзия (Индрачапа), но не может остановиться, потому что Вишакха его «держит».\nЕго задача — не победить, а увидеть истинную цель за амбициями. Возможно, его призвание — не взойти на трон, а разрушить его. Но для этого ему придётся пройти через битву, чтобы понять её бессмысленность.", "mark": "🏹 Вишакха | Сампат | Деньги/ресурсы | Цель любой ценой, борьба, триумф | Шата-рудхира: семейный конфликт | Индрачапа: ложные цели | Ардхапрахара: сбои в документах", "tier": "free" }, "16": { "name": "АНУРАДХА", "base": "· Управитель: Сатурн (Шани)\n· Божество: Митра (бог дружбы и союзов) – одно из проявлений Сурьи, отвечающее за верность и соглашения\n· Символ: Лотос, скрижаль (священный текст), гирлянда, космический корабль\n· Стихия: Вода (глубокая, текучая, но дисциплинированная)\n· Природа: Мриду (мягкая, нежная)\n· Каста: Вайшья (торговцы, обмен)\n· Качество: Раджас (активное, целеустремлённое)\n· Звук: На, Ни, Ну, Не", "key": "«Дружба, посвящение, цветение после вызова».\nАнурадха — это накшатра преданности и круговых связей. Она раскрывается не в одиночестве, а в сообществе, в группе единомышленников. Это накшатра «коллективного лидера» — человека, который ведёт за собой не через доминирование, а через преданность общему делу. Митра (бог дружбы) здесь проявляется как способность быть опорой для других и получать опору от них.\nНа уровне личности: человек с акцентом на Анурадху часто является «душой компании» или неформальным лидером в рабочих коллективах. Он умеет объединять людей, но сам может страдать от одиночества, если его преданность не ценится. Его путь — служение группе, но через это служение он раскрывает свои таланты. Это накшатра, которая требует баланса: не раствориться в других, но и не уйти в гордыню.\nВ нашем случае Анурадха — это Випат-тара (препятствия) и Деша-накшатра (связь с родиной). Также она несёт Упакету (разрыв). То есть её коллективная энергия здесь сталкивается с темами потерь, разрывов и отчуждения.", "prog": "Влияние транзита: когда Луна в Анурадхе, Упакету активируется. Вам может казаться, что вы «держитесь» за коллектив, но внутри будет зреть решение уйти. Это день, когда вы можете уволиться, разорвать партнёрские отношения или отказаться от обязательств, которые тянут вас назад.\nДЕТАЛЬНОЕ ПРОГНОСТИЧЕСКОЕ ЗНАЧЕНИЕ А. Если транзитная Луна попадает в Анурадху:\nЭмоциональный фон:\n· Смесь преданности и усталости. Вы любите свою группу, но чувствуете, что она вас истощает.\n· Может возникнуть обида на друзей, коллег, на «неблагодарное» окружение.\n· Одновременно — желание защитить то, что вы построили вместе, даже ценой собственного комфорта.\n· Випат-тара делает этот день эмоционально трудным: вы будете сомневаться, стоит ли продолжать.\nФизическое состояние:\n· Тяжесть в груди, в зоне сердца (Анурадха управляет эмоциональными связями).\n· Возможны простуды, воспаления лимфоузлов.\n· Хорошо для отдыха в кругу семьи, но не для активных действий.\nВ сфере действий:\n· Благоприятно: завершать старые проекты, платить долги, прощать обидчиков. Это время для очищения отношений через разрывы, но без скандалов.\n· Неблагоприятно: начинать новые партнёрства, вкладываться в общие дела, давать обещания. Упакету говорит, что, возможно, вас ждёт разрыв, но он будет освобождающим.\nБ. Если через Анурадху транзитирует планета (не Луна):\nСатурн (управитель): делает разрыв неизбежным. Если вы давно думали об уходе с работы или из отношений, именно сейчас придут обстоятельства, которые это оформят.\nРаху: искажает чувство группы — вам может казаться, что вы в центре, но на самом деле вас используют. Упакету предупреждает: разрыв будет внезапным.\nКету: отсекает связи, но без боли — вы просто перестаёте нуждаться в коллективе.\nЮпитер: помогает найти мудрость в разрыве. Вы можете уйти с витель: Брахма (в некоторых интерпретациях — Кету/Луна)\n· Божество: Кришна (в вишнуитской традиции) или Брахма (как творец)\n· Символ: Три шага Вишну (всё пространство)\n· Позиция: Между Уттара-Ашадхой (16) и Шраваной (18), примерно 6°40' (обычно её выделяют как 28-я).\n· Стихия: Огонь (небесный, очищающий)\n· Природа: Мриду (мягкая) и Тикшна (острая) — сочетание мягкости и силы\n· Каста: Кшатрий (царская)\n· Качество: Саттва (благость, священство)", "key": "«Божественная победа, несокрушимость, сияние, которое не может быть погашено». Абхиджит — это точка, которая даёт абсолютное покровительство свыше. Она считается очень благоприятной для любых начинаний — если момент выбран правильно, успех практически гарантирован. Её название переводится как «Победоносная» или «Та, что нельзя победить».\nВ классике, если человек рождается под Абхиджит, он считается отмеченным судьбой. Но в нашем случае Абхиджит — это транзитная точка, которая может активировать необычные события.", "prog": "Луна попадает в Абхиджит:\nЭмоциональный фон:\n· Необычное чувство защищённости и уверенности. Вы можете чувствовать себя так, как будто вас ведёт высшая сила.\n· Желание начать что-то важное, знаковое.\n· Может быть ощущение «попадания в струю» — всё складывается легко, без усилий.\n· В отличие от обычных накшатр, Абхиджит не даёт «большой эмоциональности» — она скорее трансцендентна, вы как бы наблюдаете за собой со стороны.\nФизическое состояние:\n· Хорошее, но немного «отстранённое» — вы чувствуете себя здоровым, но не слишком заземлённым.\n· Может быть бессонница от избытка энергии — но не нервная, а восторженная.\nВ сфере действий:\n· Благоприятно: всё, что связано с важными начинаниями. Это самый сильный день для старта бизнеса, бракосочетания, начала нового проекта, зачатия, переезда. Абхиджит считается лучшей точкой для начала дел, которые должны быть успешными и долговечными.\n· Неблагоприятно: ничего — если момент выбран верно, препятствий почти не будет. Единственное предостережение: не начинайте что-то, что противоречит вашей дхарме — Абхиджит усиливает не просто любое действие, а правильное действие.\nБ. Если через Абхиджит транзитирует планета (не Луна):\nПоскольку Абхиджит не является полноценной накшатрой, её прохождение планетами трактуется по-разному в разных школах. Но в нашем подходе она усиливает любой транзит, давая ему благословенный характер. Например:\n· Юпитер в Абхиджит — идеальное время для начала юридических дел, обучения, написания законов.\n· Венера — для свадьбы, творческого проекта.\n· Сатурн — для взятия долгосрочных обязательств, строительства.\n· Раху/Кету — для духовной практики, отшельничества.\n· Марс — для военных действий, но только если они праведны.\n· Солнце — для официального вступления в должность, публичного признания.\n· Меркурий — для начала обучения, торговли, коммуникаций.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это накшатра кризиса и разрушения иллюзий. Абхиджит — это накшатра победы и благословения. Для натива с Ардрой попадание в Абхиджит может быть неожиданно лёгким и светлым переживанием. После бурь Ардры он попадает в «божественный оазис», где всё решается само собой.\nЕсли он долго боролся или страдал, здесь он может получить признание, награду, окончательное решение в свою пользу. Это не время для новых драм — это время, чтобы принять дар.", "trans": "", "mark": "✨ Абхиджит | (нет тары) | (нет сферы) | Божественная победа, абсолютная удача | Идеальный день для начинаний", "tier": "free" }, "22": { "name": "ШРАВАНА", "base": "· Управитель: Луна (Чандра) – в высшем смысле, через Вишну\n· Божество: Вишну (хранитель, поддерживающий вселенную)\n· Символ: Ухо, три стопы Вишну (Шравана = слух)\n· Стихия: Воздух (звук, вибрация) + Вода (интуиция)\n· Природа: Лагху (лёгкая) и Мриду (мягкая)\n· Каста: Брахман (жреческая, наставническая)\n· Качество: Саттва (чистота, гармония)\n· Звук: Де, До, Ча, Чи", "key": "«Слушание, память, распространение учения».\nШравана — это накшатра божественного слуха. Она связана не просто с ушами, а с умением слышать голос судьбы, голос внутреннего наставника, голос мудрости. Вишну здесь проявляется как хранитель традиции, как тот, кто сохраняет знание и передаёт его через слух и память.\nНа уровне личности: человек с акцентом на Шравану часто бывает отличным слушателем, советником, учителем. Он умеет запоминать детали, улавливать интонации, слышать то, что не сказано вслух. Он может быть экспертом в области языков, музыки, устной культуры. Его карма — быть передатчиком знаний, даже если он сам не является их источником.\nВ нашем случае Шравана — это Митра-тара (поддержка) и Самудайк- накшатра (конфликты с партнёрами). То есть здесь гармония слуха и общения может столкнуться с напряжением в отношениях.", "prog": "Луна попадает в Шравану:\nЭмоциональный фон:\n· Спокойная внимательность. Вам хочется слушать и говорить, обмениваться мнениями.\n· Появляется мудрость в словах, вы можете найти нужные аргументы.\n· Может быть желание передать знания кому-то — научить, объяснить, рассказать.\n· Самудайк добавляет лёгкое напряжение: даже в спокойном разговоре вы можете почувствовать, что партнёр не до конца с вами честен.\nФизическое состояние:\n· Хорошая координация ушей и языка — вы хорошо слышите и говорите.\n· Чувствительность к звукам: в этом транзите даже музыка может восприниматься по-новому.\n· Хорошо для занятий музыкой, языками, медитации со звуком.\nВ сфере действий:\n· Благоприятно: переговоры, консультации, обучение, запись знаний. Это день для встреч с друзьями, наставниками, партнёрами — но с акцентом на слушание.\n· Неблагоприятно: игнорировать чужое мнение, перебивать, доказывать свою правоту через крик. Шравана не любит шума — она требует внимательного слушания.\nБ. Если через Шравану транзитирует планета (не Луна):\nЛуна (управитель): двойная чувствительность к словам. Вам нужно быть осторожными в том, что вы говорите — ваши слова могут запомнить надолго.\nМеркурий: идеальное время для письма, переписки, записи лекций.", "trans": "Сатурн: может принести разочарование в партнёре — вы услышите то, что вам не понравится. Это проверка на доверие.\nЮпитер: мудрые советы, хорошее время для начала курса обучения.\nРаху: искажение слов — вас могут не так понять, или вы сами скажете не то.\nБудьте честны.\nКету: уход в молчание — вы можете перестать общаться с кем-то, и это будет освобождением.\nМарс: острые слова, конфликт в диалоге. Самудайк здесь может дать серьёзную ссору.\nВенера: романтическое общение, хорошее время для признаний.\nСолнце: публичная речь — вас могут услышать многие. Хорошо для выступлений.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это крик, Шравана — это слух. Для натива с Ардрой в Шраване это возможность услышать то, что он раньше игнорировал. Его привычка всё разрушать может смениться желанием понять, почему другие чувствуют иначе.\nСамудайк напоминает: даже в день гармонии могут вскрыться старые раны в отношениях. Но если он будет слушать, а не рубить, он сможет исцелить эти раны.", "mark": "👂 Шравана | Митра | Поддержка | Слух, память, учение, наставничество | Самудайк: проверка партнёрства через разговоры", "tier": "free" }, "23": { "name": "ДХАНИШТХА", "base": "· Управитель: Марс (Мангала) — в некоторых школах также Кету\n· Божество: Васу (восемь богов — носителей богатства, света, земли, воды и т.д.)\n· Символ: Барабан (ритм, биение сердца), флейта\n· Стихия: Огонь (пульсирующий, ритмичный)\n· Природа: Лагху (быстрая) и Тикшна (острая)\n· Каста: Вайшья (торговцы, ремесленники, музыканты)\n· Качество: Раджас (активное, деятельное)\n· Звук: Га, Ги, Гу, Ге", "key": "«Скрытое богатство, ритм, слава через коллектив».\nДхаништха — это накшатра музыки, денег и команды. Её символ — барабан, который создаёт ритм, объединяющий людей в единое целое. Это накшатра коллективного действия, где скрытое богатство (деньги, таланты, возможности) раскрывается через согласованную работу.\nНа уровне личности: человек с акцентом на Дхаништху часто бывает харизматичным, энергичным, любит быть в центре событий. Он умеет вдохновлять группу, задавать тон, быть «пульсом» коллектива. Он может быть успешным в музыке, спорте, командных проектах, политике. Его недостаток — он может не замечать тех, кто в тени, и слишком полагаться на свою ударную силу.\nВ нашем случае Дхаништха — это Парама-Митра-тара (наивысшая удача) и Адхан-накшатра (нестабильность жилья). Также она несёт Сукха (удовольствия). То есть здесь ритм удачи сталкивается с нестабильностью дома и необходимостью наслаждаться жизнью.", "prog": "Луна попадает в Дхаништху:\nЭмоциональный фон:\n· Приподнятое настроение, энергия, желание действовать в команде.\n· Вы чувствуете себя «в ритме» — всё происходит как надо, без задержек.\n· Есть потребность в общении, празднике, физической активности.\n· Адхан добавляет лёгкое беспокойство: «А не пора ли сменить жильё?» или «Почему у меня не уютно?».\nФизическое состояние:\n· Отличная физическая форма, желание танцевать, бегать, заниматься спортом.\n· Хорошая координация движений.\n· Будьте осторожны с перегрузками — энергия может быть очень сильной.\nВ сфере действий:\n· Благоприятно: начинать коллективные проекты, выступать, продвигать себя.\nЭто день для творчества, спорта, командной работы. Также хорошо для переговоров и заключения сделок.\n· Неблагоприятно: засиживаться на месте. Дхаништха требует ритма и движения.\nБ. Если через Дхаништху транзитирует планета (не Луна):\nМарс (управитель): усиливает энергию, но может сделать вас чрезмерно напористым. Хорошо для спорта, плохо для дипломатии.", "trans": "Сатурн: замедляет ритм, но придаёт глубину. Хорошо для создания долговременных команд.\nЮпитер: расширяет возможности, даёт признание в коллективе.\nРаху: искажает ритм — вас может увлечь ложный успех. Адхан здесь может дать спонтанное решение переехать, которое окажется ошибочным.\nКету: вы можете выйти из коллектива, и это будет правильным решением.\nМеркурий: хорош для командных переговоров, контрактов.\nВенера: усиливает удовольствия — хорошо для вечеринок, романтики.\nСолнце: вы становитесь лидером команды, получаете публичное признание.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это одиночество, Дхаништха — это команда. Для натива с Ардрой в Дхаништхе это возможность выйти из изоляции и встроиться в коллектив. Его привычка быть «бурей» может найти выход в создании ритма для других.\nАдхан здесь может подсказать, что его дом — это не место, а группа людей.\nВозможно, он почувствует, что его «дом» — это его команда, и переезды не так страшны, если есть единомышленники.", "mark": "🥁 Дхаништха | Парама-Митра | Высшая удача | Ритм, коллектив, скрытое богатство | Адхан: нестабильность дома | Сукха: удовольствия через движение", "tier": "free" }, "24": { "name": "ШАТАБХИША", "base": "· Управитель: Раху (северный лунный узел)\n· Божество: Варуна (бог вод, ночной стражи, целительства, океанских глубин)\n· Символ: Тысяча цветков, пустой круг (цикличность, перерождение), драгоценный камень\n· Стихия: Воздух (холодный, разреженный) + Вода (глубинная, тайная)\n· Природа: Тикшна (острая) и Лагху (быстрая)\n· Каста: Млеччха (вне каст)\n· Качество: Раджас (активное, направленное вглубь)\n· Звук: Га, Ги, Гу, Ге", "key": "«Тысяча целителей, тайна, изоляция во благо».\nШатабхиша — это накшатра целительства и одиночества. Варуна — бог ночного неба и водной бездны — даёт человеку способность видеть скрытое, лечить на глубинном уровне, но требует платы: одиночества. Тысяча цветков означает, что в изоляции раскрываются тысячи талантов, но для этого нужно уйти от мира.\nНа уровне личности: человек с акцентом на Шатабхишу часто бывает талантливым целителем, врачом, астрологом, психологом, или просто человеком, который пережил сильную изоляцию и вышел из неё с даром. Его жизнь может быть связана с ночью, с водой, с тайнами. Он не любит толпу, но может быть очень эффективным в работе один на один.\nВ нашем случае Шатабхиша — это Джанма-тара (личность/идентичность) и Мритью (сфера трансформации). То есть здесь тема личности переплетается с глубокими переменами — возможно, через болезнь или исцеление.", "prog": "Луна попадает в Шатабхишу:\nЭмоциональный фон:\n· Глубокое, почти гипнотическое состояние. Вам хочется уйти в себя, разбираться в своих тайнах.\n· Может быть желание лечить себя или других — но на невербальном, энергетическом уровне.\n· Шатабхиша не терпит поверхностности: в этот день вы не будете терпеть пустые разговоры.\n· Джанма-тара добавляет острую саморефлексию: «Кто я вне общества?\nКакова моя истинная природа?».\nФизическое состояние:\n· Чувствительность к воде, погоде, электричеству (Шатабхиша управляет токами).\n· Может быть тяга к солёной или морской воде.\n· Хорошо для лечения, массажей, водных процедур.\nВ сфере действий:\n· Благоприятно: заниматься целительством, самоанализом, медитацией, сном.\nХорошо для работы с водой, с электричеством, с техникой. Можно начинать тайные проекты — то, что вы не хотите афишировать.\n· Неблагоприятно: быть в центре внимания, участвовать в шумных мероприятиях, давать интервью.\nБ. Если через Шатабхишу транзитирует планета (не Луна):\nРаху (управитель): усиливает тайны, но может дать паранойю — будьте осторожны с интерпретациями.", "trans": "Сатурн: делает изоляцию долгой и вынужденной. Может быть болезнь, которая требует изоляции.\nЮпитер: помогает исцелению, даёт защиту от ночных страхов.\nКету: глубокий уход в себя, возможны экстрасенсорные переживания.\nМеркурий: работа с компьютерами, тонкими энергиями.\nМарс: тайные исследования, но риск поражения электричеством.\nВенера: целительство через искусство, музыку, воду.\nСолнце: вы можете выйти из изоляции и заявить о себе как о целителе.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это буря, Шатабхиша — это глубина. Для натива с Ардрой в Шатабхише это погружение в свои собственные воды. Его привычка разрушать вовне может обернуться внутренним очищением. Это время, когда он может найти исцеление в одиночестве и понять, что его сила — в его тайне.", "mark": "💧 Шатабхиша | Джанма | Личность/изоляция | Тысяча целителей, тайна, ночь, вода | Мритью: трансформация через одиночество", "tier": "free" }, "25": { "name": "ПУРВА-БХАДРАПАДА", "base": "· Управитель: Юпитер (Гуру)\n· Божество: Аджи Экапада («Единоногий козёл» — гневная форма Шивы, уничтожающая зло)\n· Символ: Двуликое лицо, меч (рассекающий), козёл, горящий жертвенник\n· Стихия: Огонь (жертвенный, очищающий)\n· Природа: Тикшна (острая) и Лагху (быстрая)\n· Каста: Брахман (жреческая, но воинственная)\n· Качество: Раджас (активное, страстное)\n· Звук: Се, Со, Да, Ди", "key": "«Горящая жертва, свержение условностей, радикальная вера». Пурва-Бхадрапада — это накшатра революционного огня.\nАджи Экапада — это тот, кто приходит в мир, чтобы сжечь то, что мешает истине. Это не просто разрушение, а жертвоприношение — вы сжигаете что- то важное, чтобы освободить место для высшего.\nНа уровне личности: человек с акцентом на Пурва-Бхадрападу часто бывает бунтарём, который идёт против системы, но не ради хаоса, а ради истины. Он может быть радикальным мыслителем, реформатором, «гласом в пустыне».\nЕго путь — через отказ от старых авторитетов и создание новых.\nВ нашем случае Пурва-Бхадрапада — это Сампат-тара (богатство) и Артха (карьера). Также она несёт Арудха-Лагну (образ в социуме). То есть здесь бунтарский огонь направлен на построение карьеры и создание публичного образа.", "prog": "Луна попадает в Пурва-Бхадрападу:\nЭмоциональный фон:\n· Ярость к несправедливости и желание её исправить.\n· Вы чувствуете себя воином, который готов сражаться за свои идеи.\n· Может быть гнев, но он очищает, а не разрушает.\n· Арудха-Лагна добавляет осознание: «Каким меня видят? Соответствует ли это моей истине?».\nФизическое состояние:\n· Прилив огненной энергии, но она может быстро иссякнуть, если не направить.\n· Жар в теле, возможность гипертонии.\n· Хорошо для физических нагрузок, но не для перегрева.\nВ сфере действий:\n· Благоприятно: начинать новые дела, особенно те, которые связаны с риском и инновациями. Публично заявлять о своих позициях. Заниматься сжиганием старого — разбирать хлам, закрывать проекты.\n· Неблагоприятно: быть послушным и следовать правилам, которые вы считаете несправедливыми. Подавлять свой гнев.\nБ. Если через Пурва-Бхадрападу транзитирует планета (не Луна):\nЮпитер (управитель): добавляет благости — ваша борьба будет законной и принятой.", "trans": "Сатурн: делает огонь холодным — вы будете бороться через терпение, а не через взрыв.\nРаху: может дать иллюзию, что вы боретесь с правильной системой, но на самом деле вы боретесь с тенью.\nКету: отказ от борьбы — вы можете уйти из публичного пространства, и это будет правильным.\nМеркурий: борьба через слово, через статьи, через логику.\nМарс: жертвенный огонь — вы можете принести себя в жертву ради идеи, но будьте осторожны.\nВенера: борьба через искусство, через красоту.\nСолнце: ваша борьба будет замечена на самом верху.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это разрушение, Пурва-Бхадрапада — это жертва. Для натива с Ардрой в Пурва-Бхадрападе это возможность направить свою разрушительную энергию не на людей, а на системы. Он может сжечь то, что ему мешает, и создать новое.\nАрудха-Лагна говорит ему: его образ в глазах других — это образ борца. Он должен использовать это, чтобы строить, а не просто уничтожать.", "mark": "🔥 Пурва-Бхадрапада | Сампат | Богатство | Жертвенный огонь, радикализм, вера | Арудха-Лагна: публичный образ борца | Артха: карьера через инновации", "tier": "free" }, "26": { "name": "УТТАРА-БХАДРАПАДА", "base": "· Управитель: Сатурн (Шани)\n· Божество: Ахир Будхнья (Змей глубин — космический дракон, охраняющий тайны мироздания)\n· Символ: Двуликое лицо, змей, скрижаль (запись судьбы), глубокий колодец\n· Стихия: Вода (глубокая, холодная, бездонная)\n· Природа: Мриду (мягкая, нежная) — но с подводным течением\n· Каста: Брахман (жреческая, тайноведательная)\n· Качество: Саттва (благость, глубина)\n· Звук: Да, Ди, Ду, Де", "key": "«Глубокая опора, созерцание, уход в тень». Уттара- Бхадрапада — это накшадра глубинной мудрости, которая не требует проявления. Если Пурва-Бхадрапада — это огонь жертвоприношения, то Уттара-Бхадрапада — это пепел после него, из которого рождается новая жизнь. Это накшадра \"спокойного принятия\" — здесь нет борьбы, есть только знание.\nНа уровне личности: человек с акцентом на Уттара-Бхадрападу часто бывает философом, отшельником, экспертом по сокровенным знаниям. Он не стремится к лидерству, но его мнение — весомо. Он может долго молчать, но его слова могут изменить жизнь. Его путь — через наблюдение и созерцание.\nВ нашем случае Уттара-Бхадрапада — это Випат-тара (препятствия) и Пара- Артха (служение/альтруизм). Также она несёт Вьятипата (зона риска). То есть здесь глубинная мудрость может быть омрачена препятствиями, но через служение.", "prog": "Влияние транзита: когда Луна в Уттара-Бхадрападе, активируется Вьятипата.\nВ карьере могут возникнуть неожиданные проблемы из-за скрытых факторов.\nЭто требует прозрачности и документирования.\nДЕТАЛЬНОЕ ПРОГНОСТИЧЕСКОЕ ЗНАЧЕНИЕ А. Если транзитная Луна попадает в Уттара-Бхадрападу:\nЭмоциональный фон:\n· Спокойная глубина, но с ноткой тревоги (Вьятипата). Вы чувствуете, что \"под водой\" что-то есть.\n· Желание уйти в себя, но мир не даёт.\n· Может быть чувство, что вас не понимают, или что вы слишком много знаете.\n· Пара-Артха даёт выход: если вы переключитесь на помощь другим, тревога уйдёт.\nФизическое состояние:\n· Чувствительность к погоде, давлению, воде.\n· Может быть отёчность, задержка жидкости.\n· Хорошо для акупрессуры, массажа стоп.\nВ сфере действий:\n· Благоприятно: заниматься благотворительностью, помогать животным, давать мудрые советы. Хорошо для работы с документами — но проверяйте всё! Вьятипата требует точности.\n· Неблагоприятно: доверять устным обещаниям, особенно на работе.\nЗаписывайте всё.\nБ. Если через Уттара-Бхадрападу транзитирует планета (не Луна):\nСатурн (управитель): усиливает глубину и ответственность. Хорошо  Мригаширу транзитирует планета (не Луна):\nМарс (управитель): усиливает энергию и амбиции. Вы можете быть очень продуктивным.", "trans": "Сатурн: замедляет, но даёт глубину поиска. Хорошо для археологии, истории.\nЮпитер: расширяет горизонты — вы можете найти наставника или учителя.\nРаху: искажает направление — вы можете искать не то, что нужно. Будьте честны с собой.\nКету: отказ от поиска — вы можете внезапно прекратить все поиски и найти покой в том, что есть.\nМеркурий: хорош для обучения, поиска информации.\nВенера: поиск красоты и любви — вы можете встретить кого-то особенного.\nСолнце: ваши поиски будут на виду — вы можете стать знаменитым охотником, исследователем.\nОСОБЫЙ НЮАНС ДЛЯ НАТИВА С ЛУНОЙ В АРДРЕ Ардра — это буря, Мригашира — это поиск. Для натива с Ардрой в Мригашире это идеальное завершение цикла. Его обычная разрушительная сила здесь превращается в способность находить новое. Вместо того чтобы крушить, он теперь может выслеживать добычу — новые идеи, возможности, людей.\nПарама-Митра говорит: этот поиск будет удачным. Агни даёт ему силу, чтобы не останавливаться. Это день для начала большого путешествия.", "mark": "🦌 Мригашира | Парама-Митра | Высшая удача | Поиск, любопытство, первозданная природа | Агни: энергия и решительность", "tier": "free" } };

  .ev{display:flex;gap:9px;padding:4px 0;font-size:11px;color:#b9bfce}
