    "\u0427\u0443\u0432\u0441\u0442\u0432\u0430 \u043F\u0440\u043E\u0445\u043E\u0434\u044F\u0442 \u043F\u0440\u043E\u0432\u0435\u0440\u043A\u0443 \u0430\u043D\u0430\u043B\u0438\u0437\u043E\u043C: \u0443\u043C \u0432\u043D\u0438\u043C\u0430\u0442\u0435\u043B\u044C\u043D\u044B\u0439, \u0437\u0430\u0431\u043E\u0442\u043B\u0438\u0432\u044B\u0439 \u0432 \u0434\u0435\u0442\u0430\u043B\u044F\u0445. \u0421\u0438\u043B\u0430 \u2014 \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u043D\u0430\u044F \u043F\u043E\u043C\u043E\u0449\u044C, \u0440\u0438\u0441\u043A \u2014 \u0442\u0440\u0435\u0432\u043E\u0433\u0430 \u043E \u043C\u0435\u043B\u043E\u0447\u0430\u0445.",
    "\u0423\u043C \u0438\u0449\u0435\u0442 \u0433\u0430\u0440\u043C\u043E\u043D\u0438\u044E \u0438 \u043E\u0442\u043A\u043B\u0438\u043A: \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u043D\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u044E\u0442\u0441\u044F \u043D\u0430 \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0430. \u0421\u0438\u043B\u0430 \u2014 \u0434\u0438\u043F\u043B\u043E\u043C\u0430\u0442\u0438\u044F \u0441\u0435\u0440\u0434\u0446\u0430, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0441\u043B\u044B\u0448\u0430\u0442\u044C \u0438 \u0441\u043E\u0431\u0441\u0442\u0432\u0435\u043D\u043D\u044B\u0439 \u0433\u043E\u043B\u043E\u0441.",
    "\u0414\u0435\u0431\u0438\u043B\u0438\u0442\u0430\u0446\u0438\u044F: \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u0433\u043B\u0443\u0431\u043E\u043A\u0438 \u0438 \u0441\u043A\u0440\u044B\u0442\u044B, \u043F\u0435\u0440\u0435\u0436\u0438\u0432\u0430\u043D\u0438\u044F \u0438\u043D\u0442\u0435\u043D\u0441\u0438\u0432\u043D\u044B. \u042D\u0442\u043E \u0433\u043B\u0443\u0431\u0438\u043D\u0430, \u0430 \u043D\u0435 \u0438\u0437\u044A\u044F\u043D: \u0435\u0439 \u043D\u0443\u0436\u043D\u044B \u0434\u043E\u0432\u0435\u0440\u0435\u043D\u043D\u044B\u0435 \u0440\u0443\u0441\u043B\u0430 \u2014 \u0431\u043B\u0438\u0437\u043E\u0441\u0442\u044C, \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u043E, \u043F\u0440\u0430\u043A\u0442\u0438\u043A\u0430.",
    "\u0421\u0435\u0440\u0434\u0446\u0435 \u0438\u0449\u0435\u0442 \u0441\u043C\u044B\u0441\u043B \u0438 \u0433\u043E\u0440\u0438\u0437\u043E\u043D\u0442: \u043E\u043F\u0442\u0438\u043C\u0438\u0437\u043C, \u0432\u0435\u0440\u0430, \u0449\u0435\u0434\u0440\u043E\u0435 \u043D\u0430\u0441\u0442\u0440\u043E\u0435\u043D\u0438\u0435. \u0421\u0438\u043B\u0430 \u2014 \u0432\u043E\u043E\u0434\u0443\u0448\u0435\u0432\u043B\u044F\u0442\u044C, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043D\u0435 \u043E\u0431\u0435\u0449\u0430\u0442\u044C \u0431\u043E\u043B\u044C\u0448\u0435, \u0447\u0435\u043C \u0432\u043C\u0435\u0449\u0430\u0435\u0442 \u0434\u0435\u043D\u044C.",
    "\u0427\u0443\u0432\u0441\u0442\u0432\u0430 \u0441\u0434\u0435\u0440\u0436\u0430\u043D\u043D\u044B \u0438 \u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043D\u043D\u044B: \u0437\u0430\u0431\u043E\u0442\u0430 \u0434\u0435\u043B\u043E\u043C, \u0430 \u043D\u0435 \u0441\u043B\u043E\u0432\u0430\u043C\u0438. \u0421\u0438\u043B\u0430 \u2014 \u043D\u0430\u0434\u0451\u0436\u043D\u043E\u0441\u0442\u044C, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0440\u0430\u0437\u0440\u0435\u0448\u0430\u0442\u044C \u0441\u0435\u0431\u0435 \u043C\u044F\u0433\u043A\u043E\u0441\u0442\u044C.",
    "\u0421\u0435\u0440\u0434\u0446\u0435 \u0441 \u0447\u0435\u043B\u043E\u0432\u0435\u0447\u0435\u0441\u0442\u0432\u043E\u043C: \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u0447\u0435\u0440\u0435\u0437 \u0438\u0434\u0435\u0438, \u0434\u0440\u0443\u0436\u0431\u0443, \u043E\u0431\u0449\u0435\u0435 \u0434\u0435\u043B\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0448\u0438\u0440\u043E\u0442\u0430, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043D\u0435 \u0443\u043B\u0435\u0442\u0430\u0442\u044C \u043E\u0442 \u0431\u043B\u0438\u0437\u043A\u043E\u0433\u043E \u0432 \u0430\u0431\u0441\u0442\u0440\u0430\u043A\u0442\u043D\u043E\u0435.",
    "\u0423\u043C \u0442\u043E\u043D\u043A\u0438\u0439, \u0441\u043E\u0441\u0442\u0440\u0430\u0434\u0430\u044E\u0449\u0438\u0439, \u043F\u0440\u043E\u043D\u0438\u0446\u0430\u0435\u043C\u044B\u0439: \u0447\u0443\u0432\u0441\u0442\u0432\u0443\u0435\u0442 \u0432\u0441\u0435\u0445. \u0421\u0438\u043B\u0430 \u2014 \u044D\u043C\u043F\u0430\u0442\u0438\u044F \u0438 \u0432\u043E\u043E\u0431\u0440\u0430\u0436\u0435\u043D\u0438\u0435, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0443\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u0435, \u0447\u0442\u043E\u0431\u044B \u0432\u0435\u0440\u043D\u0443\u0442\u044C \u0441\u0435\u0431\u044F \u0441\u0435\u0431\u0435."
  ],
  Mars: [
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u0447\u0438\u0441\u0442\u0430\u044F \u044D\u043D\u0435\u0440\u0433\u0438\u044F \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044F \u2014 \u0431\u044B\u0441\u0442\u0440\u044B\u0439 \u0441\u0442\u0430\u0440\u0442, \u043F\u0440\u044F\u043C\u043E\u0442\u0430, \u043E\u0442\u0432\u0430\u0433\u0430. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u0432\u044B\u0434\u0435\u0440\u0436\u043A\u0430 \u043D\u0430 \u0434\u043B\u0438\u043D\u043D\u043E\u0439 \u0434\u0438\u0441\u0442\u0430\u043D\u0446\u0438\u0438.",
    "\u0421\u0438\u043B\u0430 \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u0435\u0442 \u043C\u0435\u0434\u043B\u0435\u043D\u043D\u043E \u0438 \u0432\u0435\u0441\u043E\u043C\u043E: \u0443\u043F\u043E\u0440\u0441\u0442\u0432\u043E \u0441\u0442\u0440\u043E\u0438\u0442\u0435\u043B\u044F. \u0420\u0430\u0437\u0433\u043E\u043D\u044F\u0435\u0442\u0441\u044F \u0434\u043E\u043B\u0433\u043E, \u0437\u0430\u0442\u043E \u043D\u0435 \u043E\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C; \u0431\u0435\u0440\u0435\u0447\u044C \u043E\u0442 \u0443\u043F\u0440\u044F\u043C\u0441\u0442\u0432\u0430 \u0440\u0430\u0434\u0438 \u0443\u043F\u0440\u044F\u043C\u0441\u0442\u0432\u0430.",
    "\u042D\u043D\u0435\u0440\u0433\u0438\u044F \u0443\u0445\u043E\u0434\u0438\u0442 \u0432 \u0441\u043B\u043E\u0432\u043E \u0438 \u043C\u0430\u043D\u0451\u0432\u0440: \u043E\u0441\u0442\u0440\u043E\u0443\u043C\u0438\u0435, \u043B\u043E\u0432\u043A\u043E\u0441\u0442\u044C, \u0441\u043F\u043E\u0440 \u043A\u0430\u043A \u0441\u043F\u043E\u0440\u0442. \u0421\u0438\u043B\u0430 \u2014 \u0431\u044B\u0441\u0442\u0440\u043E\u0442\u0430 \u0440\u0435\u0430\u043A\u0446\u0438\u0438, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0434\u043E\u0432\u043E\u0434\u0438\u0442\u044C \u0434\u043E \u043A\u043E\u043D\u0446\u0430.",
    "\u0414\u0435\u0431\u0438\u043B\u0438\u0442\u0430\u0446\u0438\u044F: \u043D\u0430\u043F\u043E\u0440 \u0433\u0430\u0441\u0438\u0442\u0441\u044F \u0447\u0443\u0432\u0441\u0442\u0432\u0430\u043C\u0438 \u2014 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 \u043D\u0430\u0441\u0442\u0440\u043E\u0435\u043D\u0438\u0435, \u043E\u0431\u0438\u0434\u0443, \u0437\u0430\u0449\u0438\u0442\u0443 \u0441\u0432\u043E\u0438\u0445. \u0421\u0438\u043B\u0430 \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442, \u043A\u043E\u0433\u0434\u0430 \u044D\u043D\u0435\u0440\u0433\u0438\u044F \u043F\u043E\u043B\u0443\u0447\u0430\u0435\u0442 \u0434\u043E\u043C: \u0442\u0435\u043B\u043E, \u043F\u0440\u0430\u043A\u0442\u0438\u043A\u0430, \u0440\u0435\u043C\u0435\u0441\u043B\u043E.",
    "\u0414\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0441 \u0434\u043E\u0441\u0442\u043E\u0438\u043D\u0441\u0442\u0432\u043E\u043C \u0438 \u0436\u0430\u0440\u043E\u043C: \u0441\u043C\u0435\u043B\u043E\u0441\u0442\u044C \u043D\u0430 \u0432\u0438\u0434\u0443, \u0437\u0430\u0449\u0438\u0442\u0430 \u0441\u043B\u0430\u0431\u044B\u0445. \u0421\u0438\u043B\u0430 \u2014 \u0431\u043B\u0430\u0433\u043E\u0440\u043E\u0434\u043D\u044B\u0439 \u043F\u043E\u0440\u044B\u0432, \u0440\u0438\u0441\u043A \u2014 \u0433\u043E\u0440\u0434\u044B\u0439 \u043A\u043E\u043D\u0444\u043B\u0438\u043A\u0442.",
    "\u042D\u043D\u0435\u0440\u0433\u0438\u044F \u0442\u043E\u0447\u043D\u0430\u044F \u0438 \u0440\u0430\u0431\u043E\u0447\u0430\u044F: \u0432\u043E\u0438\u043D \u043F\u043E\u0440\u044F\u0434\u043A\u0430, \u0445\u0438\u0440\u0443\u0440\u0433\u0438\u0447\u0435\u0441\u043A\u0430\u044F \u0430\u043A\u043A\u0443\u0440\u0430\u0442\u043D\u043E\u0441\u0442\u044C. \u0421\u0438\u043B\u0430 \u2014 \u0434\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u0443\u0441\u0438\u043B\u0438\u044F, \u0440\u0438\u0441\u043A \u2014 \u043A\u0440\u0438\u0442\u0438\u0447\u043D\u043E\u0441\u0442\u044C.",
    "\u0414\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0438\u0449\u0435\u0442 \u0431\u0430\u043B\u0430\u043D\u0441\u0430 \u0438 \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0430: \u0431\u043E\u0440\u044C\u0431\u0430 \u0437\u0430 \u0441\u043F\u0440\u0430\u0432\u0435\u0434\u043B\u0438\u0432\u043E\u0441\u0442\u044C. \u0421\u0438\u043B\u0430 \u2014 \u0442\u0430\u043A\u0442\u0438\u043A\u0430, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043D\u0435 \u043E\u0442\u043A\u043B\u0430\u0434\u044B\u0432\u0430\u0442\u044C \u0443\u0434\u0430\u0440 \u0434\u043E \u0438\u0434\u0435\u0430\u043B\u044C\u043D\u044B\u0445 \u0443\u0441\u043B\u043E\u0432\u0438\u0439.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u043A\u043E\u043D\u0446\u0435\u043D\u0442\u0440\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0430\u044F \u043C\u043E\u0449\u044C, \u0431\u0435\u0441\u0441\u0442\u0440\u0430\u0448\u0438\u0435 \u0432 \u0433\u043B\u0443\u0431\u0438\u043D\u0435. \u0421\u0442\u0440\u0430\u0442\u0435\u0433 \u043A\u0440\u0438\u0437\u0438\u0441\u0430; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0432\u044B\u043F\u0443\u0441\u043A\u0430\u0442\u044C \u043F\u0430\u0440 \u0434\u043E \u0432\u0437\u0440\u044B\u0432\u0430.",
    "\u042D\u043D\u0435\u0440\u0433\u0438\u044F \u0437\u0430 \u0438\u0434\u0435\u044E: \u0431\u043E\u0440\u0435\u0446 \u0437\u0430 \u0441\u043C\u044B\u0441\u043B, \u0430\u0437\u0430\u0440\u0442 \u043F\u043E\u0445\u043E\u0434\u0430. \u0421\u0438\u043B\u0430 \u2014 \u0432\u043E\u043E\u0434\u0443\u0448\u0435\u0432\u043B\u0451\u043D\u043D\u043E\u0435 \u0443\u0441\u0438\u043B\u0438\u0435, \u0440\u0438\u0441\u043A \u2014 \u0433\u043E\u0440\u044F\u0447\u043D\u043E\u0441\u0442\u044C \u0432 \u0443\u0431\u0435\u0436\u0434\u0435\u043D\u0438\u044F\u0445.",
    "\u042D\u043A\u0437\u0430\u043B\u044C\u0442\u0430\u0446\u0438\u044F: \u0432\u043E\u043B\u044F \u043A \u0446\u0435\u043B\u0438 \u0434\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0430 \u0438 \u043D\u0435\u0443\u0442\u043E\u043C\u0438\u043C\u0430 \u2014 \u043F\u043E\u043B\u043A\u043E\u0432\u043E\u0434\u0435\u0446. \u041C\u0430\u043A\u0441\u0438\u043C\u0430\u043B\u044C\u043D\u0430\u044F \u044D\u0444\u0444\u0435\u043A\u0442\u0438\u0432\u043D\u043E\u0441\u0442\u044C \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044F; \u0431\u0435\u0440\u0435\u0447\u044C \u043B\u044E\u0434\u0435\u0439 \u0432\u043E\u043A\u0440\u0443\u0433 \u043E\u0442 \u0441\u0432\u043E\u0435\u0439 \u043F\u043B\u0430\u043D\u043A\u0438.",
    "\u042D\u043D\u0435\u0440\u0433\u0438\u044F \u043D\u0430 \u043E\u0431\u0449\u0435\u0435 \u0434\u0435\u043B\u043E \u0438 \u043F\u0435\u0440\u0435\u043C\u0435\u043D\u044B: \u0431\u043E\u0435\u0446 \u0437\u0430 \u0438\u0434\u0435\u044E \u0431\u0443\u0434\u0443\u0449\u0435\u0433\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0443\u043F\u043E\u0440\u0441\u0442\u0432\u043E \u0440\u0435\u0444\u043E\u0440\u043C\u0430\u0442\u043E\u0440\u0430, \u0440\u0438\u0441\u043A \u2014 \u0431\u0443\u043D\u0442 \u0440\u0430\u0434\u0438 \u0431\u0443\u043D\u0442\u0430.",
    "\u0414\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 \u0438\u043D\u0442\u0443\u0438\u0446\u0438\u044E \u0438 \u043E\u0431\u0445\u043E\u0434\u043D\u043E\u0439 \u043C\u0430\u043D\u0451\u0432\u0440: \u0441\u0438\u043B\u0430 \u043C\u044F\u0433\u043A\u0430\u044F, \u043F\u0440\u0438\u043B\u0438\u0432\u0430\u043C\u0438. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u044F\u0441\u043D\u0430\u044F \u0446\u0435\u043B\u044C, \u0438\u043D\u0430\u0447\u0435 \u044D\u043D\u0435\u0440\u0433\u0438\u044F \u0440\u0430\u0441\u0442\u0435\u043A\u0430\u0435\u0442\u0441\u044F."
  ],
  Mercury: [
    "\u0423\u043C \u0431\u044B\u0441\u0442\u0440\u044B\u0439 \u0438 \u0440\u0435\u0448\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0439: \u0441\u0445\u0432\u0430\u0442\u044B\u0432\u0430\u0435\u0442 \u043D\u0430 \u043B\u0435\u0442\u0443, \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u043F\u0440\u044F\u043C\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0441\u043A\u043E\u0440\u043E\u0441\u0442\u044C \u0440\u0435\u0448\u0435\u043D\u0438\u0439, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0434\u043E\u0441\u043B\u0443\u0448\u0438\u0432\u0430\u0442\u044C.",
    "\u041C\u044B\u0448\u043B\u0435\u043D\u0438\u0435 \u043E\u0441\u043D\u043E\u0432\u0430\u0442\u0435\u043B\u044C\u043D\u043E\u0435 \u0438 \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u043D\u043E\u0435: \u0441\u043B\u043E\u0432\u043E \u0438\u043C\u0435\u0435\u0442 \u0432\u0435\u0441 \u0438 \u0446\u0435\u043D\u0443. \u0421\u0438\u043B\u0430 \u2014 \u0437\u0434\u0440\u0430\u0432\u044B\u0439 \u0441\u043C\u044B\u0441\u043B, \u0440\u0438\u0441\u043A \u2014 \u043C\u0435\u0434\u043B\u0435\u043D\u043D\u043E \u043C\u0435\u043D\u044F\u0442\u044C \u043C\u043D\u0435\u043D\u0438\u0435.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u0436\u0438\u0432\u043E\u0439, \u043C\u043D\u043E\u0433\u043E\u043A\u0430\u043D\u0430\u043B\u044C\u043D\u044B\u0439 \u0438\u043D\u0442\u0435\u043B\u043B\u0435\u043A\u0442 \u2014 \u0440\u0435\u0447\u044C, \u0442\u043E\u0440\u0433\u043E\u0432\u043B\u044F, \u043E\u0431\u0443\u0447\u0435\u043D\u0438\u0435. \u0411\u043B\u0435\u0441\u043A \u0443\u043C\u0430; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0444\u043E\u043A\u0443\u0441.",
    "\u0423\u043C \u043E\u043A\u0440\u0430\u0448\u0435\u043D \u0447\u0443\u0432\u0441\u0442\u0432\u043E\u043C \u0438 \u043F\u0430\u043C\u044F\u0442\u044C\u044E: \u043C\u044B\u0448\u043B\u0435\u043D\u0438\u0435 \u043E\u0431\u0440\u0430\u0437\u0430\u043C\u0438, \u0440\u0435\u0447\u044C \u0434\u0443\u0448\u0435\u0432\u043D\u0430\u044F. \u0421\u0438\u043B\u0430 \u2014 \u044D\u043C\u043E\u0446\u0438\u043E\u043D\u0430\u043B\u044C\u043D\u044B\u0439 \u0438\u043D\u0442\u0435\u043B\u043B\u0435\u043A\u0442, \u0440\u0438\u0441\u043A \u2014 \u0441\u0443\u0431\u044A\u0435\u043A\u0442\u0438\u0432\u043D\u043E\u0441\u0442\u044C.",
    "\u041C\u044B\u0441\u043B\u044C \u0441 \u0434\u043E\u0441\u0442\u043E\u0438\u043D\u0441\u0442\u0432\u043E\u043C \u0438 \u0430\u0440\u0442\u0438\u0441\u0442\u0438\u0437\u043C\u043E\u043C: \u0443\u0431\u0435\u0434\u0438\u0442\u0435\u043B\u044C\u043D\u0430\u044F, \u044F\u0440\u043A\u0430\u044F \u0440\u0435\u0447\u044C. \u0421\u0438\u043B\u0430 \u2014 \u0432\u0434\u043E\u0445\u043D\u043E\u0432\u043B\u044F\u0442\u044C \u0441\u043B\u043E\u0432\u043E\u043C, \u0440\u0438\u0441\u043A \u2014 \u0438\u0433\u0440\u0430\u0442\u044C \u043D\u0430 \u043F\u0443\u0431\u043B\u0438\u043A\u0443.",
    "\u042D\u043A\u0437\u0430\u043B\u044C\u0442\u0430\u0446\u0438\u044F \u0438 \u0441\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u0430\u043D\u0430\u043B\u0438\u0442\u0438\u0447\u0435\u0441\u043A\u0438\u0439 \u0443\u043C \u0432\u044B\u0441\u0448\u0435\u0439 \u043F\u0440\u043E\u0431\u044B \u2014 \u0442\u043E\u0447\u043D\u043E\u0441\u0442\u044C, \u0441\u0438\u0441\u0442\u0435\u043C\u0430, \u043C\u0430\u0441\u0442\u0435\u0440\u0441\u0442\u0432\u043E \u0434\u0435\u0442\u0430\u043B\u0435\u0439. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u043D\u0435 \u0440\u0435\u0437\u0430\u0442\u044C \u0436\u0438\u0432\u043E\u0435 \u0441\u043B\u0438\u0448\u043A\u043E\u043C \u0442\u043E\u043D\u043A\u043E.",
    "\u0423\u043C \u0432\u0437\u0432\u0435\u0448\u0438\u0432\u0430\u044E\u0449\u0438\u0439, \u0434\u0438\u043F\u043B\u043E\u043C\u0430\u0442\u0438\u0447\u043D\u044B\u0439: \u0432\u0438\u0434\u0438\u0442 \u043E\u0431\u0435 \u0441\u0442\u043E\u0440\u043E\u043D\u044B. \u0421\u0438\u043B\u0430 \u2014 \u043F\u0435\u0440\u0435\u0433\u043E\u0432\u043E\u0440\u044B, \u0440\u0438\u0441\u043A \u2014 \u0432\u0435\u0447\u043D\u043E\u0435 \xAB\u0441 \u043E\u0434\u043D\u043E\u0439 \u0441\u0442\u043E\u0440\u043E\u043D\u044B\u2026\xBB.",
    "\u0423\u043C-\u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u0442\u0435\u043B\u044C \u0433\u043B\u0443\u0431\u0438\u043D: \u0432\u0438\u0434\u0438\u0442 \u0441\u043A\u0440\u044B\u0442\u043E\u0435, \u0433\u043E\u0432\u043E\u0440\u0438\u0442 \u043F\u043E \u0441\u0443\u0449\u0435\u0441\u0442\u0432\u0443. \u0421\u0438\u043B\u0430 \u2014 \u043F\u0440\u043E\u043D\u0438\u0446\u0430\u0442\u0435\u043B\u044C\u043D\u043E\u0441\u0442\u044C, \u0440\u0438\u0441\u043A \u2014 \u0441\u0430\u0440\u043A\u0430\u0437\u043C.",
    "\u041C\u044B\u0448\u043B\u0435\u043D\u0438\u0435 \u0448\u0438\u0440\u043E\u043A\u043E\u0435, \u0444\u0438\u043B\u043E\u0441\u043E\u0444\u0441\u043A\u043E\u0435: \u043E\u0442 \u0434\u0435\u0442\u0430\u043B\u0435\u0439 \u043A \u0441\u043C\u044B\u0441\u043B\u0443. \u0421\u0438\u043B\u0430 \u2014 \u0441\u0438\u043D\u0442\u0435\u0437, \u0440\u0438\u0441\u043A \u2014 \u043D\u0435\u0431\u0440\u0435\u0436\u043D\u043E\u0441\u0442\u044C \u043A \u043C\u0435\u043B\u043E\u0447\u0430\u043C.",
    "\u0423\u043C \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u043D\u044B\u0439 \u0438 \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0447\u0435\u0441\u043A\u0438\u0439: \u0441\u0447\u0438\u0442\u0430\u0435\u0442 \u0440\u0435\u0441\u0443\u0440\u0441\u044B \u0438 \u0441\u0440\u043E\u043A\u0438. \u0421\u0438\u043B\u0430 \u2014 \u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u0435, \u0440\u0438\u0441\u043A \u2014 \u0441\u0443\u0445\u043E\u0441\u0442\u044C.",
    "\u041C\u044B\u0448\u043B\u0435\u043D\u0438\u0435 \u0441\u0438\u0441\u0442\u0435\u043C\u043D\u043E\u0435 \u0438 \u043E\u0440\u0438\u0433\u0438\u043D\u0430\u043B\u044C\u043D\u043E\u0435: \u0438\u0434\u0435\u0438 \u0432\u043F\u0435\u0440\u0435\u0434\u0438 \u0432\u0440\u0435\u043C\u0435\u043D\u0438. \u0421\u0438\u043B\u0430 \u2014 \u0438\u0437\u043E\u0431\u0440\u0435\u0442\u0430\u0442\u0435\u043B\u044C\u043D\u043E\u0441\u0442\u044C, \u0440\u0438\u0441\u043A \u2014 \u043E\u0442\u0432\u043B\u0435\u0447\u0451\u043D\u043D\u043E\u0441\u0442\u044C.",
    "\u0414\u0435\u0431\u0438\u043B\u0438\u0442\u0430\u0446\u0438\u044F: \u043B\u043E\u0433\u0438\u043A\u0435 \u0442\u0435\u0441\u043D\u043E \u2014 \u0443\u043C \u0440\u0430\u0431\u043E\u0442\u0430\u0435\u0442 \u043E\u0431\u0440\u0430\u0437\u0430\u043C\u0438, \u0438\u043D\u0442\u0443\u0438\u0446\u0438\u0435\u0439, \u0441\u043E\u0447\u0443\u0432\u0441\u0442\u0432\u0438\u0435\u043C. \u0421\u0438\u043B\u0430 \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442 \u0447\u0435\u0440\u0435\u0437 \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u043A\u0438\u0435 \u0438 \u0433\u0443\u043C\u0430\u043D\u0438\u0442\u0430\u0440\u043D\u044B\u0435 \u0440\u0443\u0441\u043B\u0430, \u0433\u0434\u0435 \xAB\u043D\u0435\u043B\u043E\u0433\u0438\u0447\u043D\u043E\u0441\u0442\u044C\xBB \u0438 \u0435\u0441\u0442\u044C \u0434\u0430\u0440."
  ],
  Jupiter: [
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044F: \u0432\u0435\u0440\u0430 \u0432 \u0441\u0435\u0431\u044F, \u043D\u0430\u0441\u0442\u0430\u0432\u043D\u0438\u043A-\u043F\u0435\u0440\u0432\u043E\u043F\u0440\u043E\u0445\u043E\u0434\u0435\u0446. \u0421\u0438\u043B\u0430 \u2014 \u0432\u043E\u043E\u0434\u0443\u0448\u0435\u0432\u043B\u044F\u0442\u044C \u043D\u0430 \u0441\u0442\u0430\u0440\u0442, \u0440\u0438\u0441\u043A \u2014 \u043F\u043E\u0441\u043F\u0435\u0448\u043D\u044B\u0435 \u043E\u0431\u0435\u0449\u0430\u043D\u0438\u044F.",
    "\u0420\u0430\u0441\u0448\u0438\u0440\u0435\u043D\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 \u0440\u0435\u0441\u0443\u0440\u0441 \u0438 \u0432\u043A\u0443\u0441: \u0431\u043B\u0430\u0433\u043E\u043F\u043E\u043B\u0443\u0447\u0438\u0435 \u043A\u0430\u043A \u0444\u0438\u043B\u043E\u0441\u043E\u0444\u0438\u044F. \u0421\u0438\u043B\u0430 \u2014 \u0449\u0435\u0434\u0440\u0430\u044F \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u043D\u043E\u0441\u0442\u044C, \u0440\u0438\u0441\u043A \u2014 \u0438\u0437\u0431\u044B\u0442\u043E\u0447\u043D\u043E\u0441\u0442\u044C.",
    "\u0417\u043D\u0430\u043D\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 \u043E\u0431\u043C\u0435\u043D \u0438 \u043B\u044E\u0431\u043E\u043F\u044B\u0442\u0441\u0442\u0432\u043E: \u0443\u0447\u0438\u0442\u0435\u043B\u044C-\u0441\u043E\u0431\u0435\u0441\u0435\u0434\u043D\u0438\u043A. \u0421\u0438\u043B\u0430 \u2014 \u0434\u043E\u0441\u0442\u0443\u043F\u043D\u043E \u043E\u0431\u044A\u044F\u0441\u043D\u044F\u0442\u044C, \u0440\u0438\u0441\u043A \u2014 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u043D\u043E\u0441\u0442\u044C \u043E\u0445\u0432\u0430\u0442\u0430.",
    "\u042D\u043A\u0437\u0430\u043B\u044C\u0442\u0430\u0446\u0438\u044F: \u043C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0441\u0435\u0440\u0434\u0446\u0430 \u2014 \u0431\u043B\u0430\u0433\u043E\u0441\u043B\u043E\u0432\u0435\u043D\u0438\u0435 \u0437\u0430\u0449\u0438\u0449\u0430\u0442\u044C, \u0440\u0430\u0441\u0442\u0438\u0442\u044C, \u043F\u0440\u043E\u0449\u0430\u0442\u044C. \u0421\u0430\u043C\u043E\u0435 \u0449\u0435\u0434\u0440\u043E\u0435 \u043F\u043E\u043B\u043E\u0436\u0435\u043D\u0438\u0435; \u0431\u0435\u0440\u0435\u0447\u044C \u043E\u0442 \u043E\u043F\u0435\u043A\u0438 \u0441\u0432\u0435\u0440\u0445 \u043C\u0435\u0440\u044B.",
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0441 \u0434\u043E\u0441\u0442\u043E\u0438\u043D\u0441\u0442\u0432\u043E\u043C: \u0443\u0447\u0438\u0442\u0435\u043B\u044C \u043D\u0430 \u0441\u0446\u0435\u043D\u0435, \u0432\u0434\u043E\u0445\u043D\u043E\u0432\u043B\u044F\u044E\u0449\u0438\u0439 \u0430\u0432\u0442\u043E\u0440\u0438\u0442\u0435\u0442. \u0421\u0438\u043B\u0430 \u2014 \u0432\u0435\u043B\u0438\u043A\u043E\u0434\u0443\u0448\u0438\u0435, \u0440\u0438\u0441\u043A \u2014 \u0432\u0430\u0436\u043D\u043E\u0441\u0442\u044C.",
    "\u0417\u043D\u0430\u043D\u0438\u0435 \u0432 \u0434\u0435\u0442\u0430\u043B\u044F\u0445 \u0438 \u0441\u043B\u0443\u0436\u0435\u043D\u0438\u0438: \u043C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u043F\u043E\u043B\u044C\u0437\u044B. \u0421\u0438\u043B\u0430 \u2014 \u043F\u0440\u0430\u043A\u0442\u0438\u0447\u043D\u0430\u044F \u044D\u0442\u0438\u043A\u0430, \u0440\u0438\u0441\u043A \u2014 \u0441\u043E\u043C\u043D\u0435\u043D\u0438\u0435 \u0432 \u0431\u043E\u043B\u044C\u0448\u043E\u043C \u0438\u0437-\u0437\u0430 \u043C\u0430\u043B\u043E\u0433\u043E.",
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0431\u0430\u043B\u0430\u043D\u0441\u0430: \u0441\u043E\u0432\u0435\u0442\u043D\u0438\u043A, \u043C\u0438\u0440\u043E\u0442\u0432\u043E\u0440\u0435\u0446, \u0441\u043F\u0440\u0430\u0432\u0435\u0434\u043B\u0438\u0432\u043E\u0441\u0442\u044C. \u0421\u0438\u043B\u0430 \u2014 \u0432\u0438\u0434\u0435\u0442\u044C \u043F\u0440\u0430\u0432\u043E\u0442\u0443 \u043E\u0431\u0435\u0438\u0445 \u0441\u0442\u043E\u0440\u043E\u043D, \u0440\u0438\u0441\u043A \u2014 \u0443\u043A\u043B\u043E\u043D\u0447\u0438\u0432\u043E\u0441\u0442\u044C.",
    "\u0413\u043B\u0443\u0431\u0438\u043D\u043D\u043E\u0435 \u0437\u043D\u0430\u043D\u0438\u0435: \u0438\u043D\u0442\u0435\u0440\u0435\u0441 \u043A \u0442\u0430\u0439\u043D\u043E\u043C\u0443, \u043F\u0441\u0438\u0445\u043E\u043B\u043E\u0433\u0438\u0438, \u0442\u0440\u0430\u043D\u0441\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438. \u0421\u0438\u043B\u0430 \u2014 \u0432\u0435\u0441\u0442\u0438 \u0447\u0435\u0440\u0435\u0437 \u043A\u0440\u0438\u0437\u0438\u0441, \u0440\u0438\u0441\u043A \u2014 \u0442\u044F\u0436\u0435\u0441\u0442\u044C \u0442\u0435\u043C.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u043F\u043E\u043B\u043D\u043E\u0442\u0430 \u0434\u0445\u0430\u0440\u043C\u044B \u2014 \u0432\u0435\u0440\u0430, \u0448\u0438\u0440\u043E\u0442\u0430, \u0443\u0447\u0438\u0442\u0435\u043B\u044C\u0441\u0442\u0432\u043E. \u041F\u0440\u0438\u0440\u043E\u0434\u043D\u044B\u0439 \u043D\u0430\u0441\u0442\u0430\u0432\u043D\u0438\u043A; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0442\u0435\u0440\u043F\u0438\u043C\u043E\u0441\u0442\u044C \u043A \u0438\u043D\u044B\u043C \u043F\u0443\u0442\u044F\u043C.",
    "\u0414\u0435\u0431\u0438\u043B\u0438\u0442\u0430\u0446\u0438\u044F: \u0432\u0435\u0440\u0430 \u043F\u0440\u043E\u0432\u0435\u0440\u044F\u0435\u0442\u0441\u044F \u043F\u0440\u0430\u043A\u0442\u0438\u043A\u043E\u0439 \u0438 \u0441\u043A\u0435\u043F\u0441\u0438\u0441\u043E\u043C \u2014 \u0440\u043E\u0441\u0442 \u043C\u0435\u0434\u043B\u0435\u043D\u043D\u044B\u0439, \u0437\u0430\u0442\u043E \u0437\u0430\u0440\u0430\u0431\u043E\u0442\u0430\u043D\u043D\u044B\u0439. \u0421\u0438\u043B\u0430 \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442 \u0447\u0435\u0440\u0435\u0437 \u0434\u0435\u043B\u043E: \u043C\u0443\u0434\u0440\u043E\u0441\u0442\u044C, \u0434\u043E\u043A\u0430\u0437\u0430\u043D\u043D\u0443\u044E \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u043E\u043C.",
    "\u0420\u0430\u0441\u0448\u0438\u0440\u0435\u043D\u0438\u0435 \u0447\u0435\u0440\u0435\u0437 \u0438\u0434\u0435\u0438 \u0438 \u043E\u0431\u0449\u043D\u043E\u0441\u0442\u044C: \u0444\u0438\u043B\u043E\u0441\u043E\u0444 \u0431\u0443\u0434\u0443\u0449\u0435\u0433\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0433\u0443\u043C\u0430\u043D\u0438\u0437\u043C, \u0440\u0438\u0441\u043A \u2014 \u0443\u0442\u043E\u043F\u0438\u0447\u043D\u043E\u0441\u0442\u044C.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u0441\u043E\u0441\u0442\u0440\u0430\u0434\u0430\u0442\u0435\u043B\u044C\u043D\u0430\u044F \u043C\u0443\u0434\u0440\u043E\u0441\u0442\u044C, \u0432\u0435\u0440\u0430 \u043A\u0430\u043A \u0434\u044B\u0445\u0430\u043D\u0438\u0435. \u0411\u043B\u0430\u0433\u043E\u0441\u043B\u043E\u0432\u0435\u043D\u0438\u0435 \u0443\u0442\u0435\u0448\u0430\u0442\u044C \u0438 \u0432\u0434\u043E\u0445\u043D\u043E\u0432\u043B\u044F\u0442\u044C; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0437\u0430\u0437\u0435\u043C\u043B\u0435\u043D\u0438\u0435."
  ],
  Venus: [
    "\u041B\u044E\u0431\u043E\u0432\u044C \u043A\u0430\u043A \u043F\u043E\u0440\u044B\u0432: \u044F\u0440\u043A\u0438\u0435 \u0447\u0443\u0432\u0441\u0442\u0432\u0430, \u0441\u043C\u0435\u043B\u043E\u0441\u0442\u044C \u0432 \u0431\u043B\u0438\u0437\u043E\u0441\u0442\u0438. \u0421\u0438\u043B\u0430 \u2014 \u0438\u0441\u043A\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C \u0436\u0435\u043B\u0430\u043D\u0438\u044F, \u0440\u0438\u0441\u043A \u2014 \u043D\u0435\u0442\u0435\u0440\u043F\u0435\u043D\u0438\u0435.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u043F\u043E\u043B\u043D\u043E\u0442\u0430 \u0447\u0443\u0432\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0441\u0442\u0438 \u2014 \u0432\u043A\u0443\u0441, \u0443\u044E\u0442, \u0432\u0435\u0440\u043D\u043E\u0441\u0442\u044C. \u0414\u0430\u0440 \u043D\u0430\u0441\u043B\u0430\u0436\u0434\u0430\u0442\u044C\u0441\u044F \u0438 \u0441\u043E\u0437\u0434\u0430\u0432\u0430\u0442\u044C \u043A\u0440\u0430\u0441\u043E\u0442\u0443 \u0432\u0435\u0449\u0435\u0439; \u0431\u0435\u0440\u0435\u0447\u044C \u043E\u0442 \u043F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u043D\u043E\u0441\u0442\u0438 \u043A \u043A\u043E\u043C\u0444\u043E\u0440\u0442\u0443.",
    "\u0413\u0430\u0440\u043C\u043E\u043D\u0438\u044F \u0447\u0435\u0440\u0435\u0437 \u043E\u0431\u0449\u0435\u043D\u0438\u0435: \u043B\u0451\u0433\u043A\u043E\u0441\u0442\u044C, \u0444\u043B\u0438\u0440\u0442 \u0443\u043C\u0430, \u044D\u0441\u0442\u0435\u0442\u0438\u043A\u0430 \u0441\u043B\u043E\u0432\u0430. \u0421\u0438\u043B\u0430 \u2014 \u043E\u0447\u0430\u0440\u043E\u0432\u0430\u043D\u0438\u0435 \u0431\u0435\u0441\u0435\u0434\u044B, \u0440\u0438\u0441\u043A \u2014 \u0441\u043A\u043E\u043B\u044C\u0436\u0435\u043D\u0438\u0435 \u043F\u043E \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u0438.",
    "\u041B\u044E\u0431\u043E\u0432\u044C-\u0437\u0430\u0431\u043E\u0442\u0430: \u043D\u0435\u0436\u043D\u043E\u0441\u0442\u044C, \u0434\u043E\u043C \u043A\u0430\u043A \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0434\u0443\u0448\u0435\u0432\u043D\u043E\u0435 \u0442\u0435\u043F\u043B\u043E, \u0440\u0438\u0441\u043A \u2014 \u043E\u0431\u0438\u0434\u0447\u0438\u0432\u043E\u0441\u0442\u044C.",
    "\u041B\u044E\u0431\u043E\u0432\u044C \u0441 \u0440\u0430\u0437\u043C\u0430\u0445\u043E\u043C: \u0440\u043E\u043C\u0430\u043D\u0442\u0438\u043A\u0430, \u043F\u0440\u0430\u0437\u0434\u043D\u0438\u043A, \u0449\u0435\u0434\u0440\u043E\u0441\u0442\u044C \u0441\u0435\u0440\u0434\u0446\u0430. \u0421\u0438\u043B\u0430 \u2014 \u043A\u0440\u0430\u0441\u0438\u0432\u044B\u0435 \u0436\u0435\u0441\u0442\u044B, \u0440\u0438\u0441\u043A \u2014 \u043F\u043E\u0442\u0440\u0435\u0431\u043D\u043E\u0441\u0442\u044C \u0432 \u0432\u043E\u0441\u0445\u0438\u0449\u0435\u043D\u0438\u0438.",
    "\u0414\u0435\u0431\u0438\u043B\u0438\u0442\u0430\u0446\u0438\u044F: \u0447\u0443\u0432\u0441\u0442\u0432\u0443 \u043C\u0435\u0448\u0430\u0435\u0442 \u0430\u043D\u0430\u043B\u0438\u0437 \u2014 \u043B\u044E\u0431\u043E\u0432\u044C \u043F\u0440\u043E\u0432\u0435\u0440\u044F\u0435\u0442\u0441\u044F \u043A\u0440\u0438\u0442\u0438\u043A\u043E\u0439. \u0421\u0438\u043B\u0430 \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442 \u0447\u0435\u0440\u0435\u0437 \u0441\u043B\u0443\u0436\u0435\u043D\u0438\u0435 \u0431\u043B\u0438\u0437\u043A\u0438\u043C \u0438 \u043F\u0440\u0438\u043D\u044F\u0442\u0438\u0435 \u043D\u0435\u0441\u043E\u0432\u0435\u0440\u0448\u0435\u043D\u0441\u0442\u0432\u0430: \u0442\u0451\u043F\u043B\u043E\u0435 \u0432\u0430\u0436\u043D\u0435\u0435 \u0438\u0434\u0435\u0430\u043B\u044C\u043D\u043E\u0433\u043E.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u0439 \u2014 \u0442\u0430\u043A\u0442, \u044D\u0441\u0442\u0435\u0442\u0438\u043A\u0430, \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u043E. \u0414\u0430\u0440 \u0441\u043E\u0437\u0434\u0430\u0432\u0430\u0442\u044C \u0433\u0430\u0440\u043C\u043E\u043D\u0438\u044E \u043C\u0435\u0436\u0434\u0443 \u043B\u044E\u0434\u044C\u043C\u0438; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043D\u0435 \u0442\u0435\u0440\u044F\u0442\u044C \u0441\u0435\u0431\u044F \u0432 \xAB\u043C\u044B\xBB.",
    "\u0427\u0443\u0432\u0441\u0442\u0432\u0430 \u0433\u043B\u0443\u0431\u043E\u043A\u0438\u0435 \u0438 \u0441\u0442\u0440\u0430\u0441\u0442\u043D\u044B\u0435: \u0431\u043B\u0438\u0437\u043E\u0441\u0442\u044C \u043A\u0430\u043A \u043F\u0440\u0435\u043E\u0431\u0440\u0430\u0436\u0435\u043D\u0438\u0435. \u0421\u0438\u043B\u0430 \u2014 \u0432\u0435\u0440\u043D\u043E\u0441\u0442\u044C \u0433\u043B\u0443\u0431\u0438\u043D\u0435, \u0440\u0438\u0441\u043A \u2014 \u0440\u0435\u0432\u043D\u043E\u0441\u0442\u044C \u0438 \u043F\u0440\u043E\u0432\u0435\u0440\u043A\u0438.",
    "\u041B\u044E\u0431\u043E\u0432\u044C \u043A \u0448\u0438\u0440\u043E\u043A\u043E\u043C\u0443 \u0438 \u0432\u044B\u0441\u043E\u043A\u043E\u043C\u0443: \u0447\u0443\u0432\u0441\u0442\u0432\u0430 \u0447\u0435\u0440\u0435\u0437 \u0441\u043C\u044B\u0441\u043B \u0438 \u043F\u0443\u0442\u044C. \u0421\u0438\u043B\u0430 \u2014 \u0431\u043B\u0430\u0433\u043E\u0440\u043E\u0434\u0441\u0442\u0432\u043E, \u0440\u0438\u0441\u043A \u2014 \u0438\u0434\u0435\u0430\u043B\u0438\u0437\u0430\u0446\u0438\u044F.",
    "\u0427\u0443\u0432\u0441\u0442\u0432\u0430 \u0441\u0434\u0435\u0440\u0436\u0430\u043D\u043D\u044B\u0435 \u0438 \u0441\u0435\u0440\u044C\u0451\u0437\u043D\u044B\u0435: \u043B\u044E\u0431\u043E\u0432\u044C \u0434\u0435\u043B\u043E\u043C \u0438 \u0432\u0440\u0435\u043C\u0435\u043D\u0435\u043C. \u0421\u0438\u043B\u0430 \u2014 \u043D\u0430\u0434\u0451\u0436\u043D\u0430\u044F \u043F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u043D\u043E\u0441\u0442\u044C, \u0440\u0438\u0441\u043A \u2014 \u0441\u0443\u0445\u043E\u0441\u0442\u044C \u0432\u044B\u0440\u0430\u0436\u0435\u043D\u0438\u044F.",
    "\u041B\u044E\u0431\u043E\u0432\u044C \u0441\u0432\u043E\u0431\u043E\u0434\u043D\u0430\u044F \u0438 \u0434\u0440\u0443\u0436\u0435\u0441\u043A\u0430\u044F: \u0431\u043B\u0438\u0437\u043E\u0441\u0442\u044C \u0447\u0435\u0440\u0435\u0437 \u0440\u0430\u0432\u0435\u043D\u0441\u0442\u0432\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0443\u0432\u0430\u0436\u0435\u043D\u0438\u0435 \u043A \u0438\u043D\u0430\u043A\u043E\u0432\u043E\u0441\u0442\u0438, \u0440\u0438\u0441\u043A \u2014 \u0434\u0438\u0441\u0442\u0430\u043D\u0446\u0438\u044F.",

  Saturn: [
    "\u0414\u0435\u0431\u0438\u043B\u0438\u0442\u0430\u0446\u0438\u044F: \u0434\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0435 \u043C\u0435\u0448\u0430\u0435\u0442 \u043D\u0435\u0442\u0435\u0440\u043F\u0435\u043D\u0438\u0435 \u2014 \u0441\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0430 \u0440\u043E\u0436\u0434\u0430\u0435\u0442\u0441\u044F \u0432 \u0431\u043E\u0440\u044C\u0431\u0435 \u0441 \u0438\u043C\u043F\u0443\u043B\u044C\u0441\u043E\u043C. \u0421\u0438\u043B\u0430 \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442 \u0447\u0435\u0440\u0435\u0437 \u043A\u043E\u0440\u043E\u0442\u043A\u0438\u0435 \u044F\u0441\u043D\u044B\u0435 \u0448\u0430\u0433\u0438: \u0432\u044B\u0434\u0435\u0440\u0436\u043A\u0430 \u0442\u0440\u0435\u043D\u0438\u0440\u0443\u0435\u0442\u0441\u044F, \u043A\u0430\u043A \u043C\u044B\u0448\u0446\u0430.",
    "\u0421\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0430 \u0447\u0435\u0440\u0435\u0437 \u0440\u0435\u0441\u0443\u0440\u0441: \u043C\u0435\u0434\u043B\u0435\u043D\u043D\u043E\u0435, \u043F\u0440\u043E\u0447\u043D\u043E\u0435 \u0441\u0442\u0440\u043E\u0438\u0442\u0435\u043B\u044C\u0441\u0442\u0432\u043E. \u0421\u0438\u043B\u0430 \u2014 \u0442\u0435\u0440\u043F\u0435\u043B\u0438\u0432\u043E\u0435 \u043D\u0430\u043A\u043E\u043F\u043B\u0435\u043D\u0438\u0435, \u0440\u0438\u0441\u043A \u2014 \u0441\u043A\u0443\u043F\u043E\u0441\u0442\u044C \u043A \u0441\u0435\u0431\u0435.",
    "\u041F\u043E\u0440\u044F\u0434\u043E\u043A \u0432 \u043C\u044B\u0441\u043B\u044F\u0445 \u0438 \u0441\u0432\u044F\u0437\u044F\u0445: \u0441\u0435\u0440\u044C\u0451\u0437\u043D\u043E\u0435 \u0441\u043B\u043E\u0432\u043E, \u0441\u0438\u0441\u0442\u0435\u043C\u043D\u043E\u0435 \u043E\u0431\u0443\u0447\u0435\u043D\u0438\u0435. \u0421\u0438\u043B\u0430 \u2014 \u043C\u0435\u0442\u043E\u0434\u0438\u0447\u043D\u043E\u0441\u0442\u044C \u0443\u043C\u0430, \u0440\u0438\u0441\u043A \u2014 \u0441\u0443\u0445\u043E\u0441\u0442\u044C \u043E\u0431\u0449\u0435\u043D\u0438\u044F.",
    "\u0414\u043E\u043B\u0433 \u043F\u0435\u0440\u0435\u0434 \u0441\u0432\u043E\u0438\u043C\u0438: \u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0441\u0442\u044C \u0437\u0430 \u0434\u043E\u043C \u0438 \u0440\u043E\u0434. \u0421\u0438\u043B\u0430 \u2014 \u043D\u0430\u0434\u0451\u0436\u043D\u0430\u044F \u043E\u043F\u043E\u0440\u0430 \u0431\u043B\u0438\u0437\u043A\u0438\u043C, \u0440\u0438\u0441\u043A \u2014 \u0442\u044F\u0436\u0435\u0441\u0442\u044C \u043D\u0435\u0432\u044B\u0441\u043A\u0430\u0437\u0430\u043D\u043D\u043E\u0433\u043E.",
    "\u0414\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u043D\u0430 \u0441\u0446\u0435\u043D\u0435: \u0430\u0432\u0442\u043E\u0440\u0438\u0442\u0435\u0442 \u0437\u0430\u0440\u0430\u0431\u043E\u0442\u0430\u043D\u043D\u044B\u0439, \u043D\u0435 \u0443\u043D\u0430\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u043D\u043D\u044B\u0439. \u0421\u0438\u043B\u0430 \u2014 \u0434\u043E\u0441\u0442\u043E\u0438\u043D\u0441\u0442\u0432\u043E \u0442\u0440\u0443\u0434\u0430, \u0440\u0438\u0441\u043A \u2014 \u0441\u0442\u0440\u0430\u0445 \u043E\u0446\u0435\u043D\u043A\u0438.",
    "\u0421\u043B\u0443\u0436\u0435\u043D\u0438\u0435 \u043A\u0430\u043A \u0441\u0438\u0441\u0442\u0435\u043C\u0430: \u043C\u0430\u0441\u0442\u0435\u0440 \u043F\u043E\u0440\u044F\u0434\u043A\u0430 \u0438 \u0440\u0435\u0433\u043B\u0430\u043C\u0435\u043D\u0442\u0430. \u0421\u0438\u043B\u0430 \u2014 \u0431\u0435\u0437\u0443\u043F\u0440\u0435\u0447\u043D\u043E\u0441\u0442\u044C \u043F\u0440\u043E\u0446\u0435\u0441\u0441\u0430, \u0440\u0438\u0441\u043A \u2014 \u043F\u0435\u0440\u0444\u0435\u043A\u0446\u0438\u043E\u043D\u0438\u0437\u043C.",
    "\u042D\u043A\u0437\u0430\u043B\u044C\u0442\u0430\u0446\u0438\u044F: \u0441\u043F\u0440\u0430\u0432\u0435\u0434\u043B\u0438\u0432\u043E\u0441\u0442\u044C \u043A\u0430\u043A \u0437\u0430\u043A\u043E\u043D \u2014 \u0432\u044B\u0434\u0435\u0440\u0436\u043A\u0430, \u0431\u0435\u0441\u043F\u0440\u0438\u0441\u0442\u0440\u0430\u0441\u0442\u043D\u043E\u0441\u0442\u044C, \u0437\u0440\u0435\u043B\u043E\u0441\u0442\u044C \u0432 \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044F\u0445. \u041B\u0443\u0447\u0448\u0438\u0439 \u0441\u0443\u0434\u044C\u044F \u0438 \u043F\u0430\u0440\u0442\u043D\u0451\u0440 \u043D\u0430 \u0434\u043B\u0438\u043D\u043D\u043E\u0439 \u0434\u0438\u0441\u0442\u0430\u043D\u0446\u0438\u0438.",
    "\u0414\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u0433\u043B\u0443\u0431\u0438\u043D\u044B: \u0432\u044B\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0442\u044C \u0442\u044F\u0436\u0451\u043B\u043E\u0435 \u043C\u043E\u043B\u0447\u0430. \u0421\u0438\u043B\u0430 \u2014 \u043D\u0435\u0441\u0433\u0438\u0431\u0430\u0435\u043C\u043E\u0441\u0442\u044C \u0432 \u043A\u0440\u0438\u0437\u0438\u0441\u0435, \u0440\u0438\u0441\u043A \u2014 \u0437\u0430\u043A\u0440\u044B\u0442\u043E\u0441\u0442\u044C.",
    "\u0421\u0442\u0440\u0443\u043A\u0442\u0443\u0440\u0430 \u0441\u043C\u044B\u0441\u043B\u0430: \u0432\u0435\u0440\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u0435\u043D\u043D\u0430\u044F \u0432\u0440\u0435\u043C\u0435\u043D\u0435\u043C. \u0421\u0438\u043B\u0430 \u2014 \u0437\u0440\u0435\u043B\u0430\u044F \u0444\u0438\u043B\u043E\u0441\u043E\u0444\u0438\u044F, \u0440\u0438\u0441\u043A \u2014 \u0434\u043E\u0433\u043C\u0430\u0442\u0438\u0437\u043C.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u043F\u043E\u043B\u043D\u043E\u0442\u0430 \u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0441\u0442\u0438 \u2014 \u0441\u0442\u0440\u0430\u0442\u0435\u0433, \u0441\u0442\u0440\u043E\u0438\u0442\u0435\u043B\u044C \u0441\u0438\u0441\u0442\u0435\u043C. \u0412\u0440\u0435\u043C\u044F \u0440\u0430\u0431\u043E\u0442\u0430\u0435\u0442 \u043D\u0430 \u0432\u0430\u0441; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043F\u043E\u043C\u043D\u0438\u0442\u044C, \u0440\u0430\u0434\u0438 \u043A\u043E\u0433\u043E \u0441\u0442\u0440\u043E\u0438\u0442\u0441\u044F.",
    "\u0421\u0432\u043E\u0439 \u0437\u043D\u0430\u043A: \u043F\u043E\u0440\u044F\u0434\u043E\u043A \u0440\u0430\u0434\u0438 \u043E\u0431\u0449\u0435\u0441\u0442\u0432\u0430 \u2014 \u0440\u0435\u0444\u043E\u0440\u043C\u044B \u0431\u0435\u0437 \u0441\u043F\u0435\u0448\u043A\u0438. \u0421\u0438\u043B\u0430 \u2014 \u0443\u0441\u0442\u043E\u0439\u0447\u0438\u0432\u043E\u0435 \u043D\u043E\u0432\u043E\u0435, \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0436\u0438\u0432\u043E\u0435 \u0442\u0435\u043F\u043B\u043E \u0432 \u0441\u0438\u0441\u0442\u0435\u043C\u0435.",
    "\u0414\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u0440\u0430\u0441\u0442\u0432\u043E\u0440\u0435\u043D\u0438\u044F: \u0441\u043B\u0443\u0436\u0435\u043D\u0438\u0435 \u0431\u0435\u0437 \u0430\u043F\u043B\u043E\u0434\u0438\u0441\u043C\u0435\u043D\u0442\u043E\u0432. \u0421\u0438\u043B\u0430 \u2014 \u0441\u043C\u0438\u0440\u0435\u043D\u0438\u0435 \u0438 \u0432\u044B\u0434\u0435\u0440\u0436\u043A\u0430, \u0440\u0438\u0441\u043A \u2014 \u0442\u0438\u0445\u0430\u044F \u0443\u0441\u0442\u0430\u043B\u043E\u0441\u0442\u044C."
  ],
  Rahu: [
    "\u0416\u0430\u0436\u0434\u0430 \u043F\u0435\u0440\u0432\u0435\u043D\u0441\u0442\u0432\u0430: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0438\u043C\u043F\u0443\u043B\u044C\u0441 \u0438 \u0440\u0438\u0441\u043A. \u0414\u0430\u0451\u0442 \u043D\u0435\u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u0443\u044E \u0441\u043C\u0435\u043B\u043E\u0441\u0442\u044C; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043D\u0430\u043F\u0440\u0430\u0432\u043B\u044F\u0442\u044C \u0430\u0437\u0430\u0440\u0442, \u043D\u0435 \u0441\u0436\u0438\u0433\u0430\u044F \u043C\u043E\u0441\u0442\u044B.",
    "\u0416\u0430\u0436\u0434\u0430 \u043E\u0431\u043B\u0430\u0434\u0430\u043D\u0438\u044F \u0438 \u0432\u043A\u0443\u0441\u0430: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0442\u044F\u0433\u0443 \u043A \u0440\u0435\u0441\u0443\u0440\u0441\u0443 \u0438 \u0443\u0434\u043E\u0432\u043E\u043B\u044C\u0441\u0442\u0432\u0438\u044E. \u0414\u0430\u0440 \u043D\u0430\u0445\u043E\u0434\u0438\u0442\u044C \u0446\u0435\u043D\u043D\u043E\u0435 \u043D\u0435\u043E\u0431\u044B\u0447\u043D\u044B\u043C\u0438 \u043F\u0443\u0442\u044F\u043C\u0438; \u0431\u0435\u0440\u0435\u0447\u044C \u043E\u0442 \u043D\u0435\u043D\u0430\u0441\u044B\u0442\u043D\u043E\u0441\u0442\u0438.",
    "\u0416\u0430\u0436\u0434\u0430 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438 \u0438 \u0441\u0432\u044F\u0437\u0435\u0439: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0440\u0435\u0447\u044C, \u0445\u0438\u0442\u0440\u043E\u0441\u0442\u044C \u0443\u043C\u0430, \u0441\u0435\u0442\u0438. \u0414\u0430\u0440 \u043D\u0435\u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u043E\u0439 \u043A\u043E\u043C\u043C\u0443\u043D\u0438\u043A\u0430\u0446\u0438\u0438; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043F\u0440\u0430\u0432\u0434\u0430 \u0432 \u0441\u043B\u043E\u0432\u0430\u0445.",
    "\u0416\u0430\u0436\u0434\u0430 \u043F\u0440\u0438\u043D\u0430\u0434\u043B\u0435\u0436\u043D\u043E\u0441\u0442\u0438: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u044D\u043C\u043E\u0446\u0438\u0438 \u0438 \u043F\u043E\u0442\u0440\u0435\u0431\u043D\u043E\u0441\u0442\u044C \u0432 \xAB\u0441\u0432\u043E\u0438\u0445\xBB. \u0414\u0430\u0451\u0442 \u0447\u0443\u0442\u043A\u043E\u0441\u0442\u044C \u043A \u043D\u0430\u0441\u0442\u0440\u043E\u0435\u043D\u0438\u044F\u043C \u043C\u0430\u0441\u0441; \u0431\u0435\u0440\u0435\u0447\u044C \u0433\u0440\u0430\u043D\u0438\u0446\u044B \u0441\u0435\u0440\u0434\u0446\u0430.",
    "\u0416\u0430\u0436\u0434\u0430 \u043F\u0440\u0438\u0437\u043D\u0430\u043D\u0438\u044F: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0442\u044F\u0433\u0443 \u043A \u0441\u0446\u0435\u043D\u0435 \u0438 \u0441\u0442\u0430\u0442\u0443\u0441\u0443. \u0414\u0430\u0440 \u043C\u0430\u0433\u043D\u0435\u0442\u0438\u0437\u043C\u0430; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043E\u0442\u043B\u0438\u0447\u0430\u0442\u044C \u043F\u0440\u0438\u0437\u0432\u0430\u043D\u0438\u0435 \u043E\u0442 \u0430\u043F\u043B\u043E\u0434\u0438\u0441\u043C\u0435\u043D\u0442\u043E\u0432.",
    "\u0416\u0430\u0436\u0434\u0430 \u0441\u043E\u0432\u0435\u0440\u0448\u0435\u043D\u0441\u0442\u0432\u0430: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0430\u043D\u0430\u043B\u0438\u0437 \u0438 \u0442\u0435\u0445\u043D\u0438\u0447\u043D\u043E\u0441\u0442\u044C. \u0414\u0430\u0440 \u043D\u0435\u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u044B\u0445 \u0440\u0435\u0448\u0435\u043D\u0438\u0439 \u0432 \u0434\u0435\u0442\u0430\u043B\u044F\u0445; \u0440\u0438\u0441\u043A \u2014 \u0442\u0440\u0435\u0432\u043E\u0436\u043D\u0430\u044F \u0434\u043E\u0442\u043E\u0448\u043D\u043E\u0441\u0442\u044C.",
    "\u0416\u0430\u0436\u0434\u0430 \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u0439: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u043F\u0440\u0438\u0442\u044F\u0436\u0435\u043D\u0438\u0435 \u043A \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u0430\u043C \u0438 \u043F\u0443\u0431\u043B\u0438\u043A\u0435. \u0414\u0430\u0440 \u043E\u0447\u0430\u0440\u043E\u0432\u044B\u0432\u0430\u0442\u044C; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u0447\u0435\u0441\u0442\u043D\u043E\u0441\u0442\u044C \u043D\u0430\u043C\u0435\u0440\u0435\u043D\u0438\u0439.",
    "\u0416\u0430\u0436\u0434\u0430 \u0433\u043B\u0443\u0431\u0438\u043D\u044B: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0432\u043B\u0435\u0447\u0435\u043D\u0438\u0435 \u043A \u0442\u0430\u0439\u043D\u043E\u043C\u0443 \u0438 \u0437\u0430\u043F\u0440\u0435\u0442\u043D\u043E\u043C\u0443. \u0414\u0430\u0440 \u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u0442\u0435\u043B\u044F \u043A\u0440\u0438\u0437\u0438\u0441\u043E\u0432; \u0431\u0435\u0440\u0435\u0447\u044C \u043E\u0442 \u043E\u0434\u0435\u0440\u0436\u0438\u043C\u043E\u0441\u0442\u0438.",
    "\u0416\u0430\u0436\u0434\u0430 \u0438\u0441\u0442\u0438\u043D\u044B \u0447\u0443\u0436\u0438\u0445 \u0437\u0435\u043C\u0435\u043B\u044C: \u0443\u0441\u0438\u043B\u0438\u0432\u0430\u0435\u0442 \u0442\u044F\u0433\u0443 \u043A \u0434\u0430\u043B\u0451\u043A\u043E\u043C\u0443 \u0438 \u043D\u043E\u0432\u043E\u043C\u0443 \u0437\u043D\u0430\u043D\u0438\u044E. \u0414\u0430\u0440 \u0440\u0430\u0441\u0448\u0438\u0440\u044F\u0442\u044C \u043A\u0430\u0440\u0442\u0443 \u043C\u0438\u0440\u0430; \u0440\u0438\u0441\u043A \u2014 \u0433\u0443\u0440\u0443-\u0438\u043B\u043B\u044E\u0437\u0438\u0438.",

    "\u0416\u0430\u0440 \u0432 \u043E\u0441\u043D\u043E\u0432\u0430\u043D\u0438\u0438: \u0430\u043A\u0442\u0438\u0432\u043D\u043E\u0441\u0442\u044C \u0432 \u0434\u043E\u043C\u0435, \u0442\u0435\u043C\u0435 \u043D\u0435\u0434\u0432\u0438\u0436\u0438\u043C\u043E\u0441\u0442\u0438. \u0411\u0435\u0440\u0435\u0447\u044C \u0434\u043E\u043C\u0430\u0448\u043D\u0438\u0445 \u043E\u0442 \u043A\u043E\u043C\u0430\u043D\u0434\u043D\u043E\u0433\u043E \u0442\u043E\u043D\u0430.",
    "\u0410\u0437\u0430\u0440\u0442 \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u0430: \u0441\u043C\u0435\u043B\u043E\u0441\u0442\u044C \u0441\u0430\u043C\u043E\u0432\u044B\u0440\u0430\u0436\u0435\u043D\u0438\u044F, \u0441\u043F\u043E\u0440\u0442\u0438\u0432\u043D\u044B\u0435 \u0434\u0435\u0442\u0438. \u0420\u0438\u0441\u043A \u2014 \u0438\u0433\u0440\u0430 \u0432\u0430-\u0431\u0430\u043D\u043A.",
    "\u0412\u043E\u0438\u043D \u0441\u043B\u0443\u0436\u0435\u043D\u0438\u044F: \u0441\u043E\u043A\u0440\u0443\u0448\u0438\u0442\u0435\u043B\u044C \u043F\u0440\u0435\u043F\u044F\u0442\u0441\u0442\u0432\u0438\u0439 \u0438 \u0431\u043E\u043B\u0435\u0437\u043D\u0435\u0439. \u041E\u0442\u043B\u0438\u0447\u043D\u043E\u0435 \u043C\u0435\u0441\u0442\u043E \u0434\u043B\u044F \u0431\u043E\u0440\u044C\u0431\u044B \u2014 \u0432\u044B\u0431\u0438\u0440\u0430\u0439\u0442\u0435 \u0434\u043E\u0441\u0442\u043E\u0439\u043D\u044B\u0445 \u043F\u0440\u043E\u0442\u0438\u0432\u043D\u0438\u043A\u043E\u0432.",
    "\u041E\u0433\u043E\u043D\u044C \u0432 \u0441\u043E\u044E\u0437\u0435: \u0441\u0442\u0440\u0430\u0441\u0442\u044C \u0438 \u0441\u043F\u043E\u0440\u044B \u0432 \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u0435. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u043E\u0431\u0449\u0438\u0439 \u0444\u0440\u043E\u043D\u0442 \u0432\u043C\u0435\u0441\u0442\u043E \u0432\u0437\u0430\u0438\u043C\u043D\u043E\u0433\u043E.",

    "\u041D\u0430\u043F\u043E\u0440 \u043A \u0432\u0435\u0440\u0448\u0438\u043D\u0435: \u043A\u0430\u0440\u044C\u0435\u0440\u043D\u044B\u0439 \u0434\u0432\u0438\u0433\u0430\u0442\u0435\u043B\u044C, \u0440\u0435\u0448\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0439 \u0440\u0443\u043A\u043E\u0432\u043E\u0434\u0438\u0442\u0435\u043B\u044C. \u0421\u0438\u043B\u0430 \u2014 \u0438\u0441\u043F\u043E\u043B\u043D\u0435\u043D\u0438\u0435, \u0440\u0438\u0441\u043A \u2014 \u043A\u043E\u043D\u0444\u043B\u0438\u043A\u0442\u044B \u0441 \u0432\u043B\u0430\u0441\u0442\u044C\u044E.",
    "\u042D\u043D\u0435\u0440\u0433\u0438\u044F \u043D\u0430 \u0446\u0435\u043B\u0438 \u0438 \u043A\u0440\u0443\u0433: \u043A\u043E\u043C\u0430\u043D\u0434\u043D\u044B\u0439 \u0431\u043E\u0435\u0446, \u0434\u043E\u0445\u043E\u0434\u044B \u0443\u0441\u0438\u043B\u0438\u0435\u043C. \u0414\u0430\u0440 \u043C\u043E\u0431\u0438\u043B\u0438\u0437\u043E\u0432\u0430\u0442\u044C \u0434\u0440\u0443\u0437\u0435\u0439.",
    "\u0421\u043A\u0440\u044B\u0442\u0430\u044F \u0441\u0438\u043B\u0430: \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u0437\u0430 \u043A\u0443\u043B\u0438\u0441\u0430\u043C\u0438, \u0440\u0430\u0431\u043E\u0442\u0430 \u0441 \u0442\u043E\u043D\u043A\u0438\u043C. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u0432\u044B\u043F\u0443\u0441\u043A\u0430\u0442\u044C \u044D\u043D\u0435\u0440\u0433\u0438\u044E \u0442\u0435\u043B\u043E\u043C, \u0438\u043D\u0430\u0447\u0435 \u043E\u043D\u0430 \u0442\u043E\u0447\u0438\u0442 \u0438\u0437\u043D\u0443\u0442\u0440\u0438."

  Mercury: [

    "\u0420\u0430\u0441\u0448\u0438\u0440\u0435\u043D\u0438\u0435 \u0443\u0441\u0438\u043B\u0438\u0439: \u0443\u0434\u0430\u0447\u0430 \u0432 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430\u0445, \u0434\u043E\u0431\u0440\u044B\u0435 \u0441\u043E\u0440\u0430\u0442\u043D\u0438\u043A\u0438. \u0423\u0447\u0438\u0442\u0435\u043B\u044C \u0441\u0440\u0435\u0434\u0438 \u0440\u0430\u0432\u043D\u044B\u0445.",
    "\u0411\u043B\u0430\u0433\u043E\u0441\u043B\u043E\u0432\u0435\u043D\u0438\u0435 \u0434\u043E\u043C\u0430: \u0441\u0447\u0430\u0441\u0442\u044C\u0435 \u043A\u043E\u0440\u043D\u0435\u0439, \u043F\u0440\u043E\u0441\u0442\u043E\u0440 \u0432 \u043E\u0441\u043D\u043E\u0432\u0430\u043D\u0438\u0438. \u041A\u043B\u0430\u0441\u0441\u0438\u0447\u0435\u0441\u043A\u0438 \u0441\u0447\u0430\u0441\u0442\u043B\u0438\u0432\u043E\u0435 \u043C\u0435\u0441\u0442\u043E.",
    "\u041F\u0443\u0440\u0432\u0430-\u043F\u0443\u043D\u044C\u044F: \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u043E, \u0434\u0435\u0442\u0438, \u0437\u0430\u0441\u043B\u0443\u0433\u0438 \u043F\u0440\u043E\u0448\u043B\u043E\u0433\u043E. \u0420\u0430\u0437\u0443\u043C \u0449\u0435\u0434\u0440\u044B\u0439 \u0438 \u0441\u0432\u0435\u0442\u043B\u044B\u0439.",
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0432 \u0441\u043B\u0443\u0436\u0435\u043D\u0438\u0438: \u0437\u0430\u0449\u0438\u0442\u0430 \u0432 \u0442\u0440\u0443\u0434\u043D\u043E\u0441\u0442\u044F\u0445, \u0438\u0441\u0446\u0435\u043B\u044F\u044E\u0449\u0438\u0435 \u0440\u0443\u043A\u0438. \u0414\u043E\u043B\u0433\u0438 \u043E\u0442\u0434\u0430\u044E\u0442\u0441\u044F \u2014 \u0438 \u043F\u0440\u043E\u0449\u0430\u044E\u0442\u0441\u044F.",
    "\u0411\u043B\u0430\u0433\u043E\u0441\u043B\u043E\u0432\u0435\u043D\u0438\u0435 \u0441\u043E\u044E\u0437\u0430: \u043C\u0443\u0434\u0440\u044B\u0439 \u043F\u0430\u0440\u0442\u043D\u0451\u0440, \u0440\u043E\u0441\u0442 \u0447\u0435\u0440\u0435\u0437 \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044F. \u0411\u0440\u0430\u043A \u043A\u0430\u043A \u0443\u0447\u0438\u0442\u0435\u043B\u044C\u0441\u0442\u0432\u043E.",
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0433\u043B\u0443\u0431\u0438\u043D: \u0437\u0430\u0449\u0438\u0442\u0430 \u0432 \u043A\u0440\u0438\u0437\u0438\u0441\u0430\u0445, \u043D\u0430\u0441\u043B\u0435\u0434\u0441\u0442\u0432\u0430, \u0442\u0430\u0439\u043D\u043E\u0435 \u0437\u043D\u0430\u043D\u0438\u0435. \u0424\u0438\u043B\u043E\u0441\u043E\u0444 \u0442\u0440\u0430\u043D\u0441\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438.",
    "\u042E\u043F\u0438\u0442\u0435\u0440 \u0434\u043E\u043C\u0430: \u043F\u043E\u043B\u043D\u043E\u0442\u0430 \u0434\u0445\u0430\u0440\u043C\u044B \u2014 \u0432\u0435\u0440\u0430, \u0443\u0447\u0438\u0442\u0435\u043B\u044F, \u0443\u0434\u0430\u0447\u0430 \u043F\u0443\u0442\u0438. \u0421\u0438\u043B\u044C\u043D\u0435\u0439\u0448\u0435\u0435 \u0435\u0433\u043E \u043C\u0435\u0441\u0442\u043E.",
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u043D\u0430 \u0432\u0435\u0440\u0448\u0438\u043D\u0435: \u043A\u0430\u0440\u044C\u0435\u0440\u0430 \u043D\u0430\u0441\u0442\u0430\u0432\u043D\u0438\u043A\u0430, \u044D\u0442\u0438\u0447\u043D\u044B\u0439 \u0441\u0442\u0430\u0442\u0443\u0441. \u0420\u0435\u043F\u0443\u0442\u0430\u0446\u0438\u044F \u0431\u043B\u0430\u0433\u043E\u0440\u043E\u0434\u0441\u0442\u0432\u0430.",
    "\u0420\u0430\u0441\u0448\u0438\u0440\u0435\u043D\u0438\u0435 \u043A\u0440\u0443\u0433\u0430: \u0431\u043E\u043B\u044C\u0448\u0438\u0435 \u0446\u0435\u043B\u0438, \u043F\u043E\u043A\u0440\u043E\u0432\u0438\u0442\u0435\u043B\u0438, \u0434\u043E\u0445\u043E\u0434\u044B \u043E\u0442 \u0437\u043D\u0430\u043D\u0438\u044F. \u0414\u0440\u0443\u0437\u044C\u044F-\u0443\u0447\u0438\u0442\u0435\u043B\u044F.",
    "\u041C\u0443\u0434\u0440\u043E\u0441\u0442\u044C \u0443\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F: \u0434\u0443\u0445\u043E\u0432\u043D\u0430\u044F \u043E\u043F\u043E\u0440\u0430, \u043C\u0438\u043B\u043E\u0441\u0435\u0440\u0434\u0438\u0435, \u0437\u0430\u0449\u0438\u0442\u0430 \xAB\u0441\u0432\u0435\u0440\u0445\u0443\xBB. \u0422\u0438\u0445\u043E\u0435, \u0433\u043B\u0443\u0431\u043E\u043A\u043E\u0435 \u0431\u043B\u0430\u0433\u043E."
  ],
  Venus: [
    "\u0413\u0430\u0440\u043C\u043E\u043D\u0438\u044F \u0432 \u043E\u0431\u043B\u0438\u043A\u0435: \u043E\u0431\u0430\u044F\u043D\u0438\u0435, \u0432\u043A\u0443\u0441, \u043C\u044F\u0433\u043A\u0430\u044F \u043C\u0430\u043D\u0435\u0440\u0430. \u041A\u0440\u0430\u0441\u043E\u0442\u0430 \u043A\u0430\u043A \u0441\u043F\u043E\u0441\u043E\u0431 \u0436\u0438\u0442\u044C.",
    "\u0421\u0432\u043E\u044F \u0441\u0442\u0438\u0445\u0438\u044F \u0440\u0435\u0441\u0443\u0440\u0441\u0430: \u0434\u043E\u0441\u0442\u0430\u0442\u043E\u043A \u0441\u043E \u0432\u043A\u0443\u0441\u043E\u043C, \u0441\u043B\u0430\u0434\u043A\u0430\u044F \u0440\u0435\u0447\u044C. \u0414\u0430\u0440 \u0437\u0430\u0440\u0430\u0431\u0430\u0442\u044B\u0432\u0430\u0442\u044C \u043A\u0440\u0430\u0441\u043E\u0442\u043E\u0439.",
    "\u0418\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u043E \u0432 \u0443\u0441\u0438\u043B\u0438\u0438: \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u043A\u0438\u0435 \u043F\u0440\u043E\u0435\u043A\u0442\u044B, \u0433\u0430\u043B\u0430\u043D\u0442\u043D\u043E\u0441\u0442\u044C \u0432 \u0441\u0440\u0435\u0434\u0435. \u041B\u0451\u0433\u043A\u0438\u0435 \u0440\u0443\u043A\u0438.",
    "\u041A\u0440\u0430\u0441\u043E\u0442\u0430 \u0432 \u0434\u043E\u043C\u0435: \u0443\u044E\u0442 \u043A\u0430\u043A \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u043E, \u0442\u0440\u0430\u043D\u0441\u043F\u043E\u0440\u0442, \u043A\u043E\u043C\u0444\u043E\u0440\u0442. \u0421\u0447\u0430\u0441\u0442\u044C\u0435 \u0432 \u043E\u0441\u043D\u043E\u0432\u0430\u043D\u0438\u0438.",
    "\u041B\u044E\u0431\u043E\u0432\u044C \u0438 \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u043E: \u0440\u043E\u043C\u0430\u043D\u0442\u0438\u043A\u0430, \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u0430, \u043E\u0447\u0430\u0440\u043E\u0432\u0430\u0442\u0435\u043B\u044C\u043D\u044B\u0435 \u0434\u0435\u0442\u0438. \u0421\u0435\u0440\u0434\u0435\u0447\u043D\u0430\u044F \u0441\u0446\u0435\u043D\u0430.",
    "\u041B\u044E\u0431\u043E\u0432\u044C \u0432 \u0441\u043B\u0443\u0436\u0435\u043D\u0438\u0438: \u0437\u0430\u0431\u043E\u0442\u0430 \u043A\u0440\u0430\u0441\u043E\u0442\u043E\u0439, \u044D\u0441\u0442\u0435\u0442\u0438\u043A\u0430 \u0432 \u0440\u0430\u0431\u043E\u0442\u0435. \u0411\u0435\u0440\u0435\u0447\u044C \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044F \u043E\u0442 \u0431\u044B\u0442\u0430.",
    "\u0421\u0432\u043E\u044F \u0441\u0442\u0438\u0445\u0438\u044F \u0441\u043E\u044E\u0437\u0430: \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u043E, \u043A\u0440\u0430\u0441\u043E\u0442\u0430 \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u0439, \u043F\u0443\u0431\u043B\u0438\u0447\u043D\u043E\u0435 \u043E\u0431\u0430\u044F\u043D\u0438\u0435. \u0421\u0438\u043B\u044C\u043D\u043E\u0435 \u043C\u0435\u0441\u0442\u043E \u0412\u0435\u043D\u0435\u0440\u044B.",
    "\u0427\u0443\u0432\u0441\u0442\u0432\u0435\u043D\u043D\u0430\u044F \u0433\u043B\u0443\u0431\u0438\u043D\u0430: \u043C\u0430\u0433\u043D\u0435\u0442\u0438\u0437\u043C, \u0447\u0443\u0436\u0438\u0435 \u0440\u0435\u0441\u0443\u0440\u0441\u044B, \u0441\u0442\u0440\u0430\u0441\u0442\u044C. \u0411\u043B\u0438\u0437\u043E\u0441\u0442\u044C \u043A\u0430\u043A \u043F\u0440\u0435\u043E\u0431\u0440\u0430\u0436\u0435\u043D\u0438\u0435.",
    "\u041B\u044E\u0431\u043E\u0432\u044C \u043A \u0432\u044B\u0441\u043E\u043A\u043E\u043C\u0443: \u044D\u0441\u0442\u0435\u0442\u0438\u043A\u0430 \u0441\u043C\u044B\u0441\u043B\u0430, \u0443\u0434\u0430\u0447\u0430 \u0447\u0435\u0440\u0435\u0437 \u0436\u0435\u043D\u0449\u0438\u043D \u0438 \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u043E. \u0411\u043B\u0430\u0433\u043E\u0440\u043E\u0434\u043D\u044B\u0439 \u0432\u043A\u0443\u0441.",
    "\u041A\u0440\u0430\u0441\u043E\u0442\u0430 \u043D\u0430 \u0432\u0435\u0440\u0448\u0438\u043D\u0435: \u043A\u0430\u0440\u044C\u0435\u0440\u0430 \u0432 \u044D\u0441\u0442\u0435\u0442\u0438\u043A\u0435, \u0441\u0442\u0430\u0442\u0443\u0441\u043D\u043E\u0435 \u043E\u0431\u0430\u044F\u043D\u0438\u0435. \u041F\u0443\u0431\u043B\u0438\u043A\u0430 \u043B\u044E\u0431\u0438\u0442.",
    "\u0413\u0430\u0440\u043C\u043E\u043D\u0438\u044F \u043A\u0440\u0443\u0433\u0430: \u0434\u043E\u0445\u043E\u0434\u044B \u043E\u0442 \u0438\u0441\u043A\u0443\u0441\u0441\u0442\u0432\u0430 \u0438 \u0441\u0432\u044F\u0437\u0435\u0439, \u043A\u0440\u0430\u0441\u0438\u0432\u044B\u0435 \u0434\u0440\u0443\u0436\u0431\u044B. \u0421\u043B\u0430\u0434\u043A\u0438\u0435 \u043F\u043B\u043E\u0434\u044B.",
    "\u042D\u043A\u0437\u0430\u043B\u044C\u0442\u0430\u0446\u0438\u044F \u0434\u043E\u043C\u0430 \u043C\u043E\u043A\u0448\u0438 \u043F\u043E \u0434\u0443\u0445\u0443: \u043B\u044E\u0431\u043E\u0432\u044C \u0442\u0438\u0445\u0430\u044F \u0438 \u0436\u0435\u0440\u0442\u0432\u0435\u043D\u043D\u0430\u044F, \u0432\u043A\u0443\u0441 \u043A \u0443\u0435\u0434\u0438\u043D\u0451\u043D\u043D\u043E\u0439 \u043A\u0440\u0430\u0441\u043E\u0442\u0435. \u0423\u0442\u043E\u043D\u0447\u0451\u043D\u043D\u043E\u0435, \u0433\u043B\u0443\u0431\u043E\u043A\u043E\u0435 \u043C\u0435\u0441\u0442\u043E."
  ],
  Saturn: [
    "\u0421\u0435\u0440\u044C\u0451\u0437\u043D\u043E\u0441\u0442\u044C \u0432 \u0445\u0430\u0440\u0430\u043A\u0442\u0435\u0440\u0435: \u0432\u044B\u0434\u0435\u0440\u0436\u043A\u0430, \u0440\u0430\u043D\u043D\u0435\u0435 \u0432\u0437\u0440\u043E\u0441\u043B\u0435\u043D\u0438\u0435. \u0414\u043E\u0441\u0442\u043E\u0438\u043D\u0441\u0442\u0432\u043E \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442 \u0441 \u0433\u043E\u0434\u0430\u043C\u0438 \u2014 \u0438 \u043E\u0441\u0442\u0430\u0451\u0442\u0441\u044F.",
    "\u0414\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u0440\u0435\u0441\u0443\u0440\u0441\u0430: \u043C\u0435\u0434\u043B\u0435\u043D\u043D\u044B\u0439, \u043F\u0440\u043E\u0447\u043D\u044B\u0439 \u0434\u043E\u0441\u0442\u0430\u0442\u043E\u043A. \u0421\u043B\u043E\u0432\u043E \u0441\u043A\u0443\u043F\u043E\u0435, \u043D\u043E \u043D\u0430\u0434\u0451\u0436\u043D\u043E\u0435.",
    "\u0423\u043F\u043E\u0440\u0441\u0442\u0432\u043E \u0443\u0441\u0438\u043B\u0438\u0439: \u0432\u044B\u043D\u043E\u0441\u043B\u0438\u0432\u043E\u0441\u0442\u044C \u0432\u044B\u0448\u0435 \u0442\u0430\u043B\u0430\u043D\u0442\u0430. \u041E\u0442\u043B\u0438\u0447\u043D\u043E\u0435 \u043C\u0435\u0441\u0442\u043E \u2014 \u0443\u0441\u0438\u043B\u0438\u044F \u043A\u0430\u043F\u0438\u0442\u0430\u043B\u0438\u0437\u0438\u0440\u0443\u044E\u0442\u0441\u044F.",
    "\u0414\u043E\u043B\u0433 \u0432 \u043E\u0441\u043D\u043E\u0432\u0430\u043D\u0438\u0438: \u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043D\u043D\u043E\u0441\u0442\u044C \u0437\u0430 \u0434\u043E\u043C \u0438 \u0440\u043E\u0434. \u0422\u0435\u043F\u043B\u043E \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442\u0441\u044F \u0441\u0442\u0440\u043E\u0438\u0442\u044C \u0441\u043E\u0437\u043D\u0430\u0442\u0435\u043B\u044C\u043D\u043E.",
    "\u0421\u0442\u0440\u043E\u0433\u0438\u0439 \u0440\u0430\u0437\u0443\u043C: \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u043E \u0447\u0435\u0440\u0435\u0437 \u0440\u0435\u043C\u0435\u0441\u043B\u043E, \u043F\u043E\u0437\u0434\u043D\u0438\u0435 \u0438\u043B\u0438 \u0441\u0435\u0440\u044C\u0451\u0437\u043D\u044B\u0435 \u0434\u0435\u0442\u0438. \u0414\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u0442\u0430\u043B\u0430\u043D\u0442\u0430.",
    "\u0421\u0430\u0442\u0443\u0440\u043D-\u0440\u0430\u0431\u043E\u0442\u043D\u0438\u043A: \u0436\u0435\u043B\u0435\u0437\u043D\u0430\u044F \u0432\u044B\u0434\u0435\u0440\u0436\u043A\u0430 \u0432 \u0441\u043B\u0443\u0436\u0431\u0435 \u0438 \u0437\u0434\u043E\u0440\u043E\u0432\u044C\u0435. \u0421\u0438\u043B\u044C\u043D\u043E\u0435 \u043C\u0435\u0441\u0442\u043E \u2014 \u043F\u0440\u0435\u043F\u044F\u0442\u0441\u0442\u0432\u0438\u044F \u0441\u0442\u0438\u0440\u0430\u044E\u0442\u0441\u044F \u0442\u0435\u0440\u043F\u0435\u043D\u0438\u0435\u043C.",
    "\u0417\u0440\u0435\u043B\u044B\u0439 \u0441\u043E\u044E\u0437: \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u043E \u043A\u0430\u043A \u0434\u043E\u043B\u0433 \u0438 \u0448\u043A\u043E\u043B\u0430. \u041E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044F \u043A\u0440\u0435\u043F\u043D\u0443\u0442 \u0441\u043E \u0432\u0440\u0435\u043C\u0435\u043D\u0435\u043C.",
    "\u0412\u044B\u0434\u0435\u0440\u0436\u043A\u0430 \u0433\u043B\u0443\u0431\u0438\u043D: \u0434\u043E\u043B\u0433\u043E\u043B\u0435\u0442\u0438\u0435, \u0441\u0442\u043E\u0439\u043A\u043E\u0441\u0442\u044C \u0432 \u043A\u0440\u0438\u0437\u0438\u0441\u0430\u0445. \u041C\u0435\u0434\u043B\u0435\u043D\u043D\u044B\u0435, \u0433\u043B\u0443\u0431\u043E\u043A\u0438\u0435 \u0442\u0440\u0430\u043D\u0441\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438.",
    "\u0421\u0442\u0440\u043E\u0433\u0430\u044F \u0432\u0435\u0440\u0430: \u0444\u0438\u043B\u043E\u0441\u043E\u0444\u0438\u044F, \u043F\u0440\u043E\u0432\u0435\u0440\u0435\u043D\u043D\u0430\u044F \u0436\u0438\u0437\u043D\u044C\u044E. \u0423\u0447\u0438\u0442\u0435\u043B\u044C-\u043F\u0440\u0430\u043A\u0442\u0438\u043A.",
    "\u0421\u0432\u043E\u0439 \u0434\u043E\u043C \u0432\u0435\u0440\u0448\u0438\u043D\u044B: \u043A\u0430\u0440\u044C\u0435\u0440\u0430 \u0434\u043B\u0438\u043D\u043D\u043E\u0439 \u0432\u043E\u043B\u0438, \u0437\u0430\u0441\u043B\u0443\u0436\u0435\u043D\u043D\u044B\u0439 \u0441\u0442\u0430\u0442\u0443\u0441. \u041A\u043B\u0430\u0441\u0441\u0438\u0447\u0435\u0441\u043A\u0438 \u0441\u0438\u043B\u044C\u043D\u043E\u0435 \u043C\u0435\u0441\u0442\u043E.",
    "\u041F\u043E\u0440\u044F\u0434\u043E\u043A \u043A\u0440\u0443\u0433\u0430: \u0441\u0442\u0430\u0440\u0448\u0438\u0435 \u0434\u0440\u0443\u0437\u044C\u044F, \u0434\u043E\u0445\u043E\u0434\u044B \u0441\u043E \u0432\u0440\u0435\u043C\u0435\u043D\u0435\u043C. \u0426\u0435\u043B\u0438 \u043D\u0430 \u0434\u0435\u0441\u044F\u0442\u0438\u043B\u0435\u0442\u0438\u044F.",
    "\u0414\u0438\u0441\u0446\u0438\u043F\u043B\u0438\u043D\u0430 \u0442\u0438\u0448\u0438\u043D\u044B: \u0430\u0441\u043A\u0435\u0437\u0430, \u0440\u0430\u0431\u043E\u0442\u0430 \u0437\u0430 \u043A\u0443\u043B\u0438\u0441\u0430\u043C\u0438, \u0433\u043B\u0443\u0431\u0438\u043D\u043D\u0430\u044F \u043F\u0440\u0430\u043A\u0442\u0438\u043A\u0430. \u041E\u0434\u0438\u043D\u043E\u0447\u0435\u0441\u0442\u0432\u043E \u043A\u0430\u043A \u0440\u0435\u0441\u0443\u0440\u0441."
  ],
  Rahu: [
    "\u041D\u0435\u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u0430\u044F \u043B\u0438\u0447\u043D\u043E\u0441\u0442\u044C: \u043C\u0430\u0433\u043D\u0435\u0442\u0438\u0437\u043C \u0438\u043D\u043E\u0433\u043E, \u0436\u0430\u0436\u0434\u0430 \u0431\u044B\u0442\u044C \u043E\u0441\u043E\u0431\u0435\u043D\u043D\u044B\u043C. \u0414\u0430\u0440 \u0445\u0430\u0440\u0438\u0437\u043C\u044B; \u0437\u0430\u0434\u0430\u0447\u0430 \u2014 \u043F\u043E\u0434\u043B\u0438\u043D\u043D\u043E\u0441\u0442\u044C.",
    "\u0416\u0430\u0436\u0434\u0430 \u0440\u0435\u0441\u0443\u0440\u0441\u0430: \u043D\u0435\u0442\u0438\u043F\u0438\u0447\u043D\u044B\u0435 \u0438\u0441\u0442\u043E\u0447\u043D\u0438\u043A\u0438 \u0434\u043E\u0445\u043E\u0434\u0430, \u044F\u0440\u043A\u0430\u044F \u0440\u0435\u0447\u044C. \u0411\u0435\u0440\u0435\u0447\u044C \u0447\u0435\u0441\u0442\u043D\u043E\u0441\u0442\u044C \u0441\u043B\u043E\u0432\u0430.",
    "\u0423\u0441\u0438\u043B\u0435\u043D\u043D\u043E\u0435 \u0443\u0441\u0438\u043B\u0438\u0435: \u0434\u0435\u0440\u0437\u043A\u0438\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B, \u0445\u0432\u0430\u0442\u043A\u0430 \u0432 \u0441\u0440\u0435\u0434\u0435. \u0421\u043C\u0435\u043B\u043E\u0441\u0442\u044C \u0432\u044B\u0448\u0435 \u043F\u0440\u0430\u0432\u0438\u043B.",
    "\u0416\u0430\u0436\u0434\u0430 \u043A\u043E\u0440\u043D\u0435\u0439: \u043D\u0435\u043F\u043E\u043A\u043E\u0439 \u0432 \u0442\u0435\u043C\u0435 \u0434\u043E\u043C\u0430, \u043D\u0435\u0442\u0438\u043F\u0438\u0447\u043D\u0430\u044F \u0441\u0435\u043C\u044C\u044F. \u041E\u043F\u043E\u0440\u0443 \u043F\u0440\u0438\u0445\u043E\u0434\u0438\u0442\u0441\u044F \u0438\u0437\u043E\u0431\u0440\u0435\u0442\u0430\u0442\u044C \u2014 \u0438 \u044D\u0442\u043E \u0434\u0430\u0440.",
    "\u0416\u0430\u0436\u0434\u0430 \u0441\u0446\u0435\u043D\u044B: \u043D\u0435\u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u043E\u0435 \u0442\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u043E, \u043D\u0435\u043E\u0431\u044B\u0447\u043D\u044B\u0435 \u0434\u0435\u0442\u0438. \u041C\u0430\u0433\u043D\u0435\u0442\u0438\u0437\u043C \u0441\u0430\u043C\u043E\u0432\u044B\u0440\u0430\u0436\u0435\u043D\u0438\u044F.",
    "\u0420\u0430\u0445\u0443 \u0441\u0438\u043B\u0451\u043D \u0432 \u0434\u043E\u043C\u0435 \u0431\u043E\u0440\u044C\u0431\u044B: \u043F\u043E\u0431\u0435\u0436\u0434\u0430\u0442\u044C \u043D\u0435\u0442\u0438\u043F\u0438\u0447\u043D\u044B\u0445 \u043F\u0440\u043E\u0442\u0438\u0432\u043D\u0438\u043A\u043E\u0432. \u0418\u043C\u043C\u0443\u043D\u0438\u0442\u0435\u0442 \u043A \u0445\u0430\u043E\u0441\u0443.",
    "\u0416\u0430\u0436\u0434\u0430 \u0441\u043E\u044E\u0437\u0430: \u043D\u0435\u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u044B\u0435 \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u0430, \u043F\u0443\u0431\u043B\u0438\u0447\u043D\u044B\u0439 \u043C\u0430\u0433\u043D\u0435\u0442\u0438\u0437\u043C. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u044F\u0441\u043D\u044B\u0435 \u0434\u043E\u0433\u043E\u0432\u043E\u0440\u0451\u043D\u043D\u043E\u0441\u0442\u0438.",
    "\u0420\u0430\u0445\u0443 \u0432 \u0440\u043E\u0434\u043D\u043E\u0439 \u0441\u0442\u0438\u0445\u0438\u0438 \u0442\u0430\u0439\u043D\u043E\u0433\u043E: \u0432\u043B\u0435\u0447\u0435\u043D\u0438\u0435 \u043A \u0433\u043B\u0443\u0431\u0438\u043D\u0430\u043C, \u0447\u0443\u0436\u0438\u043C \u0440\u0435\u0441\u0443\u0440\u0441\u0430\u043C, \u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u043D\u0438\u044E. \u0421\u0438\u043B\u044C\u043D\u0430\u044F, \u043E\u0441\u0442\u0440\u0430\u044F \u043F\u043E\u0437\u0438\u0446\u0438\u044F.",
    "\u0416\u0430\u0436\u0434\u0430 \u0447\u0443\u0436\u043E\u0439 \u0438\u0441\u0442\u0438\u043D\u044B: \u0434\u0430\u043B\u044C\u043D\u0438\u0435 \u0441\u0442\u0440\u0430\u043D\u044B, \u043D\u0435\u0442\u0438\u043F\u0438\u0447\u043D\u0430\u044F \u0432\u0435\u0440\u0430. \u0414\u0430\u0440 \u0440\u0430\u0441\u0448\u0438\u0440\u044F\u0442\u044C \u0433\u043E\u0440\u0438\u0437\u043E\u043D\u0442.",
    "\u0416\u0430\u0436\u0434\u0430 \u0432\u0435\u0440\u0448\u0438\u043D\u044B: \u0430\u043C\u0431\u0438\u0446\u0438\u044F \u0432\u043D\u0435 \u0448\u0430\u0431\u043B\u043E\u043D\u0430, \u043F\u0443\u0431\u043B\u0438\u0447\u043D\u0430\u044F \u043A\u0430\u0440\u044C\u0435\u0440\u0430. \u0423\u0441\u043F\u0435\u0445 \u043D\u0435\u0442\u0438\u043F\u0438\u0447\u043D\u044B\u043C \u043F\u0443\u0442\u0451\u043C.",
    "\u0420\u0430\u0445\u0443 \u0441\u0438\u043B\u0451\u043D \u0432 \u0434\u043E\u043C\u0435 \u0446\u0435\u043B\u0435\u0439: \u0431\u043E\u043B\u044C\u0448\u0438\u0435 \u0441\u0435\u0442\u0438, \u0434\u043E\u0445\u043E\u0434\u044B \u043E\u0442 \u043D\u043E\u0432\u043E\u0433\u043E. \u0414\u0430\u0440 \u043B\u043E\u0432\u0438\u0442\u044C \u0431\u0443\u0434\u0443\u0449\u0435\u0435.",
    "\u0416\u0430\u0436\u0434\u0430 \u0440\u0430\u0441\u0442\u0432\u043E\u0440\u0435\u043D\u0438\u044F: \u043C\u0438\u0441\u0442\u0438\u043A\u0430, \u0434\u0430\u043B\u044C\u043D\u0438\u0435 \u043C\u0438\u0440\u044B, \u0437\u0430\u043A\u0443\u043B\u0438\u0441\u044C\u0435. \u0411\u0435\u0440\u0435\u0447\u044C \u044F\u0441\u043D\u043E\u0441\u0442\u044C \u0438 \u0441\u043E\u043D."
  ],
  Ketu: [
    "\u041D\u0435\u0443\u043B\u043E\u0432\u0438\u043C\u0430\u044F \u043B\u0438\u0447\u043D\u043E\u0441\u0442\u044C: \u0441\u043A\u0440\u043E\u043C\u043D\u043E\u0441\u0442\u044C \u043F\u0440\u0438 \u0433\u043B\u0443\u0431\u0438\u043D\u0435, \u043E\u0449\u0443\u0449\u0435\u043D\u0438\u0435 \xAB\u043D\u0435 \u043E\u0442\u0441\u044E\u0434\u0430\xBB. \u0414\u0430\u0440 \u0432\u043D\u0443\u0442\u0440\u0435\u043D\u043D\u0435\u0439 \u0441\u0432\u043E\u0431\u043E\u0434\u044B.",
    "\u041E\u0442\u0440\u0435\u0448\u0451\u043D\u043D\u043E\u0441\u0442\u044C \u043E\u0442 \u043D\u0430\u043A\u043E\u043F\u043B\u0435\u043D\u0438\u0439: \u043B\u0451\u0433\u043A\u043E\u0441\u0442\u044C \u043A \u0434\u0435\u043D\u044C\u0433\u0430\u043C \u0438 \u0441\u043B\u043E\u0432\u0430\u043C. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u0443\u0432\u0430\u0436\u0430\u0442\u044C \u0440\u0435\u0441\u0443\u0440\u0441.",
    "\u0423\u0441\u0438\u043B\u0438\u0435 \u0431\u0435\u0437 \u0430\u0437\u0430\u0440\u0442\u0430: \u0441\u043C\u0435\u043B\u043E\u0441\u0442\u044C \u0442\u0438\u0445\u0430\u044F, \u0438\u043D\u0441\u0442\u0438\u043D\u043A\u0442\u0438\u0432\u043D\u0430\u044F. \u0414\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u043F\u043E \u0441\u0443\u0442\u0438, \u043C\u0438\u043C\u043E \u0441\u0443\u0435\u0442\u044B.",
    "\u041E\u0442\u0440\u0435\u0448\u0451\u043D\u043D\u043E\u0441\u0442\u044C \u043E\u0442 \u043A\u043E\u0440\u043D\u0435\u0439: \u0434\u043E\u043C \u0432\u043D\u0443\u0442\u0440\u0438, \u0430 \u043D\u0435 \u0441\u043D\u0430\u0440\u0443\u0436\u0438. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u0442\u0435\u043F\u043B\u043E \u043A \u0441\u0432\u043E\u0438\u043C \u0432\u043E\u043F\u0440\u0435\u043A\u0438 \u0434\u0438\u0441\u0442\u0430\u043D\u0446\u0438\u0438.",
    "\u0422\u0432\u043E\u0440\u0447\u0435\u0441\u0442\u0432\u043E \u0431\u0435\u0437 \u0442\u0449\u0435\u0441\u043B\u0430\u0432\u0438\u044F: \u0438\u043D\u0442\u0443\u0438\u0442\u0438\u0432\u043D\u044B\u0439 \u0442\u0430\u043B\u0430\u043D\u0442, \u0434\u0443\u0445\u043E\u0432\u043D\u044B\u0439 \u0440\u0430\u0437\u0443\u043C. \u0414\u0435\u0442\u0438 \u0443\u0447\u0430\u0442 \u043E\u0442\u043F\u0443\u0441\u043A\u0430\u0442\u044C.",
    "\u041A\u0435\u0442\u0443 \u0441\u0438\u043B\u0451\u043D \u0432 \u0434\u043E\u043C\u0435 \u043F\u0440\u0435\u043E\u0434\u043E\u043B\u0435\u043D\u0438\u044F: \u043F\u0440\u0435\u043F\u044F\u0442\u0441\u0442\u0432\u0438\u044F \u0440\u0430\u0441\u0441\u0435\u0438\u0432\u0430\u044E\u0442\u0441\u044F \u0441\u0442\u0440\u0430\u043D\u043D\u043E \u043B\u0435\u0433\u043A\u043E. \u0418\u043C\u043C\u0443\u043D\u0438\u0442\u0435\u0442 \u043C\u0438\u043C\u043E \u043B\u043E\u0433\u0438\u043A\u0438.",
    "\u041E\u0442\u0440\u0435\u0448\u0451\u043D\u043D\u043E\u0441\u0442\u044C \u0432 \u0441\u043E\u044E\u0437\u0435: \u043F\u0430\u0440\u0442\u043D\u0451\u0440\u0441\u0442\u0432\u043E \u0431\u0435\u0437 \u0441\u043B\u0438\u044F\u043D\u0438\u044F. \u0417\u0430\u0434\u0430\u0447\u0430 \u2014 \u043F\u0440\u0438\u0441\u0443\u0442\u0441\u0442\u0432\u0438\u0435 \u0440\u044F\u0434\u043E\u043C \u0441 \u0431\u043B\u0438\u0437\u043A\u0438\u043C.",
