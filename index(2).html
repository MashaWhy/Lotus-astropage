function lonAt(k, jd) {

  return ["Sun","Moon","Mars","Mercury","Jupiter","Venus","Saturn","Rahu","Ketu"].map((k) => {

    const step = TR_STEP[k]; let jd2 = jdNow;

    return String(nat + tmp);
  };
  planets.forEach((p) => {
    const disp = SIGN_LORD[p.sign];
    p.relation = ["Rahu", "Ketu"].includes(p.key) ? null : compound(p.key, disp);
    p.dispositor = disp;
    const off = ASPECT_OFF[p.key] || [7];
    p.aspects = off.map((o) => ((p.house - 1 + o - 1) % 12) + 1);
  });
  // Чара-караки (7 планет по убыванию градуса в знаке)
  const kOrder = planets.filter((p) => !["Rahu", "Ketu"].includes(p.key)).slice().sort((a, b) => b.deg - a.deg);
  kOrder.forEach((p, i) => { p.karaka = i; });
  // Вимшоттари
  const mLon = lons.Moon, nk = Math.floor(mLon / (40 / 3));
  const frac = (mLon % (40 / 3)) / (40 / 3);
  const startIdx = nk % 9;
  const dashas = []; let t = jd - frac * DASHA_SEQ[startIdx][1] * 365.25;
  for (let i = 0; i < 9; i++) {
    const [lord, yrs] = DASHA_SEQ[(startIdx + i) % 9];
    const t0 = Math.max(t, jd), t1 = t + yrs * 365.25;
    if (t1 > jd) {
      const antars = []; let ta = t;
      for (let j = 0; j < 9; j++) {
        const [al, ay2] = DASHA_SEQ[(startIdx + i + j) % 9];
        const dur = yrs * ay2 / 120 * 365.25;
        if (ta + dur > jd) antars.push({ lord: al, start: Math.max(ta, jd), end: ta + dur });
        ta += dur;
      }
      dashas.push({ lord, start: t0, end: t1, antars });
    }
    t = t + yrs * 365.25;
    if (dashas.length && t > jd + 120 * 365.25) break;
  }
  // Саде Сати
  const moonSign = Math.floor(mLon / 30);
  const sade = []; let inS = false, s0 = 0;
  for (let dd = 0; dd <= 100 * 365.25; dd += 10) {
    const Ts = (jd + dd - 2451545) / 36525;
    const satSign = Math.floor(norm(planetLon("Saturn", Ts) - lahiri(jd + dd)) / 30);
    const near = [((moonSign + 11) % 12), moonSign, ((moonSign + 1) % 12)].includes(satSign);
    if (near && !inS) { inS = true; s0 = jd + dd; }
    if (!near && inS) { inS = false; sade.push({ start: s0, end: jd + dd }); }
  }
  return { jd, ay, asc, ascSign, planets, dashas, sade, moonSign, lons };
}

  else { if (KENDRA.includes(n)) c.push("kendra"); if (TRIKONA.includes(n) && n !== 1) c.push("trikona"); }
  if (UPACHAYA.includes(n)) c.push("upachaya");
  if (c.length === 0) c.push("neutral");
  return c;
}

const fmtDeg = (d) => {
  const dd = Math.floor(d), mm = Math.floor((d - dd) * 60), ss = Math.round(((d - dd) * 60 - mm) * 60);
  return `${String(dd).padStart(2, "0")}°${String(mm).padStart(2, "0")}'${String(ss).padStart(2, "0")}"`;
};
const fmtDate = (jd, lang) => jdToDate(jd).toLocaleDateString(lang === "ru" ? "ru-RU" : "en-GB", { day: "2-digit", month: "2-digit", year: "numeric" });

function statuses(p) {
  const s = [];
  if (p.retro) s.push(["R", "#9a86b8"]);
  if (p.combust) s.push(["C", "#e05d3d"]);
  if (p.dig === "ex") s.push(["↑", "#e8b64c"]);
  if (p.dig === "de") s.push(["↓", "#7d9bc4"]);
  if (p.vargottama) s.push(["V", "#5fb878"]);
  if (p.junc) s.push(["Г", "#d94f4f"]);
  return s;
}

/* ============================================================
   КАРТЫ: СЕВЕР (ромб) и ЮГ (сетка)
============================================================ */
function chartData(res, mode) {
  if (mode === "d9") {
    const ascS = Math.floor(norm(res.asc) * 9 / 30) % 12;
    return { ascSign: ascS, get: (p) => p.d9sign };
  }
  if (mode === "moon") return { ascSign: res.moonSign, get: (p) => p.sign };
  return { ascSign: res.ascSign, get: (p) => p.sign };  // d1 и transit
}
/* Серые аспекты: кто аспектирует каждый дом текущей карты (граха-дришти) */
function aspectMap(res, mode) {
  const { ascSign, get } = chartData(res, mode);
  const m = Array.from({ length: 12 }, () => []);
  res.planets.forEach((p) => {
    const h = ((get(p) - ascSign) + 12) % 12;                 // дом планеты (0-based)
    (ASPECT_OFF[p.key] || [7]).forEach((o) => m[(h + o - 1) % 12].push(p.key));
  });
  return m;
}
function TransitDot({ tr, x, y, sel, onClick }) {
  return (
    <g onClick={() => onClick(tr.key)} style={{ cursor: "pointer" }}>
      <circle cx={x} cy={y} r="8.5" fill={PL[tr.key].c} stroke={sel ? "#e8b64c" : "rgba(0,0,0,0.35)"} strokeWidth={sel ? 2 : 1} />
      <text x={x} y={y + 3} textAnchor="middle" fontSize="7.5" fontWeight="800" fill="#181425">{PL[tr.key].ab}</text>
    </g>
  );
}
function PlanetGlyph({ p, res, x, y, lang, showDeg }) {
  const st = statuses(p);
  const isLagnesh = SIGN_LORD[res.ascSign] === p.key;
  const isAK = p.karaka === 0;
  return (
    <g>
      {showDeg && <text x={x} y={y - 11} textAnchor="middle" fontSize="7" fill="#8d86a8" fontFamily="var(--mono)">{String(Math.floor(p.deg)).padStart(2, "0")}°</text>}
      <text x={x} y={y} textAnchor="middle" fontSize="12" fontWeight="700" fill={PL[p.key].c}
        style={isLagnesh ? { textDecoration: "underline" } : {}}>{PL[p.key].ab}</text>
      {st.length > 0 && <text x={x + 11} y={y - 5} fontSize="7" fontWeight="700">
        {st.map(([m, c], i) => <tspan key={i} fill={c}>{m}</tspan>)}</text>}
      {isAK && <text x={x} y={y + 9} textAnchor="middle" fontSize="6.5" fill="#e8b64c" fontFamily="var(--mono)">AK</text>}
    </g>
  );
}
function NorthChart({ res, mode, lang, showAsp, transits, selTr, onTr }) {
  const { ascSign, get } = chartData(res, mode);
  const asp = showAsp ? aspectMap(res, mode) : null;
  const S = 320, C = S / 2;
  // 12 позиций домов северной карты
  const HP = [
    [C, C * 0.52], [C * 0.5, C * 0.27], [C * 0.25, C * 0.5], [C * 0.52, C],
    [C * 0.25, C * 1.5], [C * 0.5, C * 1.73], [C, C * 1.48], [C * 1.5, C * 1.73],
    [C * 1.75, C * 1.5], [C * 1.48, C], [C * 1.75, C * 0.5], [C * 1.5, C * 0.27]];
  const SIGN_NUM_POS = [
    [C, C * 0.82], [C * 0.32, C * 0.16], [C * 0.14, C * 0.34], [C * 0.8, C],
    [C * 0.14, C * 1.66], [C * 0.32, C * 1.86], [C, C * 1.2], [C * 1.68, C * 1.86],
    [C * 1.86, C * 1.66], [C * 1.2, C], [C * 1.86, C * 0.34], [C * 1.68, C * 0.16]];
  const houses = Array.from({ length: 12 }, (_, h) => ({
    sign: (ascSign + h) % 12,
    pls: res.planets.filter((p) => ((get(p) - ascSign + 12) % 12) === h),
  }));
  return (
    <svg viewBox={`0 0 ${S} ${S}`} className="chart-svg">
      <rect x="1" y="1" width={S - 2} height={S - 2} fill="none" stroke="var(--line)" strokeWidth="1.5" />
      <path d={`M1 1 L${S - 1} ${S - 1} M${S - 1} 1 L1 ${S - 1} M${C} 1 L1 ${C} L${C} ${S - 1} L${S - 1} ${C} Z`}
        fill="none" stroke="var(--line)" strokeWidth="1.2" />
      {houses.map((h, i) => {
        const trHere = mode === "transit" && transits ? transits.filter((tr) => ((tr.sign - ascSign + 12) % 12) === i) : [];
        const aspHere = asp ? asp[i] : [];
        const rows = Math.ceil(h.pls.length / 2);
        const blockH = rows * 21 + (aspHere.length ? 12 : 0) + (trHere.length ? 21 : 0);
        const y0 = HP[i][1] - blockH / 2 + 12;
        return (
          <g key={i}>
            <text x={SIGN_NUM_POS[i][0]} y={SIGN_NUM_POS[i][1]} textAnchor="middle" fontSize="9"
              fill="#6b6486" fontFamily="var(--mono)">{h.sign + 1}</text>
            {h.pls.map((p, j) => {
              const col = j % 2, row = Math.floor(j / 2);
              const lastRowSingle = h.pls.length % 2 === 1 && row === rows - 1;
              const dx = lastRowSingle ? 0 : (col === 0 ? -17 : 17);
              return <PlanetGlyph key={p.key} p={p} res={res} x={HP[i][0] + dx} y={y0 + row * 21} lang={lang} showDeg={mode === "d1"} />;
            })}
            {aspHere.length > 0 && (
              <text x={HP[i][0]} y={y0 + rows * 21 + 2} textAnchor="middle"
                fontSize="7.5" fill="#56506e" fontFamily="var(--mono)">
                {aspHere.map((k) => PL[k].ab).join(" ")}</text>
            )}
            {trHere.map((tr, j) => (
              <TransitDot key={tr.key} tr={tr} sel={selTr === tr.key} onClick={onTr}
                x={HP[i][0] + (j - (trHere.length - 1) / 2) * 19}
                y={y0 + rows * 21 + (aspHere.length ? 12 : 0) + 10} />
            ))}
          </g>
        );
      })}
    </svg>
  );
}
function SouthChart({ res, mode, lang, showAsp, transits, selTr, onTr }) {
  const { ascSign, get } = chartData(res, mode);
  const asp = showAsp ? aspectMap(res, mode) : null;
  const CELLS = [[11,0,0],[0,1,0],[1,2,0],[2,3,0],[10,0,1],[3,3,1],[9,0,2],[4,3,2],[8,0,3],[7,1,3],[6,2,3],[5,3,3]];
  const S = 320, cw = S / 4;
  return (
    <svg viewBox={`0 0 ${S} ${S}`} className="chart-svg">
      {CELLS.map(([sg, cx, cy]) => {
        const pls = res.planets.filter((p) => get(p) === sg);
        const x = cx * cw, y = cy * cw;
        const hIdx = ((sg - ascSign) + 12) % 12;
        return (
          <g key={sg}>
            <rect x={x} y={y} width={cw} height={cw} fill={sg === ascSign ? "rgba(232,182,76,0.07)" : "none"}
              stroke="var(--line)" strokeWidth="1" />
            <text x={x + 6} y={y + 13} fontSize="8" fill="#6b6486" fontFamily="var(--mono)">{SIGNS[sg].ab}</text>
            {sg === ascSign && <line x1={x} y1={y + 14} x2={x + 14} y2={y} stroke="#e8b64c" strokeWidth="1.5" />}
            {pls.map((p, j) => (
              <PlanetGlyph key={p.key} p={p} res={res}
                x={x + cw / 2 + (pls.length > 1 ? (j % 2 ? 18 : -18) : 0)}
                y={y + 32 + Math.floor(j / 2) * 19} lang={lang} showDeg={false} />
            ))}
            {asp && asp[hIdx].length > 0 && (
              <text x={x + cw / 2} y={y + cw - 5} textAnchor="middle" fontSize="7.5" fill="#56506e"
                fontFamily="var(--mono)">{asp[hIdx].map((k) => PL[k].ab).join(" ")}</text>
            )}
            {mode === "transit" && transits && transits.filter((tr) => tr.sign === sg).map((tr, j, arr) => (
              <TransitDot key={tr.key} tr={tr} sel={selTr === tr.key} onClick={onTr}
                x={x + cw / 2 + (j - (arr.length - 1) / 2) * 19} y={y + cw - 25} />
            ))}
          </g>
        );
      })}
      <rect x="0.5" y="0.5" width={S - 1} height={S - 1} fill="none" stroke="var(--line)" strokeWidth="1.5" />
      <rect x={cw} y={cw} width={cw * 2} height={cw * 2} fill="var(--bg)" stroke="var(--line)" />
    </svg>
  );
}

        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-family:var(--mono);padding:6px 8px;border-bottom:1px solid var(--line)}
        td{padding:7px 8px;border-bottom:1px solid rgba(58,51,88,0.4)}
        .prow{cursor:pointer}.prow:hover{background:rgba(232,182,76,0.05)}
        .prow.sel{background:rgba(232,182,76,0.09)}
        .mono{font-family:var(--mono);font-size:12px}
        .dim{color:var(--dim);font-size:11px}
        .tag{font-size:9px;font-family:var(--mono);border:1px solid;border-radius:3px;padding:1px 4px;margin-left:6px;vertical-align:middle}
        .tag.gold{color:var(--gold);border-color:var(--gold)}
        .pcard{background:var(--panel2);border:1px solid var(--gold);border-radius:8px;padding:14px;margin-top:10px;font-size:13.5px;line-height:1.65}
        .cardgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-size:13px}
        .clbl{display:block;font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-family:var(--mono);margin-bottom:1px}
        @media(max-width:520px){.cardgrid{grid-template-columns:1fr}}
        .timeline{position:relative;height:64px;margin:14px 0 6px}
        .tl-base{position:absolute;top:18px;left:0;right:0;height:22px;background:var(--panel2);border-radius:4px;overflow:hidden}
        .tl-seg{position:absolute;top:0;height:100%;border-right:1px solid var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:#1a1626;font-weight:700;overflow:hidden}
        .tl-seg:hover{filter:brightness(1.15)}
        .tl-sade{position:absolute;top:46px;height:8px;background:repeating-linear-gradient(45deg,#7d9bc4,#7d9bc4 3px,transparent 3px,transparent 6px);border-radius:2px}
        .tl-now{position:absolute;top:8px;width:2px;height:42px;background:var(--saffron)}
        .tl-nowlbl{position:absolute;top:-6px;font-size:9px;color:var(--saffron);font-family:var(--mono);transform:translateX(-50%)}
        .drow{display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid rgba(58,51,88,0.4);cursor:pointer;font-size:13.5px}
        .drow:hover{background:rgba(232,182,76,0.05)}
        .drow.cur{background:rgba(224,93,61,0.1);border-left:3px solid var(--saffron)}
        .antar{padding:4px 10px 4px 28px;font-size:12.5px;color:var(--dim);display:flex;justify-content:space-between}
        .antar.cur{color:var(--ink);background:rgba(224,93,61,0.07)}
        .p3card{border-left:3px solid var(--gold);background:var(--panel2);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:10px;line-height:1.62;font-size:13.5px}
        .p3card p{margin:7px 0}
        .passport{font-family:var(--mono);font-size:11px;color:var(--ink);background:rgba(232,182,76,0.07);border:1px solid var(--line);border-radius:6px;padding:6px 9px;margin:4px 0 8px;line-height:1.5}
        .ex{color:#cfc8e6;font-style:italic;border-left:2px solid var(--line);padding-left:10px}
        .shakti{font-size:12.5px;color:var(--dim)}
        .p3head{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
        .p3q{color:var(--dim);font-size:11.5px;font-style:italic;margin-bottom:6px}
        .crack{border-left-color:var(--saffron)}
        .crack .p3head{color:var(--saffron)}
        .synth{background:rgba(232,182,76,0.06);border:1px dashed var(--gold);border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;margin-top:8px}
        .tabs{display:none}
        h2{font-size:15px;letter-spacing:1px;margin-bottom:10px;color:var(--gold);font-weight:600}
        .note{font-size:10.5px;color:var(--dim);margin-top:8px;font-family:var(--mono)}
        @media(max-width:860px){
          .grid2{grid-template-columns:1fr}
          .tabs{display:flex;gap:4px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
          .tabs .tg{flex:1;text-align:center}
          .m-hide{display:none}
          .fld input{width:96px}
        }
      `}</style>

      <div className="head">
        <h1><span className="om">ॐ</span>{t.title}</h1>
        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
          <span className="set">{t.settings}</span>
          <div className="lang">
            <button className={lang === "ru" ? "on" : ""} onClick={() => setLang("ru")}>RU</button>
            <button className={lang === "en" ? "on" : ""} onClick={() => setLang("en")}>EN</button>
          </div>
        </div>
      </div>

      <div className="wrap">
        {/* ВВОД */}
        <div className="panel">
          <div className="form">
            <div className="fld"><label>{t.date}</label><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></div>
            <div className="fld"><label>{t.time}</label><input type="time" value={form.time} onChange={(e) => setForm({ ...form, time: e.target.value })} /></div>
            <div className="fld cityfld">
              <label>{t.place}</label>
              <input value={q} placeholder={t.placePh}
                onChange={(e) => { setQ(e.target.value); setCity(null); setShowDrop(true); }}
                onFocus={() => setShowDrop(true)} />
              {showDrop && matches.length > 0 && (
                <div className="drop">
                  {matches.map((c) => (
                    <div key={c.en} className="dropitem" onClick={() => pickCity(c)}>
                      <b>{lang === "ru" ? c.ru : c.en}</b>, {lang === "ru" ? c.cru : c.cen}
                    </div>
                  ))}
                </div>
              )}
              {showDrop && q.trim().length >= 2 && matches.length === 0 && (
                <div className="drop"><div className="dropitem dim">{t.noCity}</div></div>
              )}
            </div>
            <button className="btn" onClick={applyForm}>{t.calc}</button>
          </div>
          {city && !manual && (
            <div className="note" style={{ marginTop: 8 }}>
              {t.detected}: {city.lat.toFixed(2)}°, {city.lon.toFixed(2)}° · UTC{(detTz ?? 0) >= 0 ? "+" : ""}{detTz ?? "—"}
              {" "}<input value={form.tz} placeholder="±" onChange={(e) => setForm({ ...form, tz: e.target.value })}
                style={{ width: 44, background: "var(--panel2)", border: "1px solid var(--line)", color: "var(--ink)", borderRadius: 4, padding: "1px 4px", fontFamily: "var(--mono)", fontSize: 11 }} />
              <br />{t.tzNote}
            </div>
          )}
          <div style={{ marginTop: 8 }}>
            <button className="chip" onClick={() => setManual(!manual)}>{t.manual}</button>
          </div>
          {manual && (
            <div className="form" style={{ marginTop: 10 }}>
              <div className="fld"><label>{t.tz}</label><input value={form.tz} onChange={(e) => setForm({ ...form, tz: e.target.value })} style={{ width: 60 }} /></div>
              <div className="fld"><label>{t.lat}</label><input value={form.lat} onChange={(e) => setForm({ ...form, lat: e.target.value })} /></div>
              <div className="fld"><label>{t.lon}</label><input value={form.lon} onChange={(e) => setForm({ ...form, lon: e.target.value })} /></div>
            </div>
          )}
          {error && <div style={{ color: "var(--saffron)", fontSize: 12, marginTop: 10, fontFamily: "var(--mono)" }}>{t.err}</div>}
        </div>

        {!res && (
          <div className="panel" style={{ textAlign: "center", padding: "48px 20px" }}>
            <div style={{ fontSize: 40, color: "var(--gold)", marginBottom: 12 }}>ॐ</div>
            <div style={{ fontSize: 16, marginBottom: 6 }}>{t.empty}</div>
            <div className="dim" style={{ fontSize: 12 }}>{t.emptyHint}</div>
          </div>
        )}

        {res && (<>
        {/* МОБИЛЬНЫЕ ВКЛАДКИ */}
        <div className="tabs">
          {["chart", "planets", "periods", "pkg"].map((k) => (
            <button key={k} className={`tg ${tab === k ? "on" : ""}`} onClick={() => setTab(k)}>
              {{ chart: t.chart, planets: t.planets, periods: t.periods, pkg: t.pkg }[k]}</button>
          ))}
        </div>

        <div className="grid2">
          {/* КАРТА */}
          <div id="chartpanel" className={`panel ${tab !== "chart" ? "m-hide" : ""}`}>
            <div className="toggles">
              {[["d1", t.d1], ["d9", t.d9], ["moon", t.moon], ["transit", t.transit]].map(([k, lbl]) => (
                <button key={k} className={`tg ${mode === k ? "on" : ""}`} onClick={() => { setMode(k); setSelTr(null); }}>{lbl}</button>))}
              <span style={{ flex: 1 }} />
              <button className={`tg ${showAsp ? "on" : ""}`} onClick={() => setShowAsp(!showAsp)}>{t.aspToggle}</button>
              {[["north", t.north], ["south", t.south]].map(([k, lbl]) => (
                <button key={k} className={`tg ${style === k ? "on" : ""}`} onClick={() => setStyle(k)}>{lbl}</button>))}
            </div>
            {style === "north"
              ? <NorthChart res={res} mode={mode} lang={lang} showAsp={showAsp} transits={transits} selTr={selTr} onTr={(k) => setSelTr(selTr === k ? null : k)} />
              : <SouthChart res={res} mode={mode} lang={lang} showAsp={showAsp} transits={transits} selTr={selTr} onTr={(k) => setSelTr(selTr === k ? null : k)} />}
            {mode === "transit" && (
              <div className="pcard" style={{ padding: "10px 12px" }}>
                {selTrData ? (<>
                  <b style={{ color: PL[selTrData.key].c }}>{PL[selTrData.key][lang]}</b>
                  {" "}— {SIGNS[selTrData.sign][lang]}, {NAKS[selTrData.nak][lang === "ru" ? 0 : 1]} ·
                  {" "}{t.until} <b>{fmtDate(selTrData.until, lang)}</b>
                </>) : <span className="dim">{t.trHint}</span>}
              </div>
            )}
            <div className="legend">{t.legend}<br />
              {lang === "ru" ? "Лагна" : "Lagna"}: {SIGNS[res.ascSign][lang]} {fmtDeg(res.asc % 30)} · {NAKS[Math.floor(res.asc / (40 / 3))][lang === "ru" ? 0 : 1]} ·
              {" "}{lang === "ru" ? "аянамша" : "ayanamsha"} {fmtDeg(res.ay % 30).slice(0, 6)}</div>
          </div>

          {/* ПЛАНЕТЫ */}
          <div className={`panel ${tab !== "planets" ? "m-hide" : ""}`} style={{ overflowX: "auto" }}>
            <h2>{t.planets}</h2>
            <table>
              <thead><tr><th></th><th>{t.karTbl}</th><th>{t.signTbl}</th><th>{t.degTbl}</th><th>{t.nak}</th><th>{lang === "ru" ? "Дом" : "H"}</th><th>{t.statTbl}</th></tr></thead>
              <tbody>{res.planets.map((p) => <PlanetRow key={p.key} p={p} />)}</tbody>
            </table>
            {selP && (
              <div className="pcard">
                <div style={{ fontSize: 15, marginBottom: 8 }}>
                  <b style={{ color: PL[selP.key].c }}>{PL[selP.key][lang]}</b>
                  {" "}— {SIGNS[selP.sign][lang]} {fmtDeg(selP.deg)}, {selP.house}-{lang === "ru" ? "й дом" : "th house"}
                  {statuses(selP).map(([m, c], i) => <span key={i} style={{ color: c, fontWeight: 700, marginLeft: 8 }}>{m}</span>)}
                </div>
                <div className="cardgrid">
                  <div><span className="clbl">{t.nak}</span>{NAKS[selP.nak][lang === "ru" ? 0 : 1]}, {t.pada} {selP.pada} <span className="dim">({lang === "ru" ? "упр." : "lord"} {PL[NAKS[selP.nak][2]][lang]})</span></div>
                  <div><span className="clbl">{t.dign}</span>{DIG_LBL[lang][selP.dig || "n"]}</div>
                  {selP.relation && <div><span className="clbl">{t.rel}</span>{REL_LBL[lang][selP.relation]} <span className="dim">({t.disp}: {PL[selP.dispositor][lang]})</span></div>}
                  {selP.rules.length > 0 && <div><span className="clbl">{t.rulesH}</span>{selP.rules.join(", ")}</div>}
                  <div><span className="clbl">{t.asp}</span>{selP.aspects.join(", ")}</div>
                  <div><span className="clbl">D9</span>{SIGNS[selP.d9sign][lang]}{selP.vargottama && (lang === "ru" ? " · варготтама" : " · vargottama")}</div>
                  <div><span className="clbl">{t.fromMoon}</span>{selP.houseFromMoon}</div>
                  {selP.karaka !== undefined && <div><span className="clbl">{t.karTbl}</span>{KARAKA[lang][selP.karaka]}</div>}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* ПЕРИОДЫ */}
        <div className={`panel ${tab !== "periods" ? "m-hide" : ""}`}>
          <h2>{t.dasha}</h2>
          <div className="timeline">
            <div className="tl-base">
              {res.dashas.map((d, i) => (
                <div key={i} className="tl-seg" style={{ ...segPct(d.start, d.end), background: PL[d.lord].c }}
                  onClick={() => setOpenMaha(openMaha === i ? null : i)}>{PL[d.lord].ab}</div>
              ))}
            </div>
            {res.sade.map((s, i) => <div key={i} className="tl-sade" style={segPct(s.start, s.end)} title={t.sade} />)}
            {nowJD > res.jd && nowJD < res.jd + 100 * 365.25 && <>
              <div className="tl-now" style={{ left: segPct(nowJD, nowJD).left }} />
              <div className="tl-nowlbl" style={{ left: segPct(nowJD, nowJD).left }}>{t.youAreHere}</div></>}
          </div>
          <div className="note" style={{ marginBottom: 10 }}>
            ▨ {t.sade}: {res.sade.map((s) => `${fmtDate(s.start, lang)} — ${fmtDate(s.end, lang)}`).join(" · ")}
          </div>
          <div>
            {res.dashas.map((d, i) => {
              const cur = nowJD >= d.start && nowJD < d.end;
              return (
                <div key={i}>
                  <div className={`drow ${cur ? "cur" : ""}`} onClick={() => setOpenMaha(openMaha === i ? null : i)}>
                    <span><b style={{ color: PL[d.lord].c }}>{PL[d.lord][lang]}</b>{cur && <span className="tag" style={{ color: "var(--saffron)", borderColor: "var(--saffron)" }}>{t.youAreHere}</span>}</span>
                    <span className="mono">{fmtDate(d.start, lang)} — {fmtDate(d.end, lang)}</span>
                  </div>
                  {openMaha === i && d.antars.map((a, j) => {
                    const ac = nowJD >= a.start && nowJD < a.end;
                    return <div key={j} className={`antar ${ac ? "cur" : ""}`}>
                      <span>{PL[d.lord].ab}–{PL[a.lord].ab}</span>
                      <span className="mono">{fmtDate(a.start, lang)} — {fmtDate(a.end, lang)}</span>
                    </div>;
                  })}
                </div>
              );
            })}
          </div>
        </div>

        {/* ПАКЕТ «ТРИ ТОЧКИ» */}
        <div className={`panel ${tab !== "pkg" ? "m-hide" : ""}`}>
          <h2>{t.pkg}</h2>
          {p3.items.map((it) => {
            const M = P3[it.k], isCrack = DUSTHANA.includes(it.n);
            const cls = houseClasses(it.n);
            const meta = NAK_META[it.nak];
            const nakName = NAKS[it.nak][lang === "ru" ? 0 : 1];
            const mainCls = cls[0];
            return (
              <div key={it.k} className={`p3card ${isCrack ? "crack" : ""}`}>
                <div className="p3head">{M.t[lang]} · {it.n} {lang === "ru" ? "дом" : "house"}</div>
                <div className="p3q">{M.q[lang]}</div>
                <div className="passport">
                  {PL[it.pt][lang]} — {SIGNS[it.sign][lang]} · {nakName}, {t.pada} {it.pada}
                  {" "}<span className="dim">({lang === "ru" ? "упр." : "lord"} {PL[NAKS[it.nak][2]][lang]}
                  {lang === "ru" ? ` · символ: ${meta[0]} · божество: ${meta[1]}` : ""})</span>
                </div>
                <p>{M.v[it.n - 1][lang]}</p>
                {lang === "ru" ? (<>
                  <p>{cls.map((c) => CLASS_TXT[c].ru).join(" ")}</p>
                  <p>Накшатра {nakName} окрашивает эту связь темой: <b>{meta[2]}</b>. {it.pada}-я пада
                    {" "}(навамша в {lang === "ru" ? SIGNS[it.padaSign].ru : SIGNS[it.padaSign].en}) добавляет ноту:
                    {" "}{SIGN_KEY[it.padaSign]}.</p>
                  <p className="ex">{EX_TXT[it.k][mainCls]}</p>
                  <p className="shakti">{SHAKTI_TXT[mainCls].s}<br />{SHAKTI_TXT[mainCls].t}</p>
                </>) : (<>
                  <p>{cls.map((c) => CLASS_TXT[c].en).join(" ")} Nakshatra {nakName}: <b>{meta[3]}</b>;
                    {" "}pada {it.pada} adds {SIGN_KEY_EN[it.padaSign]}.</p>
                </>)}
              </div>
            );
          })}
          <div className="synth">
            <b style={{ color: p3.cracks.length ? "var(--saffron)" : "var(--gold)" }}>
              {p3.cracks.length ? t.crack : t.harmony}:</b>{" "}
            {p3.cracks.length
              ? p3.cracks.map((c) => P3[c.k].t[lang]).join("; ") + (lang === "ru"
                ? " — связь через дустхану: здесь энергия проходит через испытание, это зона осознанной работы."
                : " — dusthana link: energy passes through trial; the zone of conscious work.")
              : (lang === "ru"
                ? "все три связи в опорных домах — тело, ум и дух работают согласованно."
                : "all three links in supportive houses — body, mind and spirit act in concert.")}
            {p3.strong.length > 0 && p3.cracks.length > 0 && (
              <> {lang === "ru" ? "Опора:" : "Support:"} {p3.strong.map((c) => P3[c.k].t[lang]).join("; ")}.</>
            )}
          </div>
          <div className="note">{t.pkgNote}</div>
        </div>
        </>)}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
